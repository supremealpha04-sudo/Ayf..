<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYF GWARIMPA - Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #17212b;
            color: #fff;
            padding-bottom: 70px;
        }

        /* Telegram-style header */
        .header {
            background: #17212b;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #2b2f36;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        /* Filter tabs */
        .filters {
            background: #17212b;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #2b2f36;
        }

        .filter-btn {
            padding: 8px 20px;
            background: #2b2f36;
            border: none;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: #2b5278;
        }

        /* Feed items - Telegram message style */
        .feed-container {
            padding: 10px;
        }

        .feed-item {
            background: #1e2a36;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .feed-header {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2b2f36;
        }

        .feed-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #2b2f36;
        }

        .feed-info {
            flex: 1;
        }

        .feed-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .feed-type {
            font-size: 12px;
            color: #7e8c9e;
        }

        .feed-content {
            padding: 15px;
        }

        .feed-media {
            width: 100%;
            border-radius: 8px;
            margin: 10px 0;
            max-height: 300px;
            object-fit: cover;
        }

        .feed-actions {
            display: flex;
            gap: 20px;
            padding: 10px 15px;
            border-top: 1px solid #2b2f36;
        }

        .action-btn {
            background: none;
            border: none;
            color: #7e8c9e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        .action-btn:hover {
            color: #2b5278;
        }

        .comments-section {
            padding: 15px;
            background: #16212b;
            display: none;
        }

        .comments-section.active {
            display: block;
        }

        .comment {
            margin-bottom: 15px;
            padding-left: 40px;
            position: relative;
        }

        .comment-avatar {
            position: absolute;
            left: 0;
            top: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2b2f36;
        }

        .comment-text {
            background: #1e2a36;
            padding: 8px 12px;
            border-radius: 12px;
        }

        .comment-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .comment-input input {
            flex: 1;
            padding: 10px;
            background: #2b2f36;
            border: none;
            border-radius: 20px;
            color: #fff;
        }

        /* Bottom navigation - Telegram style */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #17212b;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #2b2f36;
        }

        .nav-item {
            text-align: center;
            color: #7e8c9e;
            text-decoration: none;
            font-size: 12px;
        }

        .nav-item.active {
            color: #2b5278;
        }

        .nav-icon {
            font-size: 24px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AYF GWARIMPA</h1>
    </div>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="notice">Notices</button>
        <button class="filter-btn" data-filter="event">Events</button>
        <button class="filter-btn" data-filter="post">Posts</button>
        <button class="filter-btn" data-filter="minutes">Minutes</button>
    </div>

    <div class="feed-container" id="feed-container"></div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="parish.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>Parish</span>
        </a>
        <a href="#" class="nav-item" onclick="showPlans()">
            <span class="nav-icon">📅</span>
            <span>Plan</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        let currentUser = null;
        let currentFilter = 'all';

        async function loadUser() {
            const { data: { user } } = await supabase.auth.getUser();
            currentUser = user;
            if(!user) window.location.href = 'index.html';
        }

        async function loadFeed() {
            let query = supabase
                .from('feed_items')
                .select('*, profiles(full_name, avatar_url)')
                .order('created_at', { ascending: false });
            
            if(currentFilter !== 'all') {
                query = query.eq('type', currentFilter);
            }

            const { data } = await query;
            renderFeed(data);
        }

        function renderFeed(items) {
            const container = document.getElementById('feed-container');
            container.innerHTML = items.map(item => `
                <div class="feed-item" data-id="${item.id}">
                    <div class="feed-header">
                        <div class="feed-avatar" style="background-image: url(${item.profiles?.avatar_url || ''}); background-size: cover;"></div>
                        <div class="feed-info">
                            <div class="feed-title">${item.title || item.type}</div>
                            <div class="feed-type">${item.type.toUpperCase()} • ${new Date(item.created_at).toLocaleDateString()}</div>
                        </div>
                    </div>
                    <div class="feed-content">
                        ${item.content || ''}
                        ${item.media_url ? `<img src="${item.media_url}" class="feed-media">` : ''}
                        ${item.pdf_url ? `<a href="${item.pdf_url}" download style="color: #2b5278;">📄 Download PDF</a>` : ''}
                        ${item.event_date ? `<div style="margin-top: 10px;">📅 Countdown: ${getCountdown(item.event_date)}</div>` : ''}
                    </div>
                    <div class="feed-actions">
                        <button class="action-btn" onclick="toggleLike('${item.id}')">❤️ <span id="like-count-${item.id}">0</span></button>
                        <button class="action-btn" onclick="toggleComments('${item.id}')">💬 <span id="comment-count-${item.id}">0</span></button>
                        <button class="action-btn" onclick="sharePost('${item.id}')">🔗 Share</button>
                        ${item.pdf_url ? `<button class="action-btn" onclick="downloadFile('${item.pdf_url}')">⬇️ Download</button>` : ''}
                    </div>
                    <div class="comments-section" id="comments-${item.id}">
                        <div class="comments-list" id="comments-list-${item.id}"></div>
                        <div class="comment-input">
                            <input type="text" id="comment-input-${item.id}" placeholder="Write a comment...">
                            <button class="action-btn" onclick="addComment('${item.id}')">Send</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Load likes and comments counts
            items.forEach(item => loadCounts(item.id));
        }

        function getCountdown(eventDate) {
            const diff = new Date(eventDate) - new Date();
            if(diff <= 0) return "Event started!";
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (86400000)) / 3600000);
            return `${days}d ${hours}h remaining`;
        }

        async function toggleLike(feedId) {
            const { data: existing } = await supabase
                .from('likes')
                .select()
                .eq('feed_id', feedId)
                .eq('user_id', currentUser.id);
            
            if(existing.length > 0) {
                await supabase.from('likes').delete().eq('id', existing[0].id);
            } else {
                await supabase.from('likes').insert([{ feed_id: feedId, user_id: currentUser.id }]);
            }
            loadCounts(feedId);
        }

        async function loadCounts(feedId) {
            const { count: likeCount } = await supabase
                .from('likes')
                .select('*', { count: 'exact', head: true })
                .eq('feed_id', feedId);
            
            const { count: commentCount } = await supabase
                .from('comments')
                .select('*', { count: 'exact', head: true })
                .eq('feed_id', feedId);
            
            document.getElementById(`like-count-${feedId}`).textContent = likeCount || 0;
            document.getElementById(`comment-count-${feedId}`).textContent = commentCount || 0;
        }

        async function addComment(feedId) {
            const input = document.getElementById(`comment-input-${feedId}`);
            const comment = input.value;
            if(!comment) return;
            
            await supabase.from('comments').insert([{
                feed_id: feedId,
                user_id: currentUser.id,
                comment: comment
            }]);
            
            input.value = '';
            loadComments(feedId);
        }

        async function loadComments(feedId) {
            const { data } = await supabase
                .from('comments')
                .select('*, profiles(full_name, avatar_url)')
                .eq('feed_id', feedId)
                .order('created_at', { ascending: true });
            
            const container = document.getElementById(`comments-list-${feedId}`);
            if(container) {
                container.innerHTML = data.map(c => `
                    <div class="comment">
                        <div class="comment-avatar" style="background-image: url(${c.profiles?.avatar_url || ''}); background-size: cover;"></div>
                        <div class="comment-text">
                            <strong>${c.profiles?.full_name}</strong><br>
                            ${c.comment}
                        </div>
                    </div>
                `).join('');
            }
        }

        function toggleComments(feedId) {
            const section = document.getElementById(`comments-${feedId}`);
            section.classList.toggle('active');
            if(section.classList.contains('active')) {
                loadComments(feedId);
            }
        }

        function sharePost(feedId) {
            navigator.share ? navigator.share({ title: 'AYF GWARIMPA', url: window.location.href }) : alert('Share this post!');
        }

        function downloadFile(url) {
            window.open(url, '_blank');
        }

        function showPlans() {
            // Load yearly plans modal
            alert('Yearly Plans - Feature coming');
        }

        // Setup filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                loadFeed();
            });
        });

        loadUser().then(() => loadFeed());
    </script>
</body>
</html>
