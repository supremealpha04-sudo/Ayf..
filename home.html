<body>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_KEY = 'your-anon-key';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let posts = [];
        let currentCategory = 'all';

        // Initialize
        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'index.html';
                return;
            }

            const { data: user } = await supabase
                .from('users')
                .select('*')
                .eq('id', session.user.id)
                .single();
            
            currentUser = user;
            loadPosts();
            setupRealtime();
        }

        // Load Posts
        async function loadPosts() {
            let query = supabase
                .from('posts')
                .select(`
                    *,
                    author:users(id, full_name, profile_image, parish),
                    likes:post_likes(count),
                    comments:comments(count)
                `)
                .order('created_at', { ascending: false });

            if (currentCategory !== 'all') {
                query = query.eq('category', currentCategory);
            }

            const { data, error } = await query;

            if (error) {
                console.error('Error loading posts:', error);
                return;
            }

            posts = data || [];
            renderPosts();
        }

        // Render Posts
        function renderPosts() {
            const container = document.getElementById('feedContainer');
            
            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No updates available</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = posts.map(post => createPostHTML(post)).join('');
        }

        // Create Post HTML
        function createPostHTML(post) {
            const timeAgo = getTimeAgo(post.created_at);
            const badgeClass = `badge-${post.category}`;
            const hasMedia = post.media_url ? true : false;
            const isVideo = post.media_type === 'video';
            
            let countdownHTML = '';
            if (post.category === 'event' && post.event_date) {
                countdownHTML = `
                    <div class="countdown-timer">
                        <i class="fas fa-clock"></i>
                        <span class="countdown-text" data-date="${post.event_date}">
                            ${getCountdown(post.event_date)}
                        </span>
                    </div>
                `;
            }

            return `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-header">
                        <img src="${post.author?.profile_image || 'https://via.placeholder.com/44'}" class="post-avatar" alt="">
                        <div class="post-meta">
                            <div class="post-author">${post.author?.full_name || 'Unknown'}</div>
                            <div class="post-time">${timeAgo} • ${post.author?.parish || ''}</div>
                        </div>
                        <span class="post-category-badge ${badgeClass}">${post.category}</span>
                    </div>
                    
                    <div class="post-content">
                        <div class="post-title">${post.title || ''}</div>
                        <div class="post-text">${post.content || ''}</div>
                        ${countdownHTML}
                        ${hasMedia ? `
                            ${isVideo ? 
                                `<video class="post-video" controls poster="${post.thumbnail_url || ''}">
                                    <source src="${post.media_url}" type="video/mp4">
                                </video>` :
                                `<img src="${post.media_url}" class="post-media" alt="">`
                            }
                        ` : ''}
                    </div>

                    <div class="post-actions">
                        <div class="action-btn ${post.user_liked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                            <i class="${post.user_liked ? 'fas' : 'far'} fa-heart"></i>
                            <span>${post.likes?.count || 0}</span>
                        </div>
                        <div class="action-btn" onclick="toggleComments('${post.id}')">
                            <i class="far fa-comment"></i>
                            <span>${post.comments?.count || 0}</span>
                        </div>
                        <div class="action-spacer"></div>
                        <div class="action-btn" onclick="openShareModal('${post.id}')">
                            <i class="fas fa-share"></i>
                        </div>
                        ${post.file_url ? `
                            <div class="action-btn" onclick="downloadFile('${post.file_url}', '${post.file_name}')">
                                <i class="fas fa-download"></i>
                            </div>
                        ` : ''}
                    </div>

                    <div class="comments-section" id="comments-${post.id}">
                        <div id="comments-list-${post.id}"></div>
                        <div class="comment-input-area">
                            <input type="text" class="comment-input" id="comment-input-${post.id}" 
                                   placeholder="Write a comment..." 
                                   onkeypress="handleCommentKeypress(event, '${post.id}')">
                            <button class="send-btn" onclick="postComment('${post.id}')">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Toggle Like
        async function toggleLike(postId) {
            const btn = document.querySelector(`[data-post-id="${postId}"] .action-btn:first-child`);
            const isLiked = btn.classList.contains('liked');

            if (isLiked) {
                await supabase
                    .from('post_likes')
                    .delete()
                    .eq('post_id', postId)
                    .eq('user_id', currentUser.id);
            } else {
                await supabase
                    .from('post_likes')
                    .insert([{ post_id: postId, user_id: currentUser.id }]);
            }

            loadPosts();
        }

        // Toggle Comments
        async function toggleComments(postId) {
            const section = document.getElementById(`comments-${postId}`);
            section.classList.toggle('expanded');
            
            if (section.classList.contains('expanded')) {
                loadComments(postId);
            }
        }

        // Load Comments
        async function loadComments(postId) {
            const { data: comments } = await supabase
                .from('comments')
                .select(`
                    *,
                    user:users(id, full_name, profile_image)
                `)
                .eq('post_id', postId)
                .order('created_at', { ascending: true });

            const container = document.getElementById(`comments-list-${postId}`);
            container.innerHTML = (comments || []).map(comment => `
                <div class="comment">
                    <div class="comment-header">
                        <img src="${comment.user?.profile_image || 'https://via.placeholder.com/32'}" class="comment-avatar">
                        <span class="comment-author">${comment.user?.full_name || 'Unknown'}</span>
                        <span class="comment-time">${getTimeAgo(comment.created_at)}</span>
                    </div>
                    <div class="comment-text">${comment.content}</div>
                </div>
            `).join('');
        }

        // Post Comment
        async function postComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const content = input.value.trim();
            
            if (!content) return;

            await supabase
                .from('comments')
                .insert([{
                    post_id: postId,
                    user_id: currentUser.id,
                    content
                }]);

            input.value = '';
            loadComments(postId);
            loadPosts();
        }

        function handleCommentKeypress(e, postId) {
            if (e.key === 'Enter') postComment(postId);
        }

        // Category Filter
        document.querySelectorAll('.category-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentCategory = chip.dataset.category;
                loadPosts();
            });
        });

        // Utilities
        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return 'just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

        function getCountdown(eventDate) {
            const diff = new Date(eventDate) - new Date();
            if (diff < 0) return 'Event has passed';
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            
            if (days > 0) return `${days} days ${hours}h remaining`;
            return `${hours} hours remaining`;
        }

        // Share Modal
        let currentSharePostId = null;

        function openShareModal(postId) {
            currentSharePostId = postId;
            document.getElementById('shareModal').classList.add('active');
        }

        function shareVia(method) {
            const post = posts.find(p => p.id === currentSharePostId);
            if (!post) return;

            const shareData = {
                title: post.title,
                text: post.content,
                url: window.location.href
            };

            if (method === 'whatsapp') {
                window.open(`https://wa.me/?text=${encodeURIComponent(post.title + ' - ' + window.location.href)}`);
            } else if (method === 'copy') {
                navigator.clipboard.writeText(window.location.href);
                alert('Link copied to clipboard!');
            } else if (method === 'native' && navigator.share) {
                navigator.share(shareData);
            }

            document.getElementById('shareModal').classList.remove('active');
        }

        // Download File
        function downloadFile(url, filename) {
            const link = document.createElement('a');
            link.href = url;
            link.download = filename || 'download';
            link.click();
        }

        // Realtime Updates
        function setupRealtime() {
            supabase
                .channel('posts')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
                    loadPosts();
                })
                .subscribe();
        }

        // Navigation
        function goToProfile() {
            window.location.href = 'profile.html';
        }

        function openSearch() {
            // Implement search functionality
            alert('Search feature coming soon!');
        }

        function toggleSidebar() {
            // Implement sidebar menu
            alert('Menu feature coming soon!');
        }

        // Close modal on outside click
        document.getElementById('shareModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                e.target.classList.remove('active');
            }
        });

        // Initialize
        init();
    </script>
</body>
