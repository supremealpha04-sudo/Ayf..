<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Home - AYF GWARIMPA</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/home.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="app-header">
            <h2>Fellowship Feed</h2>
            <div class="header-actions">
                <button class="filter-btn" id="filterBtn">📋</button>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar" id="filterBar" style="display: none;">
            <button class="filter-chip active" data-filter="all">All</button>
            <button class="filter-chip" data-filter="notice">Notices</button>
            <button class="filter-chip" data-filter="event">Events</button>
            <button class="filter-chip" data-filter="video">Videos</button>
            <button class="filter-chip" data-filter="minutes">Minutes</button>
            <button class="filter-chip" data-filter="general_post">Posts</button>
        </div>

        <!-- Feed Container -->
        <div class="feed-container" id="feedContainer">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Loading feed...</p>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="/home.html" class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </a>
            <a href="/parish.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span class="nav-label">Parish</span>
            </a>
            <a href="/plan.html" class="nav-item">
                <span class="nav-icon">📅</span>
                <span class="nav-label">Plan</span>
            </a>
            <a href="/profile.html" class="nav-item">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Profile</span>
            </a>
        </nav>
    </div>

    <!-- Post Detail Modal -->
    <div id="postModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/modules/feed.js"></script>
</body>
</html>
