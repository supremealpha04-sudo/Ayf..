<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYF GWARIMPA - Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #17212b;
            color: #fff;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-header {
            background: #1e2a36;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .admin-card {
            background: #1e2a36;
            border-radius: 12px;
            padding: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2b2f36;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #7e8c9e;
            font-size: 12px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: #2b2f36;
            border: none;
            border-radius: 8px;
            color: #fff;
        }

        button {
            background: #2b5278;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button.danger {
            background: #dc3545;
        }

        .item-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .list-item {
            padding: 10px;
            border-bottom: 1px solid #2b2f36;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item button {
            margin: 0 5px;
            padding: 5px 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <p>Manage AYF GWARIMPA Platform</p>
        </div>

        <div class="admin-grid">
            <!-- Notices Panel -->
            <div class="admin-card">
                <div class="card-title">📢 Notices</div>

                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="notice-title" required>
                    </div>
                    <div class="form-group">
                        <label>Content</label>
                        <textarea id="notice-content" rows="3" required></textarea>
                    </div>
                    <button type="submit">Create Notice</button>
                </form>
                <div class="item-list" id="notices-list"></div>
            </div>

            <!-- Events Panel -->
            <div class="admin-card">
                <div class="card-title">🎉 Events</div>
                <form onsubmit="createEvent(event)">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="event-title" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="event-desc" rows="2" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Event Date</label>
                        <input type="datetime-local" id="event-date" required>
                    </div>
                    <button type="submit">Create Event</button>
                </form>
                <div class="item-list" id="events-list"></div>
            </div>

            <!-- Posts Panel -->
            <div class="admin-card">
                <div class="card-title">📝 Posts</div>
                <form onsubmit="createPost(event)">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="post-title" required>
                    </div>
                    <div class="form-group">
                        <label>Content</label>
                        <textarea id="post-content" rows="2" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Media (Image/Video)</label>
                        <input type="file" id="post-media" accept="image/*,video/*">
                    </div>
                    <button type="submit">Create Post</button>
                </form>
                <div class="item-list" id="posts-list"></div>
            </div>

            <!-- Plans Panel -->
            <div class="admin-card">
                <div class="card-title">📅 Yearly Plans</div>
                <form onsubmit="createPlan(event)">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="plan-title" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="plan-desc" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="plan-year" required>
                    </div>
                    <div class="form-group">
                        <label>PDF File</label>
                        <input type="file" id="plan-pdf" accept=".pdf" required>
                    </div>
                    <button type="submit">Upload Plan</button>
                </form>
                <div class="item-list" id="plans-list"></div>
            </div>

            <!-- Minutes Panel -->
            <div class="admin-card">
                <div class="card-title">📄 Meeting Minutes</div>
                <form onsubmit="createMinutes(event)">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="minutes-title" required>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="minutes-date" required>
                    </div>
                    <div class="form-group">
                        <label>PDF/DOCX File</label>
                        <input type="file" id="minutes-file" accept=".pdf,.docx" required>
                    </div>
                    <button type="submit">Upload Minutes</button>
                </form>
                <div class="item-list" id="minutes-list"></div>
            </div>

            <!-- Quotas Panel -->
            <div class="admin-card">
                <div class="card-title">💰 Parish Quotas</div>
                <form onsubmit="sendQuota(event)">
                    <div class="form-group">
                        <label>Parish Name</label>
                        <input type="text" id="quota-parish" required>
                    </div>
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="quota-amount" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="quota-desc" rows="2"></textarea>
                    </div>
                    <button type="submit">Send Quota to President</button>
                </form>
            </div>

            <!-- Suspensions Panel -->
            <div class="admin-card">
                <div class="card-title">⛔ Suspend Member</div>
                <form onsubmit="suspendMember(event)">
                    <div class="form-group">
                        <label>User Email</label>
                        <input type="email" id="suspend-email" required>
                    </div>
                    <div class="form-group">
                        <label>Duration</label>
                        <select id="suspend-duration">
                            <option value="7">7 Days</option>
                            <option value="15">15 Days</option>
                            <option value="30">30 Days</option>
                            <option value="365">1 Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Reason</label>
                        <input type="text" id="suspend-reason">
                    </div>
                    <button type="submit">Suspend Member</button>
                </form>
            </div>
        </div>
    </div>

                .select('user_role')
                .eq('id', user.id)
                .single();
            
            if(profile.user_role !== 'admin') {
                alert('Admin access only');
                window.location.href = 'home.html';
            }
            
            currentUser = user;
            loadAllItems();
        }

            e.target.reset();
            loadPosts();

async function loadAllItems() {
    await loadNotices();
    await loadEvents();
    await loadPosts();
    await loadPlans();
    await loadMinutes();
}

async function loadNotices() {
    const { data } = await supabase
        .from('feed_items')
        .select('*')
        .eq('type', 'notice')
        .order('created_at', { ascending: false });
    
    const container = document.getElementById('notices-list');
    if(container) {
        container.innerHTML = data.map(item => `
            <div class="list-item">
                <div>
                    <strong>${item.title}</strong><br>
                    <small>${new Date(item.created_at).toLocaleDateString()}</small>
                </div>
                <div>
                    <button onclick="editNotice('${item.id}')">Edit</button>
                    <button class="danger" onclick="deleteItem('${item.id}')">Delete</button>
                </div>
            </div>
        `).join('');
    }
}

async function loadEvents() {
    const { data } = await supabase
        .from('feed_items')
        .select('*')
        .eq('type', 'event')
        .order('created_at', { ascending: false });
    
    const container = document.getElementById('events-list');
    if(container) {
        container.innerHTML = data.map(item => `
            <div class="list-item">
                <div>
                    <strong>${item.title}</strong><br>
                    <small>${new Date(item.event_date).toLocaleDateString()}</small>
                </div>
                <div>
                    <button onclick="editEvent('${item.id}')">Edit</button>
                    <button class="danger" onclick="deleteItem('${item.id}')">Delete</button>
                </div>
            </div>
        `).join('');
    }
}

async function loadPosts() {
    const { data } = await supabase
        .from('feed_items')
        .select('*')
        .eq('type', 'post')
        .order('created_at', { ascending: false });
    
    const container = document.getElementById('posts-list');
    if(container) {
        container.innerHTML = data.map(item => `
            <div class="list-item">
                <div>
                    <strong>${item.title}</strong><br>
                    <small>${item.media_type || 'text'} • ${new Date(item.created_at).toLocaleDateString()}</small>
                </div>
                <div>
                    <button onclick="editPost('${item.id}')">Edit</button>
                    <button class="danger" onclick="deleteItem('${item.id}')">Delete</button>
                </div>
            </div>
        `).join('');
    }
}

        .from('yearly_plans')
        .select('*')
        .order('year', { ascending: false });
    
    const container = document.getElementById('plans-list');
    if(container) {

                <div>
                    <strong>${plan.title}</strong><br>
                    <small>${plan.year}</small>
                </div>
                <div>
                    <button onclick="editPlan('${plan.id}')">Edit</button>
                    <button class="danger" onclick="deletePlan('${plan.id}')">Delete</button>
                </div>
            </div>
        `).join('');
    }
}

    const { data } = await supabase
        .from('feed_items')
        .select('*')
        .eq('type', 'minutes')
        .order('created_at', { ascending: false });
    
    const container = document.getElementById('minutes-list');
    if(container) {
        container.innerHTML = data.map(item => `
            <div class="list-item">
                <div>
                    <strong>${item.title}</strong><br>

                </div>
                <div>

                    <button class="danger" onclick="deleteItem('${item.id}')">Delete</button>
                </div>
            </div>
        `).join('');
    }
}

async function createMinutes(e) {
    e.preventDefault();
    const title = document.getElementById('minutes-title').value;
    const date = document.getElementById('minutes-date').value;
    const file = document.getElementById('minutes-file').files[0];
    
    if(!file) return alert('Please select a file');
    
    const fileName = `minutes_${Date.now()}_${file.name}`;
    const { error: uploadError } = await supabase.storage
        .from('minutes')
        .upload(fileName, file);
    
    if(uploadError) {
        alert(uploadError.message);
        return;
    }
    
    const pdfUrl = supabase.storage.from('minutes').getPublicUrl(fileName).data.publicUrl;
    
    await supabase.from('feed_items').insert([{
        type: 'minutes',
        title: title,
        content: `Meeting minutes for ${date}`,
        pdf_url: pdfUrl,
        created_by: currentUser.id
    }]);
    
    alert('Minutes uploaded!');
    e.target.reset();
    loadMinutes();
}

async function sendQuota(e) {
    e.preventDefault();
    const parishName = document.getElementById('quota-parish').value;
    const amount = document.getElementById('quota-amount').value;
    const description = document.getElementById('quota-desc').value;
    
    // Find parish president
    const { data: president } = await supabase
        .from('profiles')
        .select('id')
        .eq('parish_name', parishName)
        .eq('is_exco', true)
        .eq('exco_approved', true)
        .single();
    
    if(!president) {
        alert('No approved EXCO found for this parish');
        return;
    }
    
    await supabase.from('quotas').insert([{
        parish_name: parishName,
        amount: amount,
        description: description,
        sent_to: president.id
    }]);
    
    // Send a private message to the president
    await supabase.from('private_messages').insert([{
        sender_id: currentUser.id,
        receiver_id: president.id,
        message: `📋 Quota Notification: Your parish quota of ₦${amount} has been set. Description: ${description}`
    }]);
    
    alert(`Quota sent to ${parishName} president!`);
    e.target.reset();
}

async function suspendMember(e) {
    e.preventDefault();
    const email = document.getElementById('suspend-email').value;
    const days = parseInt(document.getElementById('suspend-duration').value);
    const reason = document.getElementById('suspend-reason').value;
    
    // Get user by email
    const { data: user } = await supabase
        .from('profiles')
        .select('id, parish_name')
        .eq('email', email)
        .single();
    
    if(!user) {
        alert('User not found');
        return;
    }
    
    const suspendedUntil = new Date();
    suspendedUntil.setDate(suspendedUntil.getDate() + days);
    
    await supabase.from('suspensions').insert([{
        user_id: user.id,
        parish_name: user.parish_name,
        suspended_until: suspendedUntil.toISOString(),
        reason: reason
    }]);
    
    // Notify user
    await supabase.from('private_messages').insert([{
        sender_id: currentUser.id,
        receiver_id: user.id,
        message: `⚠️ You have been suspended from ${user.parish_name} for ${days} days. Reason: ${reason}`
    }]);
    
    alert(`User suspended until ${suspendedUntil.toLocaleDateString()}`);
    e.target.reset();
}

async function deleteItem(id) {
    if(confirm('Are you sure? This will delete the item permanently.')) {
        await supabase.from('feed_items').delete().eq('id', id);
        loadAllItems();
    }
}

async function deletePlan(id) {
    if(confirm('Delete this plan?')) {
        await supabase.from('yearly_plans').delete().eq('id', id);
        loadPlans();
    }
}
