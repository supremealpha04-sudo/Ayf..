<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYF GWARIMPA - Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #17212b;
            color: #fff;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-header {
            background: #1e2a36;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .admin-card {
            background: #1e2a36;
            border-radius: 12px;
            padding: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2b2f36;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #7e8c9e;
            font-size: 12px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: #2b2f36;
            border: none;
            border-radius: 8px;
            color: #fff;
        }

        button {
            background: #2b5278;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button.danger {
            background: #dc3545;
        }

        .item-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .list-item {
            padding: 10px;
            border-bottom: 1px solid #2b2f36;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item button {
            margin: 0 5px;
            padding: 5px 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <p>Manage AYF GWARIMPA Platform</p>
        </div>

        <div class="admin-grid">
            <!-- Notices Panel -->
            <div class="admin-card">
                <div class="card-title">📢 Notices</div>
                <form onsubmit="createNotice(event)">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="notice-title" required>
                    </div>
                    <div class="form-group">
                        <label>Content</label>
                        <textarea id="notice-content" rows="3" required></textarea>
                    </div>
                    <button type="submit">Create Notice</button>
                </form>
                <div class="item-list" id="notices-list"></div>
            </div>

            <!-- Events Panel -->
            <div class="admin-card">
                <div class="card-title">🎉 Events</div>
                <form onsubmit="createEvent(event)">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="event-title" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="event-desc" rows="2" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Event Date</label>
                        <input type="datetime-local" id="event-date" required>
                    </div>
                    <button type="submit">Create Event</button>
                </form>
                <div class="item-list" id="events-list"></div>
            </div>

            <!-- Posts Panel -->
            <div class="admin-card">
                <div class="card-title">📝 Posts</div>
                <form onsubmit="createPost(event)">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="post-title" required>
                    </div>
                    <div class="form-group">
                        <label>Content</label>
                        <textarea id="post-content" rows="2" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Media (Image/Video)</label>
                        <input type="file" id="post-media" accept="image/*,video/*">
                    </div>
                    <button type="submit">Create Post</button>
                </form>
                <div class="item-list" id="posts-list"></div>
            </div>

            <!-- Plans Panel -->
            <div class="admin-card">
                <div class="card-title">📅 Yearly Plans</div>
                <form onsubmit="createPlan(event)">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="plan-title" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="plan-desc" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="plan-year" required>
                    </div>
                    <div class="form-group">
                        <label>PDF File</label>
                        <input type="file" id="plan-pdf" accept=".pdf" required>
                    </div>
                    <button type="submit">Upload Plan</button>
                </form>
                <div class="item-list" id="plans-list"></div>
            </div>

            <!-- Minutes Panel -->
            <div class="admin-card">
                <div class="card-title">📄 Meeting Minutes</div>
                <form onsubmit="createMinutes(event)">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="minutes-title" required>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="minutes-date" required>
                    </div>
                    <div class="form-group">
                        <label>PDF/DOCX File</label>
                        <input type="file" id="minutes-file" accept=".pdf,.docx" required>
                    </div>
                    <button type="submit">Upload Minutes</button>
                </form>
                <div class="item-list" id="minutes-list"></div>
            </div>

            <!-- Quotas Panel -->
            <div class="admin-card">
                <div class="card-title">💰 Parish Quotas</div>
                <form onsubmit="sendQuota(event)">
                    <div class="form-group">
                        <label>Parish Name</label>
                        <input type="text" id="quota-parish" required>
                    </div>
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="quota-amount" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="quota-desc" rows="2"></textarea>
                    </div>
                    <button type="submit">Send Quota to President</button>
                </form>
            </div>

            <!-- Suspensions Panel -->
            <div class="admin-card">
                <div class="card-title">⛔ Suspend Member</div>
                <form onsubmit="suspendMember(event)">
                    <div class="form-group">
                        <label>User Email</label>
                        <input type="email" id="suspend-email" required>
                    </div>
                    <div class="form-group">
                        <label>Duration</label>
                        <select id="suspend-duration">
                            <option value="7">7 Days</option>
                            <option value="15">15 Days</option>
                            <option value="30">30 Days</option>
                            <option value="365">1 Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Reason</label>
                        <input type="text" id="suspend-reason">
                    </div>
                    <button type="submit">Suspend Member</button>
                </form>
            </div>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        let currentUser = null;

        async function checkAdmin() {
            const { data: { user } } = await supabase.auth.getUser();
            if(!user) window.location.href = 'index.html';
            
            const { data: profile } = await supabase
                .from('profiles')
                .select('user_role')
                .eq('id', user.id)
                .single();
            
            if(profile.user_role !== 'admin') {
                alert('Admin access only');
                window.location.href = 'home.html';
            }
            
            currentUser = user;
            loadAllItems();
        }

        async function createNotice(e) {
            e.preventDefault();
            const title = document.getElementById('notice-title').value;
            const content = document.getElementById('notice-content').value;
            
            await supabase.from('feed_items').insert([{
                type: 'notice',
                title: title,
                content: content,
                created_by: currentUser.id
            }]);
            
            alert('Notice created!');
            e.target.reset();
            loadNotices();
        }

        async function createEvent(e) {
            e.preventDefault();
            const title = document.getElementById('event-title').value;
            const content = document.getElementById('event-desc').value;
            const eventDate = document.getElementById('event-date').value;
            
            await supabase.from('feed_items').insert([{
                type: 'event',
                title: title,
                content: content,
                event_date: eventDate,
                created_by: currentUser.id
            }]);
            
            alert('Event created!');
            e.target.reset();
            loadEvents();
        }

        async function createPost(e) {
            e.preventDefault();
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            const mediaFile = document.getElementById('post-media').files[0];
            
            let mediaUrl = null;
            let mediaType = null;
            
            if(mediaFile) {
                const fileExt = mediaFile.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;
                const { error } = await supabase.storage
                    .from('feed-media')
                    .upload(fileName, mediaFile);
                
                if(!error) {
                    mediaUrl = supabase.storage.from('feed-media').getPublicUrl(fileName).data.publicUrl;
                    mediaType = mediaFile.type.startsWith('image/') ? 'image' : 'video';
                }
            }
            
            await supabase.from('feed_items').insert([{
                type: 'post',
                title: title,
                content: content,
                media_url: mediaUrl,
                media_type: mediaType,
                created_by: currentUser.id
            }]);
            
            alert('Post created!');
            e.target.reset();
            loadPosts();
        }

            const title = document.getElementById('plan-title').value;

            const pdfFile = document.getElementById('plan-pdf').files[0];

                const fileName = `plan_${year}_${Date.now()}.pdf`;
                const { error } = await supabase.storage

                    .upload(fileName, pdfFile);
                
                if(!error) {
                    const pdfUrl = supabase.storage.from('plans').getPublicUrl(fileName).data.publicUrl;
