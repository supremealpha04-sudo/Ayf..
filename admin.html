<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AYF GWARIMPA - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        .admin-header {
            background: #17212b;
            padding: 16px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            font-size: 20px;
        }

        .logout-btn {
            background: #e74c3c;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .admin-tabs {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: #17212b;
            display: flex;
            overflow-x: auto;
            gap: 4px;
            padding: 8px;
            z-index: 99;
            border-bottom: 1px solid #2b3b4c;
        }

        .admin-tab {
            padding: 10px 16px;
            background: #242f3d;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            white-space: nowrap;
        }

        .admin-tab.active {
            background: #6ab3f3;
            color: #17212b;
        }

        .admin-content {
            margin-top: 120px;
            padding: 16px;
            padding-bottom: 80px;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .card {
            background: #17212b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card h3 {
            margin-bottom: 16px;
            color: #6ab3f3;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #c4c9ce;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #242f3d;
            border: 1px solid #2b3b4c;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        button {
            padding: 12px 24px;
            background: #6ab3f3;
            border: none;
            border-radius: 8px;
            color: #17212b;
            font-weight: 600;
            cursor: pointer;
        }

        button.danger {
            background: #e74c3c;
            color: white;
        }

        .item-list {
            margin-top: 20px;
        }

        .item {
            background: #242f3d;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .item-info {
            flex: 1;
        }

        .item-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .item-meta {
            font-size: 12px;
            color: #8e9eae;
        }

        .item-actions {
            display: flex;
            gap: 8px;
        }

        .item-actions button {
            padding: 6px 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🛡️ Admin Dashboard</h1>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <div class="admin-tabs" id="adminTabs">
        <button class="admin-tab active" data-panel="posts">Posts</button>
        <button class="admin-tab" data-panel="events">Events</button>
        <button class="admin-tab" data-panel="notices">Notices</button>
        <button class="admin-tab" data-panel="minutes">Minutes</button>
        <button class="admin-tab" data-panel="plans">Plans</button>
        <button class="admin-tab" data-panel="exco">Exco Requests</button>
    </div>

    <div class="admin-content">
        <!-- Posts Panel -->
        <div id="postsPanel" class="panel active">
            <div class="card">
                <h3>Create New Post</h3>
                <form id="postForm">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="postTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="postDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Quote/Content</label>
                        <textarea id="postContent" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Media Type</label>
                        <select id="postMediaType">
                            <option value="none">None</option>
                            <option value="image">Image</option>
                            <option value="video">Video</option>
                        </select>
                    </div>
                    <div class="form-group" id="postMediaGroup" style="display: none;">
                        <label>Media File</label>
                        <input type="file" id="postMedia" accept="image/*,video/*">
                    </div>
                    <button type="submit">Create Post</button>
                </form>
            </div>
            <div class="card">
                <h3>Manage Posts</h3>
                <div id="postsList">Loading...</div>
            </div>
        </div>

        <!-- Events Panel -->
        <div id="eventsPanel" class="panel">
            <div class="card">
                <h3>Create New Event</h3>
                <form id="eventForm">
                    <div class="form-group">
                        <label>Event Title</label>
                        <input type="text" id="eventTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="eventDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Event Date</label>
                        <input type="datetime-local" id="eventDate" required>
                    </div>
                    <button type="submit">Create Event</button>
                </form>
            </div>
            <div class="card">
                <h3>Manage Events</h3>
                <div id="eventsList">Loading...</div>
            </div>
        </div>

        <!-- Notices Panel -->
        <div id="noticesPanel" class="panel">
            <div class="card">
                <h3>Create New Notice</h3>
                <form id="noticeForm">
                    <div class="form-group">
                        <label>Notice Title</label>
                        <input type="text" id="noticeTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Notice Content</label>
                        <textarea id="noticeContent" rows="5" required></textarea>
                    </div>
                    <button type="submit">Publish Notice</button>
                </form>
            </div>
            <div class="card">
                <h3>Manage Notices</h3>
                <div id="noticesList">Loading...</div>
            </div>
        </div>

        <!-- Minutes Panel -->
        <div id="minutesPanel" class="panel">
            <div class="card">
                <h3>Upload Meeting Minutes</h3>
                <form id="minutesForm">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="minutesTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Date of Meeting</label>
                        <input type="date" id="minutesDate" required>
                    </div>
                    <div class="form-group">
                        <label>Minutes Document (PDF or DOCX)</label>
                        <input type="file" id="minutesFile" accept=".pdf,.docx" required>
                    </div>
                    <button type="submit">Upload Minutes</button>
                </form>
            </div>
            <div class="card">
                <h3>Manage Minutes</h3>
                <div id="minutesList">Loading...</div>
            </div>
        </div>

        <!-- Plans Panel -->
        <div id="plansPanel" class="panel">
            <div class="card">
                <h3>Upload Yearly Plan</h3>
                <form id="planForm">
                    <div class="form-group">
                        <label>Plan Title</label>
                        <input type="text" id="planTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="planDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="planYear" value="2026" required>
                    </div>
                    <div class="form-group">
                        <label>Plan Document (PDF)</label>
                        <input type="file" id="planFile" accept=".pdf" required>
                    </div>
                    <button type="submit">Upload Plan</button>
                </form>
            </div>
            <div class="card">
                <h3>Manage Plans</h3>
                <div id="plansList">Loading...</div>
            </div>
        </div>

        <!-- Exco Requests Panel -->
        <div id="excoPanel" class="panel">
            <div class="card">
                <h3>Exco Position Requests</h3>
                <div id="excoRequestsList">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        
        async function checkAuth() {
            const userStr = localStorage.getItem('ayf_user');
            if (!userStr) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(userStr);
            
            // Check admin access
            const { data: profile } = await supabase
                .from('profiles')
                .select('is_exco_parish, is_exco_archediceanry')
                .eq('id', currentUser.id)
                .single();
            
            if (!profile?.is_exco_parish && !profile?.is_exco_archediceanry) {
                alert('Access denied. Admin only.');
                window.location.href = 'home.html';
                return;
            }
            
            loadAllData();
        }
        
        async function loadAllData() {
            await loadPosts();
            await loadEvents();
            await loadNotices();
            await loadMinutes();
            await loadPlans();
            await loadExcoRequests();
        }
        
        // Media type toggle
        document.getElementById('postMediaType').addEventListener('change', function() {
            const mediaGroup = document.getElementById('postMediaGroup');
            mediaGroup.style.display = this.value === 'none' ? 'none' : 'block';
        });
        
        // Post form
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('postTitle').value;
            const description = document.getElementById('postDescription').value;
            const content = document.getElementById('postContent').value;
            const mediaType = document.getElementById('postMediaType').value;
            const mediaFile = document.getElementById('postMedia').files[0];
            
            let mediaUrl = null;
            
            if (mediaFile && mediaType !== 'none') {
                const fileExt = mediaFile.name.split('.').pop();
                const fileName = `posts/${Date.now()}_${Math.random()}.${fileExt}`;
                const { error: uploadError } = await supabase.storage
                    .from('post_media')
                    .upload(fileName, mediaFile);
                
                if (!uploadError) {
                    const { data: { publicUrl } } = supabase.storage
                        .from('post_media')
                        .getPublicUrl(fileName);
                    mediaUrl = publicUrl;
                }
            }
            
            const { error } = await supabase
                .from('posts')
                .insert([{
                    title, description, content,
                    media_url: mediaUrl,
                    media_type: mediaType,
                    post_type: 'post'
                }]);
            
            if (error) alert('Error: ' + error.message);
            else {
                alert('Post created!');
                document.getElementById('postForm').reset();
                loadPosts();
            }
        });
        
        // Event form
        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('eventTitle').value;
            const description = document.getElementById('eventDescription').value;
            const eventDate = document.getElementById('eventDate').value;
            
            const { error } = await supabase
                .from('posts')
                .insert([{
                    title, description,
                    event_date: eventDate,
                    post_type: 'event'
                }]);
            
            if (error) alert('Error: ' + error.message);
            else {
                alert('Event created!');
                document.getElementById('eventForm').reset();
                loadEvents();
            }
        });
        
        // Notice form
        document.getElementById('noticeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('noticeTitle').value;
            const content = document.getElementById('noticeContent').value;
            
            const { error } = await supabase
                .from('posts')
                .insert([{
                    title, description: content,
                    post_type: 'notice'
                }]);
            
            if (error) alert('Error: ' + error.message);
            else {
                alert('Notice published!');
                document.getElementById('noticeForm').reset();
                loadNotices();
            }
        });
        
        // Minutes form
        document.getElementById('minutesForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('minutesTitle').value;
            const minutesDate = document.getElementById('minutesDate').value;
            const file = document.getElementById('minutesFile').files[0];
            
            if (!file) return;
            
            const fileExt = file.name.split('.').pop();
            const fileName = `minutes/${Date.now()}_${Math.random()}.${fileExt}`;
            const { error: uploadError } = await supabase.storage
                .from('documents')
                .upload(fileName, file);
            
            if (uploadError) {
                alert('Upload error: ' + uploadError.message);
                return;
            }
            
            const { data: { publicUrl } } = supabase.storage
                .from('documents')
                .getPublicUrl(fileName);
            
            const { error } = await supabase
                .from('posts')
                .insert([{
                    title,
                    description: `Meeting Minutes - ${new Date(minutesDate).toLocaleDateString()}`,
                    media_url: publicUrl,
                    post_type: 'meeting_minutes'
                }]);
            
            if (error) alert('Error: ' + error.message);
            else {
                alert('Minutes uploaded!');
                document.getElementById('minutesForm').reset();
                loadMinutes();
            }
        });
        
        // Plan form
        document.getElementById('planForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('planTitle').value;
            const description = document.getElementById('planDescription').value;
            const year = parseInt(document.getElementById('planYear').value);
            const file = document.getElementById('planFile').files[0];
            
            if (!file) return;
            
            const fileExt = file.name.split('.').pop();
            const fileName = `plans/${year}_${title.replace(/\s/g, '_')}.${fileExt}`;
            const { error: uploadError } = await supabase.storage
                .from('documents')
                .upload(fileName, file);
            
            if (uploadError) {
                alert('Upload error: ' + uploadError.message);
                return;
            }
            
            const { data: { publicUrl } } = supabase.storage
                .from('documents')
                .getPublicUrl(fileName);
            
            const { error } = await supabase
                .from('plans')
                .insert([{ title, description, year, file_url: publicUrl }]);
            
            if (error) alert('Error: ' + error.message);
            else {
                alert('Plan uploaded!');
                document.getElementById('planForm').reset();
                loadPlans();
            }
        });
        
        // Load functions
        async function loadPosts() {
            const { data, error } = await supabase
                .from('posts')
                .select('*')
                .eq('post_type', 'post')
                .order('created_at', { ascending: false });
            
            if (error) return;
            renderList('postsList', data, 'post');
        }
        
        async function loadEvents() {
            const { data, error } = await supabase
                .from('posts')
                .select('*')
                .eq('post_type', 'event')
                .order('event_date', { ascending: true });
            
            if (error) return;
            renderList('eventsList', data, 'event');
        }
        
        async function loadNotices() {
            const { data, error } = await supabase
                .from('posts')
                .select('*')
                .eq('post_type', 'notice')
                .order('created_at', { ascending: false });
            
            if (error) return;
            renderList('noticesList', data, 'notice');
        }
        
        async function loadMinutes() {
            const { data, error } = await supabase
                .from('posts')
                .select('*')
                .eq('post_type', 'meeting_minutes')
                .order('created_at', { ascending: false });
            
            if (error) return;
            renderList('minutesList', data, 'minutes');
        }
        
        async function loadPlans() {
            const { data, error } = await supabase
                .from('plans')
                .select('*')
                .order('year', { ascending: false });
            
            if (error) return;
            
            const container = document.getElementById('plansList');
            if (!data?.length) {
                container.innerHTML = '<p>No plans yet.</p>';
                return;
            }
            
            container.innerHTML = '';
            data.forEach(plan => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="item-info">
                        <div class="item-title">${escapeHtml(plan.title)} (${plan.year})</div>
                        <div class="item-meta">${plan.description?.substring(0, 100) || ''}</div>
                    </div>
                    <div class="item-actions">
                        <button onclick="deletePlan('${plan.id}')" class="danger">Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        async function loadExcoRequests() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('exco_request_status', 'pending');
            
            if (error) return;
            
            const container = document.getElementById('excoRequestsList');
            if (!data?.length) {
                container.innerHTML = '<p>No pending requests.</p>';
                return;
            }
            
            container.innerHTML = '';
            data.forEach(req => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="item-info">
                        <div class="item-title">${escapeHtml(req.full_name)}</div>
                        <div class="item-meta">Parish: ${req.parish_name} | Email: ${req.email}</div>
                    </div>
                    <div class="item-actions">
                        <button onclick="approveExco('${req.id}')">Approve</button>
                        <button onclick="rejectExco('${req.id}')" class="danger">Reject</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        function renderList(elementId, items, type) {
            const container = document.getElementById(elementId);
            if (!items?.length) {
                container.innerHTML = '<p>No items yet.</p>';
                return;
            }
            
            container.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="item-info">
                        <div class="item-title">${escapeHtml(item.title)}</div>
                        <div class="item-meta">${new Date(item.created_at).toLocaleString()}</div>
                    </div>
                    <div class="item-actions">
                        <button onclick="deleteItem('${item.id}', '${type}')" class="danger">Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        window.deleteItem = async function(id, type) {
            if (!confirm('Delete this item?')) return;
            await supabase.from('posts').delete().eq('id', id);
            if (type === 'post') loadPosts();
            else if (type === 'event') loadEvents();
            else if (type === 'notice') loadNotices();
            else if (type === 'minutes') loadMinutes();
        };
        
        window.deletePlan = async function(id) {
            if (!confirm('Delete this plan?')) return;
            await supabase.from('plans').delete().eq('id', id);
            loadPlans();
        };
        
        window.approveExco = async function(userId) {
            await supabase
                .from('profiles')
                .update({ exco_request_status: 'approved' })
                .eq('id', userId);
            loadExcoRequests();
            alert('Request approved!');
        };
        
        window.rejectExco = async function(userId) {
            await supabase
                .from('profiles')
                .update({ exco_request_status: 'rejected', is_exco_parish: false, is_exco_archediceanry: false })
                .eq('id', userId);
            loadExcoRequests();
            alert('Request rejected.');
        };
        
        // Tab switching
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.panel + 'Panel').classList.add('active');
            });
        });
        
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            localStorage.clear();
            window.location.href = 'index.html';
        });
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        checkAuth();
    </script>
</body>
</html>
