<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AYF GWARIMPA - Parish Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: white;
        }

        /* WhatsApp-like header */
        .chat-header {
            background: #075e54;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 18px;
        }

        .chat-members {
            font-size: 12px;
            opacity: 0.8;
        }

        .chat-actions {
            display: flex;
            gap: 16px;
        }

        .chat-actions button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        /* Messages container */
        .messages-container {
            margin-top: 60px;
            margin-bottom: 70px;
            padding: 16px;
            height: calc(100vh - 130px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* Message bubbles - WhatsApp style */
        .message {
            max-width: 70%;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #075e54;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #1f2c34;
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.4;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .message-sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #6ab3f3;
        }

        /* Media in messages */
        .message-media {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 4px;
            cursor: pointer;
        }

        /* Reply indicator */
        .reply-indicator {
            background: rgba(255,255,255,0.1);
            padding: 6px 8px;
            border-radius: 8px;
            margin-bottom: 4px;
            font-size: 11px;
            border-left: 3px solid #6ab3f3;
        }

        /* Input area */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1f2c34;
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .attach-btn {
            background: none;
            border: none;
            color: #6ab3f3;
            font-size: 24px;
            cursor: pointer;
        }

        .message-input {
            flex: 1;
            background: #2a3942;
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            color: white;
            font-size: 14px;
            resize: none;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
        }

        .send-btn {
            background: none;
            border: none;
            color: #6ab3f3;
            font-size: 24px;
            cursor: pointer;
        }

        /* File preview modal */
        .file-preview {
            position: fixed;
            bottom: 70px;
            left: 16px;
            right: 16px;
            background: #1f2c34;
            border-radius: 12px;
            padding: 12px;
            display: none;
            z-index: 200;
        }

        /* Member list modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-header {
            background: #075e54;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
        }

        .modal-content {
            padding: 16px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #1f2c34;
            margin-bottom: 8px;
            border-radius: 8px;
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #075e54;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-weight: 600;
        }

        .member-role {
            font-size: 11px;
            opacity: 0.7;
        }

        .suspend-btn {
            padding: 6px 12px;
            background: #e74c3c;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        /* Footer navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #17212b;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid #2b3b4c;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #8e9eae;
            cursor: pointer;
            padding: 8px;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: #6ab3f3;
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-label {
            font-size: 11px;
        }

        @media (max-width: 768px) {
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="chat-info">
            <div class="chat-name" id="parishName">Loading...</div>
            <div class="chat-members" id="memberCount">0 members</div>
        </div>
        <div class="chat-actions">
            <button onclick="showMembers()">👥</button>
            <button onclick="searchMessages()">🔍</button>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <!-- Messages will load here -->
    </div>

    <div class="input-area">
        <button class="attach-btn" onclick="attachFile()">📎</button>
        <textarea class="message-input" id="messageInput" placeholder="Type a message" rows="1"></textarea>
        <button class="send-btn" onclick="sendMessage()">📤</button>
    </div>

    <div class="file-preview" id="filePreview">
        <div id="previewContent"></div>
        <button onclick="cancelFile()">Cancel</button>
        <button onclick="sendFile()">Send</button>
    </div>

    <div class="modal" id="membersModal" onclick="if(event.target === this) closeModal()">
        <div class="modal-header">
            <button class="back-btn" onclick="closeModal()">←</button>
            <div class="chat-name">Parish Members</div>
        </div>
        <div class="modal-content" id="membersList">
            <!-- Members will load here -->
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" onclick="navigateTo('home')">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">Home</div>
        </button>
        <button class="nav-item active" onclick="navigateTo('parish')">
            <div class="nav-icon">💬</div>
            <div class="nav-label">Parish</div>
        </button>
        <button class="nav-item" onclick="navigateTo('plan')">
            <div class="nav-icon">📅</div>
            <div class="nav-label">Plan</div>
        </button>
        <button class="nav-item" onclick="navigateTo('profile')">
            <div class="nav-icon">👤</div>
            <div class="nav-label">Profile</div>
        </button>
    </div>

    <script>
       const SUPABASE_URL = 'https://jvfdcuvinlimurlttiqy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2ZmRjdXZpbmxpbXVybHR0aXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Njk0MTAsImV4cCI6MjA5MTA0NTQxMH0.ipezUsKqsEAbHvRqBLZYhagZj57rFJKG36uQL_4rFSg'; // ⚠️ Replace with real key
   const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let currentProfile = null;
        let currentParish = null;
        let messagesSubscription = null;
        let pendingFile = null;
        let replyToMessage = null;
        
        // Check auth
        async function checkAuth() {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(userStr);
            currentProfile = JSON.parse(localStorage.getItem('profile') || '{}');
            currentParish = currentProfile.parish_name;
            
            document.getElementById('parishName').textContent = currentParish;
            await loadMembers();
            await loadMessages();
            await checkSuspension();
            subscribeToMessages();
        }
        
        // Check if user is suspended
        async function checkSuspension() {
            const { data: suspension, error } = await supabase
                .from('suspensions')
                .select('*')
                .eq('user_id', currentUser.id)
                .eq('parish_name', currentParish)
                .gt('suspension_end_date', new Date().toISOString())
                .single();
            
            if (suspension && !error) {
                const input = document.getElementById('messageInput');
                const sendBtn = document.querySelector('.send-btn');
                const attachBtn = document.querySelector('.attach-btn');
                input.disabled = true;
                input.placeholder = `You are suspended until ${new Date(suspension.suspension_end_date).toLocaleDateString()}`;
                sendBtn.disabled = true;
                attachBtn.disabled = true;
            }
        }
        
        // Load parish members
        async function loadMembers() {
            const { data: members, error } = await supabase
                .from('parish_members')
                .select('user_id, is_president')
                .eq('parish_name', currentParish);
            
            if (error) return;
            
            document.getElementById('memberCount').textContent = `${members.length} members`;
            
            // Load member profiles
            const memberProfiles = [];
            for (const member of members) {
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('id, full_name, profile_image_url, is_suspended')
                    .eq('id', member.user_id)
                    .single();
                
                if (profile) {
                    memberProfiles.push({
                        ...profile,
                        is_president: member.is_president
                    });
                }
            }
            
            // Render members in modal
            const membersList = document.getElementById('membersList');
            membersList.innerHTML = '';
            
            for (const member of memberProfiles) {
                const isPresident = currentProfile.is_exco_parish && member.is_president;
                const canSuspend = currentProfile.is_exco_parish && member.id !== currentUser.id;
                
                const memberDiv = document.createElement('div');
                memberDiv.className = 'member-item';
                memberDiv.innerHTML = `
                    <div class="member-avatar">${member.full_name.charAt(0)}</div>
                    <div class="member-info">
                        <div class="member-name">${escapeHtml(member.full_name)}</div>
                        <div class="member-role">${member.is_president ? 'Parish President' : 'Member'} ${member.is_suspended ? '(Suspended)' : ''}</div>
                    </div>
                    ${canSuspend && !member.is_suspended ? `
                        <button class="suspend-btn" onclick="suspendMember('${member.id}', '${member.full_name}')">Suspend</button>
                    ` : ''}
                    ${canSuspend && member.is_suspended ? `
                        <button class="suspend-btn" onclick="unsuspendMember('${member.id}')">Unsuspend</button>
                    ` : ''}
                `;
                membersList.appendChild(memberDiv);
            }
        }
        
        // Load messages
        async function loadMessages() {
            const { data: messages, error } = await supabase
                .from('parish_messages')
                .select('*')
                .eq('parish_name', currentParish)
                .order('created_at', { ascending: true });
            
            if (error) return;
            
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            for (const message of messages) {
                await renderMessage(message);
            }
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }
        
        // Render single message
        async function renderMessage(message) {
            const { data: profile } = await supabase
                .from('profiles')
                .select('full_name, profile_image_url')
                .eq('id', message.user_id)
                .single();
            
            const isSent = message.user_id === currentUser.id;
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            messageDiv.id = `message-${message.id}`;
            
            let mediaHtml = '';
            if (message.file_url) {
                if (message.file_type === 'image') {
                    mediaHtml = `<img src="${message.file_url}" class="message-media" onclick="viewMedia('${message.file_url}')">`;
                } else if (message.file_type === 'video') {
                    mediaHtml = `<video src="${message.file_url}" class="message-media" controls></video>`;
                } else {
                    mediaHtml = `<a href="${message.file_url}" download>📎 Download File</a>`;
                }
            }
            
            let replyHtml = '';
            if (message.reply_to_id) {
                const { data: repliedMessage } = await supabase
                    .from('parish_messages')
                    .select('message, file_url')
                    .eq('id', message.reply_to_id)
                    .single();
                
                if (repliedMessage) {
                    replyHtml = `<div class="reply-indicator">↩️ ${repliedMessage.message?.substring(0, 50) || 'Media'}</div>`;
                }
            }
            
            messageDiv.innerHTML = `
                <div class="message-bubble" onclick="showMessageActions('${message.id}')">
                    ${!isSent ? `<div class="message-sender">${escapeHtml(profile?.full_name || 'User')}</div>` : ''}
                    ${replyHtml}
                    <div class="message-text">${escapeHtml(message.message || '')}</div>
                    ${mediaHtml}
                    <div class="message-time">${new Date(message.created_at).toLocaleTimeString()}</div>
                </div>
            `;
            
            document.getElementById('messagesContainer').appendChild(messageDiv);
        }
        
        // Send message
        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message && !pendingFile) return;
            
            try {
                const messageData = {
                    parish_name: currentParish,
                    user_id: currentUser.id,
                    message: message || null,
                    reply_to_id: replyToMessage
                };
                
                const { error } = await supabase
                    .from('parish_messages')
                    .insert([messageData]);
                
                if (error) throw error;
                
                input.value = '';
                replyToMessage = null;
                await loadMessages();
                
                // Auto-delete old messages (30 days)
                await cleanupOldMessages();
                
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Failed to send message');
            }
        };
        
        // Attach file
        window.attachFile = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,video/*,.pdf,.doc,.docx';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    pendingFile = file;
                    const preview = document.getElementById('previewContent');
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            preview.innerHTML = `<img src="${e.target.result}" style="max-width: 100%; border-radius: 8px;">`;
                        };
                        reader.readAsDataURL(file);
                    } else {
                        preview.innerHTML = `<p>${file.name}</p>`;
                    }
                    document.getElementById('filePreview').style.display = 'block';
                }
            };
            input.click();
        };
        
        // Send file
        window.sendFile = async function() {
            if (!pendingFile) return;
            
            try {
                // Upload file to storage
                const fileExt = pendingFile.name.split('.').pop();
                const fileName = `${currentParish}/${Date.now()}_${Math.random()}.${fileExt}`;
                const { data, error } = await supabase.storage
                    .from('parish_files')
                    .upload(fileName, pendingFile);
                
                if (error) throw error;
                
                const { data: { publicUrl } } = supabase.storage
                    .from('parish_files')
                    .getPublicUrl(fileName);
                
                let fileType = 'document';
                if (pendingFile.type.startsWith('image/')) fileType = 'image';
                if (pendingFile.type.startsWith('video/')) fileType = 'video';
                
                const { error: messageError } = await supabase
                    .from('parish_messages')
                    .insert([{
                        parish_name: currentParish,
                        user_id: currentUser.id,
                        file_url: publicUrl,
                        file_type: fileType,
                        reply_to_id: replyToMessage
                    }]);
                
                if (messageError) throw messageError;
                
                pendingFile = null;
                document.getElementById('filePreview').style.display = 'none';
                document.getElementById('previewContent').innerHTML = '';
                await loadMessages();
                
            } catch (error) {
                console.error('Error sending file:', error);
                alert('Failed to send file');
            }
        };
        
        window.cancelFile = function() {
            pendingFile = null;
            document.getElementById('filePreview').style.display = 'none';
            document.getElementById('previewContent').innerHTML = '';
        };
        
        // Suspend member
        window.suspendMember = async function(userId, userName) {
            const duration = prompt('Select suspension duration:\n1 - 7 days\n2 - 15 days\n3 - 30 days\n4 - 1 year\nEnter number:', '1');
            
            let days;
            switch(duration) {
                case '1': days = 7; break;
                case '2': days = 15; break;
                case '3': days = 30; break;
                case '4': days = 365; break;
                default: return;
            }
            
            const endDate = new Date();
            endDate.setDate(endDate.getDate() + days);
            
            try {
                // Update profile suspension
                await supabase
                    .from('profiles')
                    .update({ is_suspended: true, suspension_end_date: endDate.toISOString() })
                    .eq('id', userId);
                
                // Add suspension record
                await supabase
                    .from('suspensions')
                    .insert([{
                        user_id: userId,
                        parish_name: currentParish,
                        suspended_by: currentUser.id,
                        duration_days: days,
                        suspension_end_date: endDate.toISOString()
                    }]);
                
                alert(`${userName} suspended for ${days} days`);
                await loadMembers();
                
                // Send system message
                await supabase
                    .from('parish_messages')
                    .insert([{
                        parish_name: currentParish,
                        user_id: currentUser.id,
                        message: `⚠️ ${userName} has been suspended for ${days} days`
                    }]);
                
            } catch (error) {
                console.error('Error suspending member:', error);
                alert('Failed to suspend member');
            }
        };
        
        // Unsuspend member
        window.unsuspendMember = async function(userId) {
            if (!confirm('Unsuspend this member?')) return;
            
            try {
                await supabase
                    .from('profiles')
                    .update({ is_suspended: false, suspension_end_date: null })
                    .eq('id', userId);
                
                await supabase
                    .from('suspensions')
                    .delete()
                    .eq('user_id', userId)
                    .eq('parish_name', currentParish);
                
                alert('Member unsuspended');
                await loadMembers();
                
            } catch (error) {
                console.error('Error unsuspending member:', error);
                alert('Failed to unsuspend member');
            }
        };
        
        // Message actions (reply, copy, delete)
        window.showMessageActions = function(messageId) {
            const action = prompt('Choose action:\n1 - Reply\n2 - Copy\n3 - Delete (admin only)');
            
            switch(action) {
                case '1':
                    replyToMessage = messageId;
                    document.getElementById('messageInput').placeholder = 'Replying to message...';
                    break;
                case '2':
                    const messageEl = document.getElementById(`message-${messageId}`);
                    const text = messageEl?.querySelector('.message-text')?.textContent;
                    if (text) {
                        navigator.clipboard.writeText(text);
                        alert('Copied to clipboard');
                    }
                    break;
                case '3':
                    if (currentProfile.is_exco_parish) {
                        if (confirm('Delete this message?')) {
                            supabase.from('parish_messages').delete().eq('id', messageId);
                        }
                    } else {
                        alert('Only admin can delete messages');
                    }
                    break;
            }
        };
        
        // Cleanup old messages (30 days)
        async function cleanupOldMessages() {
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            await supabase
                .from('parish_messages')
                .delete()
                .lt('created_at', thirtyDaysAgo.toISOString());
        }
        
        // Subscribe to real-time messages
        function subscribeToMessages() {
            messagesSubscription = supabase
                .channel('parish_messages')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'parish_messages',
                    filter: `parish_name=eq.${currentParish}`
                }, (payload) => {
                    renderMessage(payload.new);
                    const container = document.getElementById('messagesContainer');
                    container.scrollTop = container.scrollHeight;
                })
                .subscribe();
        }
        
        window.viewMedia = function(url) {
            window.open(url, '_blank');
        };
        
        window.searchMessages = function() {
            const searchTerm = prompt('Search messages:');
            if (searchTerm) {
                const messages = document.querySelectorAll('.message-text');
                messages.forEach(msg => {
                    if (msg.textContent.toLowerCase().includes(searchTerm.toLowerCase())) {
                        msg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        msg.style.backgroundColor = '#075e54';
                        setTimeout(() => {
                            msg.style.backgroundColor = '';
                        }, 2000);
                    }
                });
            }
        };
        
        window.showMembers = function() {
            document.getElementById('membersModal').style.display = 'block';
        };
        
        window.closeModal = function() {
            document.getElementById('membersModal').style.display = 'none';
        };
        
        window.goBack = function() {
            window.location.href = 'home.html';
        };
        
        window.navigateTo = function(page) {
            if (messagesSubscription) {
                messagesSubscription.unsubscribe();
            }
            switch(page) {
                case 'home':
                    window.location.href = 'home.html';
                    break;
                case 'parish':
                    window.location.href = 'parish.html';
                    break;
                case 'plan':
                    window.location.href = 'plan.html';
                    break;
                case 'profile':
                    window.location.href = 'profile.html';
                    break;
            }
        };
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Auto-resize textarea
        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        // Send on Enter (Shift+Enter for new line)
        textarea.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        checkAuth();
    </script>
</body>
</html>
