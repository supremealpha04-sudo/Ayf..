<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AYF GWARIMPA - Parish Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* WhatsApp-style header */
        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
        }

        .chat-status {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Messages container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><path d="M10,10 L90,10 M10,30 L90,30 M10,50 L90,50 M10,70 L90,70 M10,90 L90,90 M10,10 L10,90 M30,10 L30,90 M50,10 L50,90 M70,10 L70,90 M90,10 L90,90" stroke="white" stroke-width="1"/></svg>');
            background-repeat: repeat;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-items: flex-end;
        }

        .message.received {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #075e54;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #1f2c34;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-info {
            font-size: 11px;
            margin-top: 4px;
            color: #8696a0;
            display: flex;
            gap: 8px;
        }

        .message-media {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 5px;
        }

        /* Input area */
        .input-area {
            background: #1f2c34;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .attach-btn {
            background: none;
            border: none;
            color: #8696a0;
            font-size: 24px;
            cursor: pointer;
        }

        .message-input {
            flex: 1;
            background: #2a3942;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            color: white;
            font-size: 15px;
        }

        .send-btn {
            background: none;
            border: none;
            color: #8696a0;
            font-size: 24px;
            cursor: pointer;
        }

        .send-btn.active {
            color: #075e54;
        }

        /* Reply preview */
        .reply-preview {
            background: #2a3942;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            border-left: 3px solid #075e54;
        }

        /* Bottom nav */
        .bottom-nav {
            background: #1f2c34;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #2a3942;
        }

        .nav-item {
            text-align: center;
            color: #8696a0;
            text-decoration: none;
            font-size: 12px;
        }

        .nav-item.active {
            color: #075e54;
        }

        .nav-icon {
            font-size: 24px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <button class="back-btn" onclick="window.location.href='home.html'">←</button>
        <div class="chat-info">
            <div class="chat-name" id="parish-name">Loading...</div>
            <div class="chat-status" id="chat-status">Online</div>
        </div>
        <button class="attach-btn" onclick="showMembers()">👥</button>
    </div>

    <div class="messages-container" id="messages-container"></div>

    <div class="input-area" id="input-area">
        <button class="attach-btn" onclick="attachFile()">📎</button>
        <div style="flex:1">
            <div id="reply-preview" class="reply-preview" style="display: none;"></div>
            <input type="text" class="message-input" id="message-input" placeholder="Type a message">
        </div>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">📤</button>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="parish.html" class="nav-item active">
            <span class="nav-icon">💬</span>
            <span>Parish</span>
        </a>
        <a href="#" class="nav-item" onclick="showPlans()">
            <span class="nav-icon">📅</span>
            <span>Plan</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        let currentUser = null;
        let currentParish = null;
        let currentReplyTo = null;
        let messagesSubscription = null;

        async function loadUserAndParish() {
            const { data: { user } } = await supabase.auth.getUser();
            currentUser = user;
            if(!user) window.location.href = 'index.html';
            
            // Get user's parish
            const { data: profile } = await supabase
                .from('profiles')
                .select('parish_name')
                .eq('id', currentUser.id)
                .single();
            
            currentParish = profile.parish_name;
            document.getElementById('parish-name').textContent = currentParish;
            
            // Check if user is suspended
            const { data: suspension } = await supabase
                .from('suspensions')
                .select('suspended_until')
                .eq('user_id', currentUser.id)
                .eq('parish_name', currentParish)
                .gt('suspended_until', new Date().toISOString())
                .single();
            
            if(suspension) {
                document.getElementById('input-area').style.display = 'none';
                document.getElementById('chat-status').textContent = `Suspended until ${new Date(suspension.suspended_until).toLocaleDateString()}`;
            }
            
            loadMessages();
            setupRealtime();
        }

        async function loadMessages() {
            // Get parish_id first
            const { data: parish } = await supabase
                .from('parishes')
                .select('id')
                .eq('name', currentParish)
                .single();
            
            const { data: messages } = await supabase
                .from('parish_messages')
                .select(`
                    *,
                    profiles:user_id(full_name, avatar_url),
                    reply_to:parish_messages(
                        message,
                        profiles:user_id(full_name)
                    )
                `)
                .eq('parish_id', parish.id)
                .order('created_at', { ascending: true });
            
            renderMessages(messages);
        }

        function renderMessages(messages) {
            const container = document.getElementById('messages-container');
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.user_id === currentUser.id ? 'sent' : 'received'}" onclick="setReplyTo('${msg.id}', '${msg.message.substring(0, 50)}')">
                    ${msg.reply_to ? `
                        <div class="reply-preview" style="margin-bottom: 4px; background: rgba(0,0,0,0.1)">
                            ↪️ ${msg.reply_to.profiles?.full_name}: ${msg.reply_to.message}
                        </div>
                    ` : ''}
                    <div class="message-bubble">
                        <strong style="font-size: 12px;">${msg.user_id === currentUser.id ? 'You' : msg.profiles?.full_name}</strong><br>
                        ${msg.message || ''}
                        ${msg.file_url ? `
                            ${msg.file_type === 'image' ? `<img src="${msg.file_url}" class="message-media" onclick="window.open('${msg.file_url}')">` : ''}
                            ${msg.file_type === 'video' ? `<video src="${msg.file_url}" controls class="message-media"></video>` : ''}
                            ${msg.file_type === 'document' ? `<a href="${msg.file_url}" download style="color: #075e54;">📄 Download Document</a>` : ''}
                        ` : ''}
                    </div>
                    <div class="message-info">
                        <span>${new Date(msg.created_at).toLocaleTimeString()}</span>
                        ${msg.user_id === currentUser.id ? '<span>✓✓</span>' : ''}
                    </div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function setupRealtime() {
            if(messagesSubscription) messagesSubscription.unsubscribe();
            
            messagesSubscription = supabase
                .channel('parish-messages')
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'parish_messages' 
                }, payload => {
                    loadMessages();
                })
                .subscribe();
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if(!message && !currentFile) return;
            
            // Check suspension again
            const { data: suspension } = await supabase
                .from('suspensions')
                .select()
                .eq('user_id', currentUser.id)
                .gt('suspended_until', new Date().toISOString())
                .single();
            
            if(suspension) {
                alert(`You are suspended until ${new Date(suspension.suspended_until).toLocaleDateString()}`);
                return;
            }
            
            const { data: parish } = await supabase
                .from('parishes')
                .select('id')
                .eq('name', currentParish)
                .single();
            
            const messageData = {
                parish_id: parish.id,
                user_id: currentUser.id,
                message: message,
                reply_to: currentReplyTo
            };
            
            if(currentFile) {
                // Upload file
                const fileExt = currentFile.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;
                const { data: uploadData } = await supabase.storage
                    .from('parish-files')
                    .upload(fileName, currentFile);
                
                if(uploadData) {
                    messageData.file_url = supabase.storage.from('parish-files').getPublicUrl(fileName).data.publicUrl;
                    messageData.file_type = currentFile.type.startsWith('image/') ? 'image' : 
                                           currentFile.type.startsWith('video/') ? 'video' : 'document';
                }
                currentFile = null;
            }
            
            await supabase.from('parish_messages').insert([messageData]);
            
            input.value = '';
            currentReplyTo = null;
            document.getElementById('reply-preview').style.display = 'none';
        }

        let currentFile = null;
        function attachFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,video/*,application/pdf,.doc,.docx';
            input.onchange = (e) => {
                currentFile = e.target.files[0];
                document.getElementById('message-input').placeholder = `File selected: ${currentFile.name}`;
                document.getElementById('send-btn').classList.add('active');
            };
            input.click();
        }

        function setReplyTo(messageId, preview) {
            currentReplyTo = messageId;
            const previewDiv = document.getElementById('reply-preview');
            previewDiv.innerHTML = `↪️ Replying to: ${preview} <button onclick="cancelReply()">❌</button>`;
            previewDiv.style.display = 'block';
        }

        function cancelReply() {
            currentReplyTo = null;
            document.getElementById('reply-preview').style.display = 'none';
        }

        function showMembers() {
            alert('Members list - Feature coming');
        }

        function showPlans() {
            alert('Yearly Plans - Feature coming');
        }

        // Auto-delete old messages (30 days) - Run via cron or edge function
        async function cleanupOldMessages() {
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            await supabase
                .from('parish_messages')
                .delete()
                .lt('created_at', thirtyDaysAgo.toISOString());
        }

        // Enter to send
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });

        loadUserAndParish();
        
        // Cleanup old messages daily
        setInterval(cleanupOldMessages, 24 * 60 * 60 * 1000);
    </script>
</body>
</html>
