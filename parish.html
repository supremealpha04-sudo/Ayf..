            if (suspension) {
                isSuspended = true;
                const banner = document.getElementById('suspensionBanner');
                const timer = document.getElementById('suspensionTimer');
                const inputArea = document.getElementById('inputArea');
                
                banner.classList.add('active');
                inputArea.style.display = 'none';
                
                const expiry = new Date(suspension.expires_at);
                const updateTimer = () => {
                    const diff = expiry - new Date();
                    if (diff <= 0) {
                        location.reload();
                        return;
                    }
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    timer.textContent = `Expires in: ${days}d ${hours}h`;
                };
                updateTimer();
                setInterval(updateTimer, 60000);
            }
        }

        async function loadParish() {
            const { data: parish } = await supabase
                .from('parishes')
                .select('*')
                .eq('name', currentUser.parish)
                .single();

            if (parish) {
                parishData = parish;
                document.getElementById('parishName').textContent = parish.name;
                document.getElementById('parishAvatar').src = parish.image || 'https://via.placeholder.com/40';
            }

            // Count members
            const { count } = await supabase
                .from('users')
                .select('*', { count: 'exact' })
                .eq('parish', currentUser.parish);

            document.getElementById('memberCount').textContent = `${count} members`;

        async function loadMessages() {
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

            const { data: msgs, error } = await supabase
                .from('parish_messages')
                .select(`
                    *,
                    sender:users(id, full_name, profile_image)
                `)
                .eq('parish', currentUser.parish)
                .gte('created_at', thirtyDaysAgo.toISOString())
                .order('created_at', { ascending: true });

            if (error) {
                console.error('Error loading messages:', error);
                return;
            }

            messages = msgs || [];
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('chatContainer');
            let currentDate = null;
            let html = '';

            messages.forEach(msg => {
                const msgDate = new Date(msg.created_at).toDateString();
                if (msgDate !== currentDate) {
                    currentDate = msgDate;
                    html += `<div class="date-divider"><span>${formatDate(msg.created_at)}</span></div>`;
                }

                const isOwn = msg.sender_id === currentUser.id;
                html += createMessageHTML(msg, isOwn);
            });

            container.innerHTML = html;
            scrollToBottom();
        }

        function createMessageHTML(msg, isOwn) {
            const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let contentHTML = '';
            
            if (msg.reply_to) {
                const replyMsg = messages.find(m => m.id === msg.reply_to);
                if (replyMsg) {
                    contentHTML += `
                        <div class="reply-reference">
                            <div class="reply-sender">${replyMsg.sender?.full_name || 'Unknown'}</div>
                            <div class="reply-text">${replyMsg.content || 'Media'}</div>
                        </div>
                    `;
                }
            }

            if (msg.media_url) {
                if (msg.media_type === 'image') {
                    contentHTML += `<img src="${msg.media_url}" class="message-media" onclick="viewMedia('${msg.media_url}')">`;
                } else if (msg.media_type === 'video') {
                    contentHTML += `
                        <video class="message-media" controls>
                            <source src="${msg.media_url}" type="video/mp4">
                        </video>
                    `;
                }
            } else if (msg.file_url) {
                contentHTML += `
                    <div class="message-file" onclick="downloadFile('${msg.file_url}', '${msg.file_name}')">
                        <div class="file-icon">
                            <i class="fas fa-file"></i>
                        </div>
                        <div class="file-info">
                            <div class="file-name">${msg.file_name}</div>
                            <div class="file-size">${formatFileSize(msg.file_size)}</div>
                        </div>
                    </div>
                `;
            }

            if (msg.content) {
                contentHTML += `<div class="message-text">${msg.content}</div>`;
            }

            return `
                <div class="message ${isOwn ? 'own' : ''}" data-message-id="${msg.id}" oncontextmenu="showContextMenu(event, '${msg.id}')">
                    <div class="message-bubble">
                        ${!isOwn ? `<div class="message-sender">${msg.sender?.full_name || 'Unknown'}</div>` : ''}
                        ${contentHTML}
                        <div class="message-meta">
                            <span class="message-time">${time}</span>
                            ${isOwn ? `<span class="message-status"><i class="fas fa-check-double"></i></span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        async function sendMessage() {
            if (isSuspended) return;

            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content && !window.pendingFile) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            let mediaUrl = null;
            let mediaType = null;
            let fileUrl = null;
            let fileName = null;
            let fileSize = null;

            // Handle file upload
            if (window.pendingFile) {
                const file = window.pendingFile;
                const fileExt = file.name.split('.').pop();
                const filePath = `${currentUser.parish}/${Date.now()}-${file.name}`;

                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('parish-media')
                    .upload(filePath, file);

                if (!uploadError) {
                    const { data: urlData } = supabase.storage
                        .from('parish-media')
                        .getPublicUrl(filePath);

                    if (file.type.startsWith('image/')) {
                        mediaUrl = urlData.publicUrl;
                        mediaType = 'image';
                    } else if (file.type.startsWith('video/')) {
                        mediaUrl = urlData.publicUrl;
                        mediaType = 'video';
                    } else {
                        fileUrl = urlData.publicUrl;
                        fileName = file.name;
                        fileSize = file.size;
                    }
                }

                window.pendingFile = null;
            }

            // Insert message
            const { error } = await supabase
                .from('parish_messages')
                .insert([{
                    parish: currentUser.parish,
                    sender_id: currentUser.id,
                    content,
                    reply_to: replyingTo,
                    media_url: mediaUrl,
                    media_type: mediaType,
                    file_url: fileUrl,
                    file_name: fileName,
                    file_size: fileSize,
                    created_at: new Date().toISOString()
                }]);

            if (error) {
                console.error('Error sending message:', error);
            }

            input.value = '';
            cancelReply();
            sendBtn.disabled = false;
            input.style.height = 'auto';
        }

        function setupTextarea() {
            const textarea = document.getElementById('messageInput');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            });

            textarea.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) return 'Today';
            if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function formatFileSize(bytes) {

            return Math.round(bytes / (1024 * 1024) * 10) / 10 + ' MB';
        }
