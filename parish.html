<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Parish Community | AYF Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            height: 100vh;
            overflow: hidden;
            padding-bottom: 0;
        }
        .header {
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-links { display: flex; gap: 1rem; }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }
        .chat-container {
            display: flex;
            height: 100vh;
            padding-top: 70px;
        }
        .sidebar {
            width: 300px;
            background: rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .parish-list { flex: 1; overflow-y: auto; }
        .parish-item {
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .parish-item:hover, .parish-item.active { background: rgba(102,126,234,0.2); }
        .parish-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .parish-info { flex: 1; }
        .parish-name { font-weight: 600; }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            display: flex;
            gap: 0.8rem;
            max-width: 70%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .message-bubble {
            background: rgba(255,255,255,0.1);
            padding: 0.8rem;
            border-radius: 15px;
            max-width: 100%;
        }
        .message.sent .message-bubble { background: linear-gradient(135deg, #667eea, #764ba2); }
        .message-sender { font-size: 0.7rem; opacity: 0.7; margin-bottom: 0.3rem; }
        .leadership-tag {
            font-size: 0.6rem;
            padding: 0.1rem 0.3rem;
            background: #48bb78;
            border-radius: 50px;
            margin-left: 0.3rem;
        }
        .message-time { font-size: 0.6rem; opacity: 0.5; margin-top: 0.3rem; }
        .input-area {
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .input-area input {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .send-btn {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
        }
        .empty-state { text-align: center; padding: 3rem; opacity: 0.5; }
        .menu-toggle { display: none; background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        .loading { text-align: center; padding: 2rem; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -300px;
                top: 70px;
                bottom: 0;
                z-index: 200;
                transition: left 0.3s;
                background: #1a1a2e;
            }
            .sidebar.open { left: 0; }
            .message { max-width: 85%; }
            .menu-toggle { display: block; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="logo" onclick="window.location.href='index.html'">
                <div class="logo-icon">⛪</div>
                <h3>Parish Hub</h3>
            </div>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="plan.html">Plan</a>
            <a href="parish.html">Parish</a>
            <a href="profile.html">Profile</a>
        </div>
    </header>

    <div class="chat-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header"><h4>Communities</h4></div>
            <div class="parish-list" id="parishList"></div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="chatHeader">
                <h3 id="currentParishName">Select a Parish</h3>
                <p id="memberStatus" style="font-size:0.8rem; opacity:0.7;">Choose a community to start chatting</p>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="empty-state"><i class="fas fa-comments" style="font-size:3rem;"></i><p>Select a parish to join the conversation</p></div>
            </div>
            <div class="input-area" id="inputArea" style="display:none;">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="supabase/client.js"></script>
    <script>
        let currentUser = null;
        let currentProfile = null;
        let currentParish = null;
        let isASquared = false;
        let messagesSubscription = null;

        const PARISHES = [
            "St. Mathus Anglican Church",
            "St. Philip Anglican Church",
            "St. Barnabas Jaiyuan"
        ];

        async function init() {
            const isLoggedIn = await window.checkAuth(true);
            if (!isLoggedIn) return;
            
            currentUser = window.appState.currentUser;
            currentProfile = window.appState.currentProfile;
            isASquared = window.appState.isASquared;
            
            loadParishes();
            setupEventListeners();
        }

        function loadParishes() {
            const parishList = document.getElementById('parishList');
            const displayParishes = isASquared ? PARISHES : [currentProfile?.parish];
            
            parishList.innerHTML = displayParishes.map(parish => `
                <div class="parish-item" data-parish="${parish}" onclick="selectParish('${parish}')">
                    <div class="parish-avatar"><i class="fas fa-church"></i></div>
                    <div class="parish-info">
                        <div class="parish-name">${parish}</div>
                        <div class="parish-status">${parish === currentProfile?.parish ? 'Your Parish' : 'A-Squared Access'}</div>
                    </div>
                </div>
            `).join('');
        }

        async function selectParish(parish) {
            currentParish = parish;
            document.getElementById('currentParishName').innerHTML = parish;
            document.getElementById('memberStatus').innerHTML = '<i class="fas fa-circle" style="color:#48bb78; font-size:0.6rem;"></i> Active community';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('messagesArea').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            document.querySelectorAll('.parish-item').forEach(item => {
                item.classList.toggle('active', item.dataset.parish === parish);
            });
            
            await loadMessages();
            setupRealtimeMessages();
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        async function loadMessages() {
            const { data: messages } = await supabaseClient
                .from('a_squared_messages')
                .select('*, profiles(full_name, leadership_tag)')
                .eq('parish', currentParish)
                .order('created_at', { ascending: true });
            
            displayMessages(messages);
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesArea');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-comment-dots" style="font-size:3rem;"></i><p>No messages yet. Start the conversation!</p></div>`;
                return;
            }
            
            container.innerHTML = messages.map(msg => {
                const isSent = msg.user_id === currentUser?.id;
                const leadershipTag = msg.profiles?.leadership_tag ? `<span class="leadership-tag">${msg.profiles.leadership_tag}</span>` : '';
                
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="message-avatar">${msg.profiles?.full_name?.[0] || 'U'}</div>
                        <div class="message-bubble">
                            ${!isSent ? `<div class="message-sender">${msg.profiles?.full_name || 'Member'} ${leadershipTag}</div>` : ''}
                            <div>${escapeHtml(msg.message)}</div>
                            ${msg.file_url ? `<a href="${msg.file_url}" target="_blank" style="color:#667eea;">📎 Attachment</a>` : ''}
                            <div class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            if (!currentParish) return;
            
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            const { error } = await supabaseClient
                .from('a_squared_messages')
                .insert([{
                    user_id: currentUser.id,
                    parish: currentParish,
                    message: message
                }]);
            
            if (!error) {
                input.value = '';
                await loadMessages();
            }
        }

        function setupRealtimeMessages() {
            if (messagesSubscription) {
                supabaseClient.removeChannel(messagesSubscription);
            }
            
            messagesSubscription = supabaseClient
                .channel(`parish-${currentParish}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'a_squared_messages',
                    filter: `parish=eq.${currentParish}`
                }, () => loadMessages())
                .subscribe();
        }

        function setupEventListeners() {
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            
            document.getElementById('menuToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.selectParish = selectParish;
        init();
    </script>
</body>
</html>
