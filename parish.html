<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Parish Chat | AYF Gwarimpa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            height: 100vh;
            overflow: hidden;
        }
        /* Header */
        .header {
            background: #075E54;
            padding: 0.8rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        .chat-info { flex: 1; }
        .chat-info h3 { font-size: 1rem; }
        .chat-info p { font-size: 0.7rem; opacity: 0.8; }
        .online-dot { width: 8px; height: 8px; background: #25D366; border-radius: 50%; display: inline-block; margin-right: 0.3rem; }
        
        /* Chat Area */
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 60px); }
        .messages-area { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .message {
            display: flex;
            gap: 0.5rem;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        .message.sent { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar {
            width: 35px; height: 35px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .message-bubble {
            background: #1f2c34;
            padding: 0.6rem 1rem;
            border-radius: 18px;
            max-width: 100%;
        }
        .message.sent .message-bubble { background: #005C4B; }
        .message-sender { font-size: 0.7rem; opacity: 0.7; margin-bottom: 0.2rem; }
        .leadership-tag {
            font-size: 0.6rem; padding: 0.1rem 0.3rem;
            background: #48bb78; border-radius: 50px;
            margin-left: 0.3rem;
        }
        .message-time { font-size: 0.6rem; opacity: 0.5; margin-top: 0.2rem; text-align: right; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Input Area */
        .input-area {
            background: #1f2c34;
            padding: 0.8rem;
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid #2a3942;
        }
        .input-area input {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 25px;
            background: #2a3942;
            color: white;
            font-family: inherit;
        }
        .send-btn {
            width: 45px; height: 45px;
            border: none;
            border-radius: 50%;
            background: #25D366;
            color: white;
            cursor: pointer;
        }
        .attach-btn {
            width: 45px; height: 45px;
            border: none;
            border-radius: 50%;
            background: #2a3942;
            color: white;
            cursor: pointer;
        }
        
        /* Parish Selector Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1f2c34;
            border-radius: 20px;
            padding: 1.5rem;
            width: 90%;
            max-width: 350px;
        }
        .parish-option {
            padding: 1rem;
            margin: 0.5rem 0;
            background: #2a3942;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
        }
        .parish-option:hover { background: #3b4a54; }
        
        .footer-nav {
            display: none;
        }
        
        @media (max-width: 768px) {
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
        <div class="chat-info">
            <h3 id="chatTitle">Select a Parish</h3>
            <p><span class="online-dot"></span> <span id="memberCount">0</span> members online</p>
        </div>
        <button class="back-btn" onclick="showParishSelector()"><i class="fas fa-users"></i></button>
    </div>

    <div class="chat-container">
        <div class="messages-area" id="messagesArea">
            <div style="text-align:center; padding:2rem; opacity:0.5;">
                <i class="fas fa-comments" style="font-size:3rem;"></i>
                <p>Select a parish to start chatting</p>
            </div>
        </div>
        <div class="input-area" id="inputArea" style="display:none;">
            <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="modal" id="parishModal">
        <div class="modal-content">
            <h3 style="margin-bottom:1rem;">Select Parish</h3>
            <div class="parish-option" onclick="selectParish('St. Mathus Anglican Church')">St. Mathus Anglican Church</div>
            <div class="parish-option" onclick="selectParish('St. Philip Anglican Church')">St. Philip Anglican Church</div>
            <div class="parish-option" onclick="selectParish('St. Barnabas Jaiyuan')">St. Barnabas Jaiyuan</div>
            <button class="send-btn" style="margin-top:1rem; width:100%;" onclick="closeParishSelector()">Cancel</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jvfdcuvinlimurlttiqy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2ZmRjdXZpbmxpbXVybHR0aXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Njk0MTAsImV4cCI6MjA5MTA0NTQxMH0.ipezUsKqsEAbHvRqBLZYhagZj57rFJKG36uQL_4rFSg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let currentParish = null;
        let currentProfile = null;
        
        // Sample messages data
        const messagesData = {
            "St. Mathus Anglican Church": [
                { sender: "John Okonkwo", message: "Good morning everyone! Welcome to St. Mathus Parish chat.", time: "10:30 AM", tag: "President - St. Mathus", isSent: false },
                { sender: "Mary Okafor", message: "Don't forget our Bible study today at 6pm!", time: "11:00 AM", tag: "Secretary - St. Mathus", isSent: false },
                { sender: "You", message: "I'll be there!", time: "11:05 AM", tag: null, isSent: true }
            ],
            "St. Philip Anglican Church": [
                { sender: "David Nnamdi", message: "Happy new week family! Stay blessed.", time: "9:00 AM", tag: "President - St. Philip", isSent: false },
                { sender: "Sarah Obi", message: "Harvest thanksgiving planning meeting today at 3pm.", time: "10:00 AM", tag: "PRO - St. Philip", isSent: false }
            ],
            "St. Barnabas Jaiyuan": [
                { sender: "Emeka Okafor", message: "Leadership training this Saturday. All executives must attend.", time: "8:00 AM", tag: "President - St. Barnabas", isSent: false },
                { sender: "Chidinma Eze", message: "Prayer meeting at 6pm today. Join us!", time: "9:30 AM", tag: "Secretary - St. Barnabas", isSent: false }
            ]
        };
        
        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'auth.html';
                return;
            }
            currentUser = session.user;
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
            currentProfile = profile;
            // Auto-select user's parish
            if (profile?.parish) {
                selectParish(profile.parish);
            } else {
                showParishSelector();
            }
        }
        
        function showParishSelector() {
            document.getElementById('parishModal').style.display = 'flex';
        }
        
        function closeParishSelector() {
            document.getElementById('parishModal').style.display = 'none';
        }
        
        function selectParish(parish) {
            currentParish = parish;
            document.getElementById('chatTitle').innerHTML = parish;
            document.getElementById('inputArea').style.display = 'flex';
            closeParishSelector();
            loadMessages();
        }
        
        function loadMessages() {
            const messages = messagesData[currentParish] || [];
            const container = document.getElementById('messagesArea');
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.isSent ? 'sent' : 'received'}">
                    <div class="message-avatar">${msg.sender[0]}</div>
                    <div class="message-bubble">
                        ${!msg.isSent ? `<div class="message-sender">${msg.sender}${msg.tag ? `<span class="leadership-tag">${msg.tag}</span>` : ''}</div>` : ''}
                        <div>${msg.message}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !currentParish) return;
            
            if (!messagesData[currentParish]) messagesData[currentParish] = [];
            messagesData[currentParish].push({
                sender: currentProfile?.full_name || 'You',
                message: message,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                tag: currentProfile?.leadership_tag,
                isSent: true
            });
            input.value = '';
            loadMessages();
        }
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('attachBtn').addEventListener('click', () => alert('File sharing coming soon!'));
        
        init();
    </script>
</body>
</html>
