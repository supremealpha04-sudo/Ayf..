<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Parish Community | AYF Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        .chat-info {
            flex: 1;
        }

        .chat-info h3 {
            font-size: 1rem;
        }

        .chat-info p {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .online-status {
            width: 8px;
            height: 8px;
            background: #48bb78;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.3rem;
        }

        /* Chat Container */
        .chat-container {
            display: flex;
            height: 100vh;
            padding-top: 70px;
            padding-bottom: 70px;
        }

        /* Sidebar - Parish Selection */
        .parish-sidebar {
            width: 300px;
            background: rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        .parish-list {
            flex: 1;
            overflow-y: auto;
        }

        .parish-item {
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .parish-item:hover,
        .parish-item.active {
            background: rgba(102,126,234,0.2);
        }

        .parish-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .parish-details {
            flex: 1;
        }

        .parish-name {
            font-weight: 600;
        }

        .unread-badge {
            background: #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.8rem;
            max-width: 70%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .message-bubble {
            background: rgba(255,255,255,0.1);
            padding: 0.8rem;
            border-radius: 15px;
            max-width: 100%;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .message-sender {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 0.3rem;
        }

        .leadership-tag {
            font-size: 0.6rem;
            padding: 0.1rem 0.3rem;
            background: #48bb78;
            border-radius: 50px;
            margin-left: 0.3rem;
        }

        .message-time {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-top: 0.3rem;
        }

        /* Input Area */
        .input-area {
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-area input {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: inherit;
        }

        .input-area input:focus {
            outline: none;
        }

        .attach-btn, .send-btn {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            background: rgba(102,126,234,0.3);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* A-Squared Section (shows only for approved members) */
        .asquared-section {
            background: rgba(102,126,234,0.1);
            border-left: 3px solid #667eea;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .parish-sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                bottom: 0;
                z-index: 200;
                transition: left 0.3s;
                width: 280px;
                background: #1a1a2e;
            }
            
            .parish-sidebar.open {
                left: 0;
            }
            
            .message {
                max-width: 85%;
            }
            
            .chat-container {
                padding-bottom: 60px;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <button class="back-btn" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <button class="back-btn" id="menuToggleBtn" style="display:none;">
            <i class="fas fa-bars"></i>
        </button>
        <div class="chat-info">
            <h3 id="currentChatName">Select a Parish</h3>
            <p><span class="online-status"></span> <span id="memberCount">0</span> members online</p>
        </div>
    </div>

    <div class="chat-container">
        <!-- Parish Sidebar -->
        <div class="parish-sidebar" id="parishSidebar">
            <div style="padding:1rem; border-bottom:1px solid rgba(255,255,255,0.1);">
                <h3>Communities</h3>
            </div>
            <div class="parish-list" id="parishList"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="messages-area" id="messagesArea">
                <div class="empty-state">
                    <i class="fas fa-comments" style="font-size:3rem; margin-bottom:1rem;"></i>
                    <p>Select a parish to start chatting</p>
                </div>
            </div>
            <div class="input-area" id="inputArea" style="display:none;">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="supabase/client.js"></script>
    <script>
        let currentUser = null;
        let currentProfile = null;
        let currentParish = null;
        let isASquared = false;
        let messagesSubscription = null;
        let onlineUsers = new Set();

        const PARISHES = [
            'St. Mathus Anglican Church',
            'St. Philip Anglican Church', 
            'St. Barnabas Jaiyuan'
        ];

        async function init() {
            await checkAuth();
            loadParishes();
            setupEventListeners();
        }

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('id', session.user.id)
                    .single();
                currentProfile = profile;
                isASquared = profile?.is_a_squared || false;
                
                if (isASquared) {
                    document.querySelector('.chat-header').classList.add('asquared-section');
                }
            } else {
                window.location.href = 'profile.html';
            }
        }

        function loadParishes() {
            const parishList = document.getElementById('parishList');
            const displayParishes = isASquared ? PARISHES : [currentProfile?.parish];
            
            parishList.innerHTML = displayParishes.map(parish => `
                <div class="parish-item" data-parish="${parish}" onclick="selectParish('${parish}')">
                    <div class="parish-avatar">
                        <i class="fas fa-church"></i>
                    </div>
                    <div class="parish-details">
                        <div class="parish-name">${parish}</div>
                        <small>${parish === currentProfile?.parish ? 'Your Parish' : 'A-Squared Access'}</small>
                    </div>
                </div>
            `).join('');
        }

        async function selectParish(parish) {
            currentParish = parish;
            document.getElementById('currentChatName').innerHTML = parish;
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('messagesArea').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            // Highlight active parish
            document.querySelectorAll('.parish-item').forEach(item => {
                item.classList.toggle('active', item.dataset.parish === parish);
            });
            
            await loadMessages();
            setupRealtimeMessages();
            
            // Close sidebar on mobile
            if (window.innerWidth <= 768) {
                document.getElementById('parishSidebar').classList.remove('open');
            }
        }

        async function loadMessages() {
            const { data: messages } = await supabaseClient
                .from('a_squared_messages')
                .select('*, profiles(full_name, leadership_tag, avatar_url)')
                .eq('parish', currentParish)
                .order('created_at', { ascending: true });
            
            displayMessages(messages);
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesArea');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-dots" style="font-size:3rem;"></i>
                        <p>No messages yet. Start the conversation!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = messages.map(msg => {
                const isSent = msg.user_id === currentUser?.id;
                const leadershipTag = msg.profiles?.leadership_tag ? 
                    `<span class="leadership-tag">${msg.profiles.leadership_tag}</span>` : '';
                
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="message-avatar">
                            ${msg.profiles?.full_name?.[0] || 'U'}
                        </div>
                        <div class="message-bubble">
                            ${!isSent ? `<div class="message-sender">
                                ${msg.profiles?.full_name || 'Member'}
                                ${leadershipTag}
                            </div>` : ''}
                            <div>${msg.message}</div>
                            ${msg.file_url ? `<a href="${msg.file_url}" target="_blank" style="color:#667eea;">📎 Attachment</a>` : ''}
                            <div class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !currentParish) return;
            
            const { error } = await supabaseClient
                .from('a_squared_messages')
                .insert([{
                    user_id: currentUser.id,
                    parish: currentParish,
                    message: message
                }]);
            
            if (!error) {
                input.value = '';
                await loadMessages();
            }
        }

        async function attachFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,.pdf,.doc,.docx';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const fileName = `${Date.now()}_${file.name}`;
                    const { data, error } = await supabaseClient.storage
                        .from('chat_files')
                        .upload(fileName, file);
                    
                    if (data) {
                        const fileUrl = supabaseClient.storage.from('chat_files').getPublicUrl(fileName).data.publicUrl;
                        await supabaseClient.from('a_squared_messages').insert([{
                            user_id: currentUser.id,
                            parish: currentParish,
                            message: `Shared a file: ${file.name}`,
                            file_url: fileUrl
                        }]);
                        await loadMessages();
                    }
                }
            };
            input.click();
        }

        function setupRealtimeMessages() {
            if (messagesSubscription) {
                supabaseClient.removeChannel(messagesSubscription);
            }
            
            messagesSubscription = supabaseClient
                .channel(`parish-${currentParish}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'a_squared_messages',
                    filter: `parish=eq.${currentParish}`
                }, () => {
                    loadMessages();
                })
                .subscribe();
        }

        function setupEventListeners() {
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            document.getElementById('attachBtn').addEventListener('click', attachFile);
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            
            // Mobile menu toggle
            const menuToggle = document.getElementById('menuToggleBtn');
            if (menuToggle) {
                menuToggle.style.display = window.innerWidth <= 768 ? 'block' : 'none';
                menuToggle.addEventListener('click', () => {
                    document.getElementById('parishSidebar').classList.toggle('open');
                });
            }
            
            window.addEventListener('resize', () => {
                if (menuToggle) {
                    menuToggle.style.display = window.innerWidth <= 768 ? 'block' : 'none';
                }
            });
        }

        // Make functions global
        window.selectParish = selectParish;
        
        init();
    </script>
</body>
</html>
