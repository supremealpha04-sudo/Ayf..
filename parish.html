<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Parish Chat - AYF GWARIMPA</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/parish.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="chat-header">
            <a href="/home.html" class="back-btn">←</a>
            <div class="chat-info">
                <h3 id="parishName">Parish Chat</h3>
                <span class="member-count" id="memberCount">0 members</span>
            </div>
            <button class="menu-btn" id="chatMenuBtn">⋮</button>
        </div>

        <!-- Chat Messages Container -->
        <div class="chat-messages" id="chatMessages">
            <div class="loading-spinner">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <button class="attach-btn" id="attachBtn">📎</button>
            <input type="text" id="messageInput" placeholder="Type a message..." class="message-input">
            <button class="send-btn" id="sendBtn">📤</button>
        </div>

        <!-- Hidden file input -->
        <input type="file" id="fileInput" style="display: none;" accept="image/*,video/*,application/pdf,.doc,.docx">

        <!-- Menu Modal -->
        <div id="chatMenuModal" class="modal">
            <div class="modal-content small">
                <h3>Chat Options</h3>
                <div class="menu-options">
                    <button id="viewMembersBtn">👥 View Members</button>
                    <button id="searchChatBtn">🔍 Search Messages</button>
                    <button id="clearChatBtn">🗑️ Clear Chat</button>
                    <button id="reportIssueBtn">⚠️ Report Issue</button>
                </div>
            </div>
        </div>

        <!-- Members Modal -->
        <div id="membersModal" class="modal">
            <div class="modal-content">
                <h3>Parish Members</h3>
                <div id="membersList" class="members-list"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/modules/parish.js"></script>
</body>
</html>
