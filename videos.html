<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos - AYF Gwarimpa</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="assets/images/logo.png" alt="AYF Logo" class="logo">
            <h1>Anglican Youth Fellowship</h1>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="videos.html" class="active">Videos</a>
            <a href="plan.html">Plan</a>
            <a href="parish.html">Parish</a>
            <a href="profile.html">Profile</a>
        </nav>
        <button id="themeToggle" class="theme-toggle">🌙</button>
    </header>

    <main class="container">
        <h2>Video Library</h2>
        <div class="filter-bar">
            <select id="parishFilter">
                <option value="all">All Parishes</option>
                <option value="St. Mathus Anglican Church">St. Mathus</option>
                <option value="St. Philip Anglican Church">St. Philip</option>
                <option value="St. Barnabas Jaiyuan">St. Barnabas Jaiyuan</option>
            </select>
            <select id="categoryFilter">
                <option value="all">All Categories</option>
                <option value="sermon">Sermons</option>
                <option value="talk">Talks</option>
                <option value="program">Fellowship Programs</option>
            </select>
        </div>
        <div id="videosGrid" class="videos-grid"></div>
    </main>

    <footer>
        <p>&copy; 2025 Anglican Youth Fellowship - Gwarimpa Archdeaconry</p>
    </footer>

    <script src="supabase/client.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/feeds.js"></script>
    <script src="assets/js/main.js"></script>
