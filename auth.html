<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Authentication | AYF Gwarimpa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #24243e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102,126,234,0.15) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(118,75,162,0.1) 0%, transparent 50%);
            animation: rotate 25s linear infinite reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1rem;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(102,126,234,0.3);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .brand h1 {
            font-size: 2rem;
            color: white;
            margin-bottom: 0.3rem;
        }

        .brand p {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }

        /* Auth Card */
        .auth-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            padding: 0.3rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: none;
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }

        /* Forms */
        .form {
            display: none;
        }

        .form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }

        input, select {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }

        input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        /* Radio Group */
        .radio-group {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            margin-bottom: 0;
        }

        .radio-group input {
            width: auto;
            padding: 0;
            margin: 0;
        }

        .asquared-options {
            background: rgba(102,126,234,0.1);
            border-radius: 16px;
            padding: 1rem;
            margin-top: 0.5rem;
            border: 1px solid rgba(102,126,234,0.3);
        }

        .asquared-options p {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Alert */
        .alert {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }

        .alert.show {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: rgba(245,101,101,0.2);
            border: 1px solid #f56565;
            color: #f56565;
        }

        .alert-success {
            background: rgba(72,187,120,0.2);
            border: 1px solid #48bb78;
            color: #48bb78;
        }

        /* Forgot Password Link */
        .forgot-link {
            text-align: right;
            margin-top: 0.5rem;
        }

        .forgot-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .forgot-link a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .auth-card {
                padding: 1.5rem;
            }
            
            .brand h1 {
                font-size: 1.5rem;
            }
            
            .radio-group {
                flex-direction: column;
                gap: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="auth-container">
        <div class="brand">
            <div class="logo">✝️</div>
            <h1>AYF Gwarimpa</h1>
            <p>Anglican Youth Fellowship - Arise & Shine</p>
        </div>

        <div class="auth-card">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <div class="form active" id="loginForm">
                <div class="alert" id="loginAlert"></div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="your@email.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                    <div class="forgot-link">
                        <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
                    </div>
                </div>

                <button class="btn btn-primary" id="loginBtn">Login</button>
            </div>

            <!-- Register Form -->
            <div class="form" id="registerForm">
                <div class="alert" id="registerAlert"></div>

                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regFullName" placeholder="Enter your full name">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="your@email.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Create a password (min 6 characters)">
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-group">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm your password">
                    </div>
                </div>

                <div class="form-group">
                    <label>Select Parish</label>
                    <div class="input-group">
                        <i class="fas fa-church"></i>
                        <select id="regParish">
                            <option value="">Select your parish</option>
                            <option value="St. Mathus Anglican Church">⛪ St. Mathus Anglican Church</option>
                            <option value="St. Philip Anglican Church">⛪ St. Philip Anglican Church</option>
                            <option value="St. Barnabas Jaiyuan">⛪ St. Barnabas Jaiyuan</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>A-Squared Membership (Optional)</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="aSquared" value="none" checked> No
                        </label>
                        <label>
                            <input type="radio" name="aSquared" value="parish"> Parish A-Squared (Local Executive)
                        </label>
                        <label>
                            <input type="radio" name="aSquared" value="archdeaconry"> Archdeaconry A-Squared (IC3A / ASGSK)
                        </label>
                    </div>
                    <div class="asquared-options" id="asquaredOptions" style="display: none;">
                        <p><i class="fas fa-info-circle"></i> After registration, your request will be sent to the admin for verification. Upon approval, you'll receive a leadership tag.</p>
                    </div>
                </div>

                <button class="btn btn-primary" id="registerBtn">Create Account</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION - REPLACE WITH YOUR CREDENTIALS
        // ============================================
        const SUPABASE_URL = 'https://jvfdcuvinlimurlttiqy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2ZmRjdXZpbmxpbXVybHR0aXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Njk0MTAsImV4cCI6MjA5MTA0NTQxMH0.ipezUsKqsEAbHvRqBLZYhagZj57rFJKG36uQL_4rFSg';
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        function showAlert(element, message, type) {
            element.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
            element.classList.add('show');
            element.className = `alert alert-${type} show`;
            setTimeout(() => {
                element.classList.remove('show');
            }, 5000);
        }
        
        function clearAlerts() {
            const loginAlert = document.getElementById('loginAlert');
            const registerAlert = document.getElementById('registerAlert');
            if (loginAlert) loginAlert.classList.remove('show');
            if (registerAlert) registerAlert.classList.remove('show');
        }
        
        function showToast(message, type) {
            // Create toast element
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 80px;
                right: 20px;
                padding: 12px 20px;
                background: ${type === 'success' ? '#48bb78' : type === 'error' ? '#f56565' : '#667eea'};
                color: white;
                border-radius: 10px;
                z-index: 10000;
                font-family: 'Inter', sans-serif;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                animation: slideIn 0.3s ease;
            `;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // Add animation styles
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        // ============================================
        // AUTHENTICATION FUNCTIONS
        // ============================================
        
        // Login function
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const alertEl = document.getElementById('loginAlert');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                showAlert(alertEl, 'Please enter both email and password', 'error');
                return;
            }
            
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            loginBtn.disabled = true;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                if (!data.user.email_confirmed_at) {
                    throw new Error('Please verify your email before logging in. Check your inbox!');
                }
                
                showAlert(alertEl, 'Login successful! Redirecting...', 'success');
                showToast('Login successful!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                
            } catch (error) {
                showAlert(alertEl, error.message, 'error');
                loginBtn.innerHTML = 'Login';
                loginBtn.disabled = false;
            }
        }
        
        // Register function
        async function handleRegister() {
            const fullName = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const parish = document.getElementById('regParish').value;
            const aSquaredRadio = document.querySelector('input[name="aSquared"]:checked');
            const aSquaredValue = aSquaredRadio ? aSquaredRadio.value : 'none';
            const alertEl = document.getElementById('registerAlert');
            const registerBtn = document.getElementById('registerBtn');
            
            // Validation
            if (!fullName) {
                showAlert(alertEl, 'Please enter your full name', 'error');
                return;
            }
            
            if (!email) {
                showAlert(alertEl, 'Please enter your email', 'error');
                return;
            }
            
            if (!email.includes('@')) {
                showAlert(alertEl, 'Please enter a valid email address', 'error');
                return;
            }
            
            if (!password) {
                showAlert(alertEl, 'Please create a password', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert(alertEl, 'Password must be at least 6 characters', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showAlert(alertEl, 'Passwords do not match', 'error');
                return;
            }
            
            if (!parish) {
                showAlert(alertEl, 'Please select your parish', 'error');
                return;
            }
            
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            registerBtn.disabled = true;
            
            try {
                // Sign up with Supabase
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            parish: parish
                        }
                    }
                });
                
                if (error) throw error;
                
                // Create profile in profiles table
                const aSquaredRequested = aSquaredValue !== 'none';
                const aSquaredType = aSquaredValue === 'parish' ? 'Parish A-Squared' : 
                                     aSquaredValue === 'archdeaconry' ? 'Archdeaconry A-Squared' : null;
                
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([{
                        id: data.user.id,
                        full_name: fullName,
                        email: email,
                        parish: parish,
                        role: 'user',
                        is_a_squared: false,
                        a_squared_requested: aSquaredRequested,
                        a_squared_type: aSquaredType,
                        leadership_tag: null
                    }]);
                
                if (profileError) {
                    console.error('Profile creation error:', profileError);
                }
                
                let successMessage = 'Account created successfully! Please check your email to verify your account.';
                if (aSquaredRequested) {
                    successMessage += ' Your A-Squared membership request has been sent to the admin.';
                }
                
                showAlert(alertEl, successMessage, 'success');
                showToast('Account created! Check your email to verify.', 'success');
                
                // Clear form
                document.getElementById('regFullName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regConfirmPassword').value = '';
                document.getElementById('regParish').value = '';
                document.querySelector('input[name="aSquared"][value="none"]').checked = true;
                document.getElementById('asquaredOptions').style.display = 'none';
                
                // Switch to login tab after 2 seconds
                setTimeout(() => {
                    document.querySelector('.tab-btn[data-tab="login"]').click();
                    document.getElementById('loginEmail').value = email;
                }, 2000);
                
            } catch (error) {
                showAlert(alertEl, error.message, 'error');
            } finally {
                registerBtn.innerHTML = 'Create Account';
                registerBtn.disabled = false;
            }
        }
        
        // Forgot password
        async function showForgotPassword() {
            const email = prompt('Enter your email address to reset your password:');
            if (email && email.includes('@')) {
                try {
                    const { error } = await supabase.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/reset-password.html'
                    });
                    
                    if (error) throw error;
                    
                    showToast('Password reset email sent! Check your inbox.', 'success');
                } catch (error) {
                    showToast(error.message, 'error');
                }
            } else if (email) {
                showToast('Please enter a valid email address', 'error');
            }
        }
        
        // Check if already logged in
        async function checkAlreadyLoggedIn() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        }
        
        // ============================================
        // EVENT LISTENERS
        // ============================================
        
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.form').forEach(form => form.classList.remove('active'));
                document.getElementById(tab + 'Form').classList.add('active');
                clearAlerts();
            });
        });
        
        // Show/hide A-Squared options
        document.querySelectorAll('input[name="aSquared"]').forEach(radio => {
            radio.addEventListener('change', () => {
                const options = document.getElementById('asquaredOptions');
                options.style.display = radio.value !== 'none' ? 'block' : 'none';
            });
        });
        
        // Login button
        document.getElementById('loginBtn').addEventListener('click', handleLogin);
        
        // Register button
        document.getElementById('registerBtn').addEventListener('click', handleRegister);
        
        // Enter key submission
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        
        document.getElementById('regConfirmPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleRegister();
        });
        
        // Check if already logged in
        checkAlreadyLoggedIn();
    </script>
</body>
</html>
