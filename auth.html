<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Authentication | AYF Gwarimpa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102,126,234,0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .auth-container {
            width: 100%;
            max-width: 500px;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .brand { text-align: center; margin-bottom: 2rem; }
        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1rem;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .brand h1 { font-size: 1.8rem; color: white; margin-bottom: 0.3rem; }
        .brand p { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
        .auth-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            padding: 0.3rem;
        }
        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: none;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
        }
        .tab-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); }
        .form { display: none; }
        .form.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; color: rgba(255,255,255,0.9); font-size: 0.9rem; }
        .input-group { position: relative; }
        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }
        input, select {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
        }
        input:focus, select:focus { outline: none; border-color: #667eea; background: rgba(255,255,255,0.1); }
        .radio-group {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            margin-bottom: 0;
        }
        .asquared-options {
            background: rgba(102,126,234,0.1);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 0.5rem;
        }
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.3); }
        .alert {
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }
        .alert.show { display: block; animation: slideIn 0.3s ease; }
        .alert-error { background: rgba(245,101,101,0.2); border: 1px solid #f56565; color: #f56565; }
        .alert-success { background: rgba(72,187,120,0.2); border: 1px solid #48bb78; color: #48bb78; }
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .auth-card { padding: 1.5rem; }
            .brand h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="auth-container">
        <div class="brand">
            <div class="logo">✝️</div>
            <h1>AYF Gwarimpa</h1>
            <p>Anglican Youth Fellowship - Arise & Shine</p>
        </div>

        <div class="auth-card">
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>

            <div class="form active" id="loginForm">
                <div class="alert" id="loginAlert"></div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="your@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                </div>
                <button class="btn btn-primary" id="loginBtn">Login</button>
            </div>

            <div class="form" id="registerForm">
                <div class="alert" id="registerAlert"></div>
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regFullName" placeholder="Enter your full name">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="your@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Create a password (min 6 characters)">
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-group">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm your password">
                    </div>
                </div>
                <div class="form-group">
                    <label>Select Parish</label>
                    <div class="input-group">
                        <i class="fas fa-church"></i>
                        <select id="regParish">
                            <option value="">Select your parish</option>
                            <option value="St. Mathus Anglican Church">⛪ St. Mathus Anglican Church</option>
                            <option value="St. Philip Anglican Church">⛪ St. Philip Anglican Church</option>
                            <option value="St. Barnabas Jaiyuan">⛪ St. Barnabas Jaiyuan</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>A-Squared Membership (Optional)</label>
                    <div class="radio-group">
                        <label><input type="radio" name="aSquared" value="none" checked> No</label>
                        <label><input type="radio" name="aSquared" value="parish"> Parish A-Squared</label>
                        <label><input type="radio" name="aSquared" value="archdeaconry"> Archdeaconry A-Squared</label>
                    </div>
                    <div class="asquared-options" id="asquaredOptions" style="display: none;">
                        <p style="font-size: 0.8rem;">After registration, your request will be sent to the admin for verification.</p>
                    </div>
                </div>
                <button class="btn btn-primary" id="registerBtn">Create Account</button>
            </div>
        </div>
    </div>

    <script src="supabase/client.js"></script>
    <script>
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.form').forEach(form => form.classList.remove('active'));
                document.getElementById(tab + 'Form').classList.add('active');
                clearAlerts();
            });
        });

        document.querySelectorAll('input[name="aSquared"]').forEach(radio => {
            radio.addEventListener('change', () => {
                document.getElementById('asquaredOptions').style.display = radio.value !== 'none' ? 'block' : 'none';
            });
        });

        function clearAlerts() {
            document.getElementById('loginAlert').classList.remove('show');
            document.getElementById('registerAlert').classList.remove('show');
        }

        function showAlert(element, message, type) {
            element.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
            element.classList.add('show');
            element.className = `alert alert-${type} show`;
            setTimeout(() => element.classList.remove('show'), 5000);
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const alertEl = document.getElementById('loginAlert');
            
            if (!email || !password) {
                showAlert(alertEl, 'Please enter both email and password', 'error');
                return;
            }
            
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            btn.disabled = true;
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                showAlert(alertEl, error.message, 'error');
                btn.innerHTML = 'Login';
                btn.disabled = false;
            } else {
                showAlert(alertEl, 'Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            }
        });

        document.getElementById('registerBtn').addEventListener('click', async () => {
            const fullName = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const parish = document.getElementById('regParish').value;
            const aSquaredRadio = document.querySelector('input[name="aSquared"]:checked');
            const aSquaredValue = aSquaredRadio ? aSquaredRadio.value : 'none';
            const alertEl = document.getElementById('registerAlert');
            
            if (!fullName) { showAlert(alertEl, 'Please enter your full name', 'error'); return; }
            if (!email) { showAlert(alertEl, 'Please enter your email', 'error'); return; }
            if (!email.includes('@')) { showAlert(alertEl, 'Please enter a valid email', 'error'); return; }
            if (!password) { showAlert(alertEl, 'Please create a password', 'error'); return; }
            if (password.length < 6) { showAlert(alertEl, 'Password must be at least 6 characters', 'error'); return; }
            if (password !== confirmPassword) { showAlert(alertEl, 'Passwords do not match', 'error'); return; }
            if (!parish) { showAlert(alertEl, 'Please select your parish', 'error'); return; }
            
            const btn = document.getElementById('registerBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            btn.disabled = true;
            
            const { data, error } = await supabaseClient.auth.signUp({
                email, password,
                options: { data: { full_name: fullName, parish: parish } }
            });
            
            if (error) {
                showAlert(alertEl, error.message, 'error');
                btn.innerHTML = 'Create Account';
                btn.disabled = false;
                return;
            }
            
            const aSquaredRequested = aSquaredValue !== 'none';
            const aSquaredType = aSquaredValue === 'parish' ? 'Parish A-Squared' : aSquaredValue === 'archdeaconry' ? 'Archdeaconry A-Squared' : null;
            
            await supabaseClient.from('profiles').insert([{
                id: data.user.id,
                full_name: fullName,
                email: email,
                parish: parish,
                role: 'user',
                is_a_squared: false,
                a_squared_requested: aSquaredRequested,
                a_squared_type: aSquaredType
            }]);
            
            let successMsg = 'Account created! Please check your email to verify.';
            if (aSquaredRequested) successMsg += '\n\nA-Squared request sent to admin.';
            showAlert(alertEl, successMsg, 'success');
            
            setTimeout(() => {
                document.querySelector('.tab-btn[data-tab="login"]').click();
                document.getElementById('loginEmail').value = email;
            }, 2000);
            
            btn.innerHTML = 'Create Account';
            btn.disabled = false;
        });
    </script>
</body>
</html>
