<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Yearly Plans | AYF Gwarimpa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
            color: white;
            padding-bottom: 70px;
        }
        .header {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }
        .logo { display: flex; align-items: center; gap: 0.8rem; cursor: pointer; }
        .logo-icon { width: 35px; height: 35px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .nav-links a { color: white; text-decoration: none; margin-left: 1rem; font-size: 0.9rem; }
        
        .hero { text-align: center; padding: 2rem; }
        .hero h1 { font-size: 1.8rem; }
        .hero p { opacity: 0.7; }
        
        .year-selector { display: flex; justify-content: center; gap: 1rem; padding: 1rem; flex-wrap: wrap; }
        .year-btn {
            padding: 0.6rem 1.5rem;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .year-btn.active, .year-btn:hover { background: linear-gradient(135deg, #667eea, #764ba2); }
        
        .plans-grid { max-width: 800px; margin: 0 auto; padding: 1rem; display: grid; gap: 1rem; }
        .plan-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 1.2rem;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .plan-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.12); }
        .plan-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.3rem; }
        .plan-year { color: #667eea; font-size: 0.8rem; margin-bottom: 0.5rem; }
        .plan-desc { opacity: 0.8; font-size: 0.9rem; }
        
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            border-top: 1px solid #222;
            z-index: 1000;
        }
        .footer-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            color: #888;
            text-decoration: none;
            font-size: 0.7rem;
            transition: all 0.3s;
        }
        .footer-nav-item i { font-size: 1.3rem; }
        .footer-nav-item.active, .footer-nav-item:hover { color: #667eea; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            max-width: 500px;
            width: 90%;
            background: #1a1a2e;
            border-radius: 20px;
            padding: 1.5rem;
            max-height: 80vh;
            overflow-y: auto;
        }
        .close-modal { float: right; font-size: 1.5rem; cursor: pointer; background: none; border: none; color: white; }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">📅</div>
            <h3>AYF Gwarimpa</h3>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="plan.html">Plan</a>
            <a href="parish.html">Parish</a>
            <a href="profile.html">Profile</a>
        </div>
    </header>

    <div class="hero">
        <h1>📊 Yearly Strategic Plans</h1>
        <p>Annual roadmap for spiritual growth and development</p>
    </div>

    <div class="year-selector" id="yearSelector"></div>
    <div class="plans-grid" id="plansGrid"></div>

    <div class="footer-nav">
        <a href="index.html" class="footer-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="plan.html" class="footer-nav-item active"><i class="fas fa-calendar-alt"></i><span>Plan</span></a>
        <a href="parish.html" class="footer-nav-item"><i class="fas fa-church"></i><span>Parish</span></a>
        <a href="profile.html" class="footer-nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>

    <div class="modal" id="planModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <h2 id="modalTitle"></h2>
            <div id="modalContent" style="margin-top: 1rem;"></div>
        </div>
    </div>

    <script>
        const plansData = {
            2026: [
                { title: "Annual Strategic Plan 2026", desc: "Theme: 'Rising Together' - Youth empowerment, leadership training, and community outreach.", details: "Q1: Leadership Training Workshop\nQ2: Community Outreach Programs\nQ3: Youth Conference & Seminars\nQ4: End of Year Thanksgiving" },
                { title: "Quota Distribution 2026", desc: "Annual quota distribution across all three parishes.", details: "St. Mathus: ₦100,000\nSt. Philip: ₦100,000\nSt. Barnabas: ₦100,000\nTotal: ₦300,000" },
                { title: "A-Squared Leadership Calendar", desc: "Executive meetings and training schedule.", details: "Monthly Executive Meeting (First Saturday)\nQuarterly Leadership Retreat\nAnnual Planning Summit (November)" }
            ],
            2025: [
                { title: "Annual Strategic Plan 2025", desc: "Theme: 'Building Strong Foundations' - Infrastructure and membership growth.", details: "Q1: Membership Drive\nQ2: Skills Acquisition Program\nQ3: Youth Week Celebration\nQ4: Annual General Meeting" },
                { title: "Quota Distribution 2025", desc: "Annual quota distribution.", details: "St. Mathus: ₦80,000\nSt. Philip: ₦80,000\nSt. Barnabas: ₦80,000\nTotal: ₦240,000" }
            ]
        };
        
        function renderYearSelector() {
            const years = Object.keys(plansData).sort().reverse();
            const selector = document.getElementById('yearSelector');
            selector.innerHTML = years.map(year => `<button class="year-btn" data-year="${year}">${year}</button>`).join('');
            
            document.querySelectorAll('.year-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderPlans(btn.dataset.year);
                });
            });
            if (years[0]) {
                document.querySelector('.year-btn').classList.add('active');
                renderPlans(years[0]);
            }
        }
        
        function renderPlans(year) {
            const plans = plansData[year];
            const grid = document.getElementById('plansGrid');
            grid.innerHTML = plans.map((plan, i) => `
                <div class="plan-card" onclick="showPlanDetails(${year}, ${i})">
                    <div class="plan-title">${plan.title}</div>
                    <div class="plan-year">Year ${year}</div>
                    <div class="plan-desc">${plan.desc.substring(0, 80)}...</div>
                </div>
            `).join('');
        }
        
        function showPlanDetails(year, index) {
            const plan = plansData[year][index];
            document.getElementById('modalTitle').innerHTML = plan.title;
            document.getElementById('modalContent').innerHTML = `
                <p><strong>Year:</strong> ${year}</p>
                <p style="margin: 0.8rem 0;">${plan.desc}</p>
                <hr style="margin: 1rem 0; border-color: rgba(255,255,255,0.1);">
                <pre style="white-space: pre-wrap; font-family: inherit; line-height: 1.6;">${plan.details}</pre>
            `;
            document.getElementById('planModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('planModal').style.display = 'none';
        }
        
        renderYearSelector();
    </script>
</body>
</html>
