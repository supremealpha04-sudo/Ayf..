<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Yearly Plans | AYF Strategy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            padding-bottom: 70px;
        }
        .header {
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-links { display: flex; gap: 1rem; }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }
        .nav-links a:hover { background: rgba(102,126,234,0.2); }
        .hero {
            text-align: center;
            padding: 3rem 2rem;
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
        }
        .hero h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .year-selector {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 2rem;
            flex-wrap: wrap;
        }
        .year-btn {
            padding: 0.8rem 2rem;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .year-btn.active, .year-btn:hover { background: linear-gradient(135deg, #667eea, #764ba2); }
        .plans-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }
        .plan-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s;
            cursor: pointer;
        }
        .plan-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.15); }
        .plan-icon { font-size: 3rem; margin-bottom: 1rem; }
        .plan-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .plan-year { color: #667eea; margin-bottom: 0.5rem; }
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        .footer-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            color: #888;
            text-decoration: none;
            font-size: 0.7rem;
            transition: all 0.3s;
        }
        .footer-nav-item i { font-size: 1.3rem; }
        .footer-nav-item.active, .footer-nav-item:hover { color: #667eea; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            width: 90%;
            max-width: 800px;
            background: #1a1a2e;
            border-radius: 20px;
            padding: 2rem;
            max-height: 80vh;
            overflow-y: auto;
        }
        .loading { text-align: center; padding: 2rem; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .hero h1 { font-size: 1.5rem; }
            .plans-grid { grid-template-columns: 1fr; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">📅</div>
            <h3>AYF Plans</h3>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="plan.html">Plan</a>
            <a href="parish.html">Parish</a>
            <a href="profile.html">Profile</a>
        </div>
    </header>

    <div class="hero">
        <h1>📊 Yearly Strategic Plans</h1>
        <p>Annual roadmap for spiritual growth and community development</p>
    </div>

    <div class="year-selector" id="yearSelector"></div>
    <div class="plans-grid" id="plansGrid">
        <div class="loading"><div class="spinner"></div></div>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="footer-nav-item">
            <i class="fas fa-home"></i><span>Home</span>
        </a>
        <a href="about.html" class="footer-nav-item">
            <i class="fas fa-info-circle"></i><span>About</span>
        </a>
        <a href="plan.html" class="footer-nav-item active">
            <i class="fas fa-calendar-alt"></i><span>Plan</span>
        </a>
        <a href="parish.html" class="footer-nav-item">
            <i class="fas fa-church"></i><span>Parish</span>
        </a>
        <a href="profile.html" class="footer-nav-item">
            <i class="fas fa-user"></i><span>Profile</span>
        </a>
    </div>

    <div class="modal" id="planModal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                <h2 id="modalTitle"></h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="supabase/client.js"></script>
    <script>
        let allPlans = [];

        async function loadPlans() {
            const { data, error } = await supabaseClient
                .from('yearly_plans')
                .select('*')
                .order('year', { ascending: false });
            
            if (error) {
                console.error('Error loading plans:', error);
                document.getElementById('plansGrid').innerHTML = '<p style="text-align:center;">No plans available</p>';
                return;
            }
            
            allPlans = data || [];
            renderYearSelector();
        }

        function renderYearSelector() {
            const years = [...new Set(allPlans.map(p => p.year))].sort().reverse();
            const selector = document.getElementById('yearSelector');
            
            if (years.length === 0) {
                selector.innerHTML = '<p>No plans uploaded yet</p>';
                document.getElementById('plansGrid').innerHTML = '<p style="text-align:center;">No yearly plans available. Check back soon!</p>';
                return;
            }
            
            selector.innerHTML = years.map(year => `
                <button class="year-btn" data-year="${year}">${year}</button>
            `).join('');
            
            document.querySelectorAll('.year-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderPlans(parseInt(btn.dataset.year));
                });
            });
            
            document.querySelector('.year-btn').classList.add('active');
            renderPlans(years[0]);
        }

        function renderPlans(year) {
            const plans = allPlans.filter(p => p.year === year);
            const grid = document.getElementById('plansGrid');
            
            if (plans.length === 0) {
                grid.innerHTML = '<p style="text-align:center;">No plans for this year</p>';
                return;
            }
            
            grid.innerHTML = plans.map(plan => `
                <div class="plan-card" onclick="showPlanDetails(${plan.id})">
                    <div class="plan-icon">📄</div>
                    <div class="plan-title">${escapeHtml(plan.title)}</div>
                    <div class="plan-year">Year ${plan.year}</div>
                    <p style="margin: 0.5rem 0; opacity:0.8;">${escapeHtml(plan.description?.substring(0, 100) || 'Click to view details')}...</p>
                </div>
            `).join('');
        }

        async function showPlanDetails(planId) {
            const plan = allPlans.find(p => p.id === planId);
            if (!plan) return;
            
            const modal = document.getElementById('planModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            
            modalTitle.textContent = plan.title;
            
            modalContent.innerHTML = `
                <p style="margin-bottom:1rem;">${escapeHtml(plan.description || 'No description available')}</p>
                <p><strong>Year:</strong> ${plan.year}</p>
                ${plan.file_url ? `
                    <button class="btn btn-primary" onclick="window.open('${plan.file_url}', '_blank')" style="margin-top:1rem;">
                        <i class="fas fa-download"></i> Download PDF
                    </button>
                ` : ''}
            `;
            
            modal.style.display = 'flex';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeModal() {
            document.getElementById('planModal').style.display = 'none';
        }

        loadPlans();
    </script>
</body>
</html>
