<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Yearly Plans | AYF Strategy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }

        .header {
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: rgba(102,126,234,0.2);
        }

        .hero {
            text-align: center;
            padding: 4rem 2rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .year-selector {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .year-btn {
            padding: 0.8rem 2rem;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .year-btn:hover,
        .year-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .plans-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .plan-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .plan-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.15);
        }

        .plan-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .plan-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .plan-year {
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .plan-desc {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 90%;
            max-width: 1000px;
            height: 90%;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 1rem;
            background: #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pdf-viewer {
            flex: 1;
            overflow: auto;
            padding: 1rem;
        }

        canvas {
            width: 100%;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .plans-grid {
                grid-template-columns: 1fr;
            }
            
            .hero h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">📅</div>
            <h3>AYF Plans</h3>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="videos.html">Videos</a>
            <a href="plan.html" class="active">Plan</a>
            <a href="parish.html">Parish</a>
            <a href="profile.html">Profile</a>
        </div>
    </div>

    <div class="hero">
        <h1>Yearly Strategic Plans</h1>
        <p>Download and view our annual plans and quota distributions</p>
    </div>

    <div class="year-selector" id="yearSelector"></div>
    <div class="plans-grid" id="plansGrid"></div>

    <div class="modal" id="pdfModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="pdfTitle">Document Viewer</h3>
                <button class="close-modal" onclick="closePDF()">&times;</button>
            </div>
            <div class="pdf-viewer" id="pdfViewer">
                <canvas id="pdfCanvas"></canvas>
            </div>
        </div>
    </div>

    <script src="supabase/client.js"></script>
    <script>
        let allPlans = [];

        async function loadPlans() {
            const { data } = await supabaseClient
                .from('yearly_plans')
                .select('*')
                .order('year', { ascending: false });
            
            if (data) {
                allPlans = data;
                const years = [...new Set(data.map(p => p.year))];
                const yearSelector = document.getElementById('yearSelector');
                
                yearSelector.innerHTML = years.map(year => `
                    <button class="year-btn" data-year="${year}">${year}</button>
                `).join('');
                
                if (years[0]) {
                    renderPlans(years[0]);
                    document.querySelector('.year-btn')?.classList.add('active');
                }
                
                document.querySelectorAll('.year-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        renderPlans(parseInt(btn.dataset.year));
                    });
                });
            }
        }

        function renderPlans(year) {
            const plans = allPlans.filter(p => p.year === year);
            const grid = document.getElementById('plansGrid');
            
            if (plans.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">No plans uploaded for this year</p>';
                return;
            }
            
            grid.innerHTML = plans.map(plan => `
                <div class="plan-card" onclick="previewPDF('${plan.file_url}', '${plan.title}')">
                    <div class="plan-icon">📄</div>
                    <div class="plan-title">${escapeHtml(plan.title)}</div>
                    <div class="plan-year">Year ${plan.year}</div>
                    <div class="plan-desc">${escapeHtml(plan.description || 'Click to view full document')}</div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function previewPDF(url, title) {
            const modal = document.getElementById('pdfModal');
            const canvas = document.getElementById('pdfCanvas');
            const pdfTitle = document.getElementById('pdfTitle');
            
            pdfTitle.textContent = title;
            modal.style.display = 'flex';
            
            // Clear previous content
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            
            // Load PDF
            const pdf = await pdfjsLib.getDocument(url).promise;
            const numPages = pdf.numPages;
            
            // Render all pages
            const viewer = document.getElementById('pdfViewer');
            viewer.innerHTML = '';
            
            for (let i = 1; i <= numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                canvas.style.width = '100%';
                canvas.style.height = 'auto';
                canvas.style.marginBottom = '1rem';
                viewer.appendChild(canvas);
                
                const context = canvas.getContext('2d');
                await page.render({ canvasContext: context, viewport }).promise;
            }
        }

        function closePDF() {
            document.getElementById('pdfModal').style.display = 'none';
        }

        loadPlans();
    </script>
</body>
</html>
