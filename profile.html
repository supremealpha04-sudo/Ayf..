<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYF GWARIMPA - Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #17212b;
            color: #fff;
            padding-bottom: 70px;
        }

        /* Telegram-style profile header */
        .profile-header {
            background: #1e2a36;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            background-size: cover;
            background-position: center;
            border: 3px solid #2b5278;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-username {
            color: #7e8c9e;
            font-size: 14px;
        }

        .edit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #2b5278;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* Stats */
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #1e2a36;
            margin-top: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 600;
        }

        .stat-label {
            font-size: 12px;
            color: #7e8c9e;
        }

        /* Info sections */
        .info-section {
            background: #1e2a36;
            margin-top: 10px;
            padding: 15px 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #2b2f36;
        }

        .info-label {
            color: #7e8c9e;
        }

        .info-value {
            font-weight: 500;
        }

        /* Message button */
        .message-btn {
            background: #2b5278;
            color: white;
            border: none;
            padding: 12px;
            width: calc(100% - 40px);
            margin: 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Chats list (Telegram style) */
        .chats-section {
            background: #1e2a36;
            margin-top: 10px;
        }

        .section-title {
            padding: 15px 20px;
            font-weight: 600;
            border-bottom: 1px solid #2b2f36;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #2b2f36;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-size: cover;
            margin-right: 15px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-last-message {
            font-size: 13px;
            color: #7e8c9e;
        }

        .chat-time {
            font-size: 11px;
            color: #7e8c9e;
        }

        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #17212b;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #2b2f36;
        }

        .nav-item {
            text-align: center;
            color: #7e8c9e;
            text-decoration: none;
            font-size: 12px;
        }

        .nav-item.active {
            color: #2b5278;
        }

        .nav-icon {
            font-size: 24px;
            display: block;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e2a36;
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }

        .chat-window {
            height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 10px;
            background: #2b2f36;
            border: none;
            border-radius: 20px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="profile-header">
        <div class="profile-avatar" id="profile-avatar"></div>
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-username" id="profile-username"></div>
        <button class="edit-btn" onclick="editProfile()">Edit</button>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-number" id="posts-count">0</div>
            <div class="stat-label">Posts</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="followers-count">0</div>
            <div class="stat-label">Followers</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="following-count">0</div>
            <div class="stat-label">Following</div>
        </div>
    </div>

    <div class="info-section">
        <div class="info-row">
            <span class="info-label">Parish</span>
            <span class="info-value" id="profile-parish"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Gender</span>
            <span class="info-value" id="profile-gender"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Member Since</span>
            <span class="info-value" id="profile-joined"></span>
        </div>
    </div>

    <div class="chats-section">
        <div class="section-title">Messages</div>
        <div id="chats-list"></div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="parish.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>Parish</span>
        </a>
        <a href="#" class="nav-item" onclick="showPlans()">
            <span class="nav-icon">📅</span>
            <span>Plan</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </div>

    <!-- Chat Modal -->
    <div id="chat-modal" class="modal">
        <div class="modal-content chat-window">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <h3 id="chat-with-name"></h3>
                <button onclick="closeChat()" style="background: none; border: none; color: white; font-size: 20px;">✕</button>
            </div>
            <div id="private-messages" class="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="private-message-input" class="chat-input" placeholder="Type a message...">
                <button onclick="sendPrivateMessage()" style="background: #2b5278; border: none; color: white; padding: 10px 15px; border-radius: 20px;">Send</button>
            </div>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        let currentUser = null;
        let currentChatUser = null;
        let messagesSubscription = null;

        async function loadProfile() {
            const { data: { user } } = await supabase.auth.getUser();
            currentUser = user;
            if(!user) window.location.href = 'index.html';
            
            const { data: profile } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', currentUser.id)
                .single();
            
            document.getElementById('profile-avatar').style.backgroundImage = `url(${profile.avatar_url || ''})`;
            document.getElementById('profile-name').textContent = profile.full_name;
            document.getElementById('profile-username').textContent = `@${profile.full_name.replace(/\s/g, '').toLowerCase()}`;
            document.getElementById('profile-parish').textContent = profile.parish_name;
            document.getElementById('profile-gender').textContent = profile.gender;
            document.getElementById('profile-joined').textContent = new Date(profile.created_at).toLocaleDateString();
            
            loadChats();
        }

        async function loadChats() {
            // Get all unique users that current user has chatted with
            const { data: sent } = await supabase
                .from('private_messages')
                .select('receiver_id, profiles:receiver_id(full_name, avatar_url)')
                .eq('sender_id', currentUser.id);
            
            const { data: received } = await supabase
                .from('private_messages')
                .select('sender_id, profiles:sender_id(full_name, avatar_url)')
                .eq('receiver_id', currentUser.id);
            
            const allChats = [...(sent || []), ...(received || [])];
            const uniqueUsers = new Map();
            
            allChats.forEach(chat => {
                const userId = chat.receiver_id || chat.sender_id;
                const profile = chat.profiles;
                if(!uniqueUsers.has(userId)) {
                    uniqueUsers.set(userId, profile);
                }
            });
            
            const chatsList = document.getElementById('chats-list');
            chatsList.innerHTML = Array.from(uniqueUsers.entries()).map(([userId, profile]) => `
                <div class="chat-item" onclick="openChat('${userId}', '${profile.full_name}')">
                    <div class="chat-avatar" style="background-image: url(${profile.avatar_url || ''}); background-size: cover;"></div>
                    <div class="chat-info">
                        <div class="chat-name">${profile.full_name}</div>
                        <div class="chat-last-message">Click to chat</div>
                    </div>
                </div>
            `).join('');
        }

        async function openChat(userId, userName) {
            currentChatUser = userId;
            document.getElementById('chat-with-name').textContent = userName;
            document.getElementById('chat-modal').style.display = 'flex';
            await loadPrivateMessages();
            setupPrivateMessagesRealtime();
        }

        async function loadPrivateMessages() {
            const { data } = await supabase
                .from('private_messages')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentChatUser}),and(sender_id.eq.${currentChatUser},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });
            
            const container = document.getElementById('private-messages');
            container.innerHTML = data.map(msg => `
                <div style="text-align: ${msg.sender_id === currentUser.id ? 'right' : 'left'}; margin-bottom: 10px;">
                    <div style="display: inline-block; background: ${msg.sender_id === currentUser.id ? '#2b5278' : '#1e2a36'}; padding: 8px 12px; border-radius: 12px; max-width: 80%;">
                        ${msg.message}
                        ${msg.file_url ? `<div><a href="${msg.file_url}" download style="color: #2b5278;">📎 Download</a></div>` : ''}
                    </div>
                    <div style="font-size: 10px; color: #7e8c9e; margin-top: 2px;">${new Date(msg.created_at).toLocaleTimeString()}</div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function setupPrivateMessagesRealtime() {
            if(messagesSubscription) messagesSubscription.unsubscribe();
            
            messagesSubscription = supabase
                .channel('private-messages')
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'private_messages' 
                }, payload => {
                    if((payload.new.sender_id === currentChatUser && payload.new.receiver_id === currentUser.id) ||
                       (payload.new.sender_id === currentUser.id && payload.new.receiver_id === currentChatUser)) {
                        loadPrivateMessages();
                    }
                })
                .subscribe();
        }

        async function sendPrivateMessage() {
            const input = document.getElementById('private-message-input');
            const message = input.value.trim();
            if(!message) return;
            
            await supabase.from('private_messages').insert([{
                sender_id: currentUser.id,
                receiver_id: currentChatUser,
                message: message
            }]);
            
            input.value = '';
            loadPrivateMessages();
        }

        function closeChat() {
            document.getElementById('chat-modal').style.display = 'none';
            if(messagesSubscription) messagesSubscription.unsubscribe();
        }

        function editProfile() {
            alert('Edit profile feature - coming soon');
        }

        function showPlans() {
            alert('Yearly Plans - coming soon');
        }

        loadProfile();
    </script>
</body>
</html>
