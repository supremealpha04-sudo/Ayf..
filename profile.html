<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profile - AYF GWARIMPA</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>
    <div class="app-container">
        <div class="profile-header">
            <div class="profile-cover"></div>
            <div class="profile-avatar-container">
                <img id="profileAvatar" class="profile-avatar" src="/assets/images/default-avatar.png" alt="Profile">
                <button id="editAvatarBtn" class="edit-avatar-btn">📷</button>
            </div>
            <h2 id="profileName">Loading...</h2>
            <p id="profileParish" class="profile-parish"></p>
            <div class="profile-stats">
                <div class="stat">
                    <span class="stat-value" id="postCount">0</span>
                    <span class="stat-label">Posts</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="memberSince">-</span>
                    <span class="stat-label">Joined</span>
                </div>
            </div>
        </div>

        <div class="profile-tabs">
            <button class="tab-btn active" data-tab="posts">My Posts</button>
            <button class="tab-btn" data-tab="messages">Messages</button>
            <button class="tab-btn" data-tab="settings">Settings</button>
        </div>

        <div class="profile-content">
            <!-- Posts Tab -->
            <div id="postsTab" class="tab-content active">
                <div id="userPosts" class="user-posts"></div>
            </div>

            <!-- Messages Tab -->
            <div id="messagesTab" class="tab-content">
                <div class="search-users">
                    <input type="text" id="searchUsers" placeholder="Search members...">
                </div>
                <div id="conversationsList" class="conversations-list"></div>
            </div>

            <!-- Settings Tab -->
            <div id="settingsTab" class="tab-content">
                <div class="settings-list">
                    <button id="editProfileBtn">✏️ Edit Profile</button>
                    <button id="changePasswordBtn">🔒 Change Password</button>
                    <button id="logoutBtn" class="danger-btn">🚪 Logout</button>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="/home.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </a>
            <a href="/parish.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span class="nav-label">Parish</span>
            </a>
            <a href="/plan.html" class="nav-item">
                <span class="nav-icon">📅</span>
                <span class="nav-label">Plan</span>
            </a>
            <a href="/profile.html" class="nav-item active">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Profile</span>
            </a>
        </nav>
    </div>

    <!-- Private Chat Modal -->
    <div id="privateChatModal" class="modal">
        <div class="modal-content chat-modal">
            <div class="chat-modal-header">
                <span id="chatWithName"></span>
                <span class="close">&times;</span>
            </div>
            <div id="privateChatMessages" class="private-chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="privateMessageInput" placeholder="Type a message...">
                <button id="sendPrivateBtn">Send</button>
            </div>
        </div>
    </div>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/modules/profile.js"></script>
</body>
</html>
