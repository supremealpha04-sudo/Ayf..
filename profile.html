<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Profile | AYF Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }

        /* Header */
        .header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            background: rgba(102,126,234,0.2);
        }

        /* Profile Container */
        .profile-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .profile-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 1rem;
            border: 4px solid rgba(255,255,255,0.2);
        }

        .change-avatar {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .info-field {
            margin: 1.5rem 0;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
        }

        .info-label {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 0.3rem;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .leadership-badge {
            background: #48bb78;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-item {
            text-align: center;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 0.3rem;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            margin-top: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        /* Registration Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        input, select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-family: inherit;
        }

        .radio-group {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .profile-container {
                padding: 1rem;
                margin: 1rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">✝️</div>
            <h3>AYF Gwarimpa</h3>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="videos.html">Videos</a>
            <a href="plan.html">Plan</a>
            <a href="parish.html">Parish</a>
            <a href="profile.html" class="active">Profile</a>
        </div>
    </div>

    <div class="profile-container" id="profileContainer"></div>

    <script src="supabase/client.js"></script>
    <script>
        let currentUser = null;
        let currentProfile = null;

        async function loadProfile() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const container = document.getElementById('profileContainer');
            
            if (!session) {
                container.innerHTML = `
                    <div class="profile-card">
                        <div class="avatar-section">
                            <div class="avatar">👤</div>
                        </div>
                        <h2 style="text-align:center; margin-bottom:1rem;">Welcome to AYF</h2>
                        <p style="text-align:center; opacity:0.7; margin-bottom:2rem;">Join our community of young leaders</p>
                        <button onclick="showRegisterModal()" class="btn btn-primary">Create Account</button>
                        <button onclick="showLoginModal()" class="btn btn-outline">Login</button>
                    </div>
                `;
                return;
            }
            
            currentUser = session.user;
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', session.user.id)
                .single();
            currentProfile = profile;
            
            // Get user stats
            const { data: userLikes } = await supabaseClient.from('likes').select('id').eq('user_id', session.user.id);
            const { data: userComments } = await supabaseClient.from('comments').select('id').eq('user_id', session.user.id);
            
            container.innerHTML = `
                <div class="profile-card">
                    <div class="avatar-section">
                        <div class="avatar">${(profile?.full_name?.[0] || session.user.email?.[0] || 'U').toUpperCase()}</div>
                        <button class="change-avatar" onclick="alert('Avatar upload coming soon!')"><i class="fas fa-camera"></i> Change</button>
                    </div>
                    
                    <div class="info-field">
                        <div class="info-label">Full Name</div>
                        <div class="info-value">${profile?.full_name || 'Not set'} <i class="fas fa-pen" style="cursor:pointer; font-size:0.8rem; opacity:0.5;" onclick="editField('full_name')"></i></div>
                    </div>
                    
                    <div class="info-field">
                        <div class="info-label">Email</div>
                        <div class="info-value">${session.user.email}</div>
                    </div>
                    
                    <div class="info-field">
                        <div class="info-label">Parish</div>
                        <div class="info-value">${profile?.parish || 'Not assigned'}</div>
                    </div>
                    
                    ${profile?.leadership_tag ? `
                        <div class="info-field">
                            <div class="info-label">Leadership Status</div>
                            <div class="info-value">
                                <span class="leadership-badge"><i class="fas fa-crown"></i> ${profile.leadership_tag}</span>
                            </div>
                        </div>
                    ` : ''}
                    
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-number">${userLikes?.length || 0}</div>
                            <div class="stat-label">Likes Given</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">${userComments?.length || 0}</div>
                            <div class="stat-label">Comments</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">${profile?.is_a_squared ? '✓' : '○'}</div>
                            <div class="stat-label">A-Squared</div>
                        </div>
                    </div>
                    
                    ${!profile?.a_squared_requested && !profile?.is_a_squared && profile?.role !== 'admin' ? `
                        <button onclick="requestASquared()" class="btn btn-primary">
                            <i class="fas fa-star"></i> Request A-Squared Membership
                        </button>
                    ` : profile?.a_squared_requested && !profile?.is_a_squared ? `
                        <div style="text-align:center; padding:1rem; background:rgba(237,137,54,0.2); border-radius:16px;">
                            <i class="fas fa-clock"></i> A-Squared Request Pending Admin Approval
                        </div>
                    ` : ''}
                    
                    <button onclick="logout()" class="btn btn-danger">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            `;
        }
        
        function editField(field) {
            const newValue = prompt(`Enter new ${field}:`);
            if (newValue) {
                supabaseClient.from('profiles').update({ [field]: newValue }).eq('id', currentUser.id).then(() => loadProfile());
            }
        }
        
        async function requestASquared() {
            const aSquaredType = prompt('Select A-Squared type:\n1 - Parish A-Squared (Local Executives)\n2 - Archdeaconry A-Squared (IC3A / ASGSK)');
            const type = aSquaredType === '1' ? 'Parish A-Squared' : 'Archdeaconry A-Squared';
            
            await supabaseClient.from('profiles').update({ 
                a_squared_requested: true,
                a_squared_type: type
            }).eq('id', currentUser.id);
            
            alert('Request submitted to admin! You will be notified upon approval.');
            loadProfile();
        }
        
        function showRegisterModal() {
            const modalHtml = `
                <div id="regModal" class="modal" style="display:flex;">
                    <div class="modal-content">
                        <h2 style="margin-bottom:1rem;">Join AYF</h2>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="regName" placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="regEmail" placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="regPassword" placeholder="Create a password">
                        </div>
                        <div class="form-group">
                            <label>Select Parish</label>
                            <select id="regParish">
                                <option value="St. Mathus Anglican Church">St. Mathus Anglican Church</option>
                                <option value="St. Philip Anglican Church">St. Philip Anglican Church</option>
                                <option value="St. Barnabas Jaiyuan">St. Barnabas Jaiyuan</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>A-Squared Membership (Optional)</label>
                            <div class="radio-group">
                                <label><input type="radio" name="aSquared" value="none" checked> None</label>
                                <label><input type="radio" name="aSquared" value="parish"> Parish A-Squared</label>
                                <label><input type="radio" name="aSquared" value="archdeaconry"> Archdeaconry A-Squared</label>
                            </div>
                        </div>
                        <button onclick="register()" class="btn btn-primary">Register</button>
                        <button onclick="closeModal()" class="btn btn-outline" style="margin-top:0.5rem;">Cancel</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }
        
        function showLoginModal() {
            const modalHtml = `
                <div id="loginModal" class="modal" style="display:flex;">
                    <div class="modal-content">
                        <h2 style="margin-bottom:1rem;">Login</h2>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="loginEmail" placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" placeholder="Password">
                        </div>
                        <button onclick="login()" class="btn btn-primary">Login</button>
                        <button onclick="closeModal()" class="btn btn-outline" style="margin-top:0.5rem;">Cancel</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }
        
        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const parish = document.getElementById('regParish').value;
            const aSquaredRadio = document.querySelector('input[name="aSquared"]:checked');
            const aSquaredType = aSquaredRadio?.value;
            
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) {
                alert('Error: ' + error.message);
                return;
            }
            
            await supabaseClient.from('profiles').insert([{
                id: data.user.id,
                full_name: name,
                email: email,
                parish: parish,
                role: 'user',
                a_squared_requested: aSquaredType !== 'none',
                a_squared_type: aSquaredType === 'parish' ? 'Parish A-Squared' : aSquaredType === 'archdeaconry' ? 'Archdeaconry A-Squared' : null,
                is_a_squared: false
            }]);
            
            alert('Registration successful! Please check your email to verify.');
            closeModal();
            loadProfile();
        }
        
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                alert('Login failed: ' + error.message);
                return;
            }
            
            closeModal();
            loadProfile();
        }
        
        async function logout() {
            await supabaseClient.auth.signOut();
            loadProfile();
        }
        
        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.remove());
        }
        
        loadProfile();
    </script>
</body>
</html>
