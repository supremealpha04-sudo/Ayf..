<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | AYF Gwarimpa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: white;
            padding-bottom: 70px;
        }
        .header {
            background: #111;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            border-bottom: 1px solid #222;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .profile-header {
            display: flex;
            gap: 30px;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .stats {
            display: flex;
            gap: 25px;
            flex: 1;
            justify-content: center;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 20px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
        }
        .bio {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #222;
        }
        .name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .bio-text {
            color: #aaa;
            font-size: 14px;
        }
        .tag {
            display: inline-block;
            background: #48bb78;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #333;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .logout {
            background: #c00;
        }
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-top: 1px solid #222;
        }
        .footer-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #888;
            text-decoration: none;
            font-size: 12px;
        }
        .footer-nav-item i {
            font-size: 22px;
        }
        .footer-nav-item.active {
            color: #667eea;
        }
        .loading {
            text-align: center;
            padding: 50px;
        }
        @media (max-width: 768px) {
            .profile-header { gap: 15px; }
            .avatar { width: 70px; height: 70px; font-size: 28px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">👤</div>
            <span style="font-weight: bold;">Profile</span>
        </div>
    </div>

    <div class="profile-container" id="profileContainer">
        <div class="loading">Loading...</div>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="footer-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="profile.html" class="footer-nav-item active">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </div>

    <script>
        const SUPABASE_URL = 'https://jvfdcuvinlimurlttiqy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2ZmRjdXZpbmxpbXVybHR0aXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Njk0MTAsImV4cCI6MjA5MTA0NTQxMH0.ipezUsKqsEAbHvRqBLZYhagZj57rFJKG36uQL_4rFSg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function loadProfile() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                window.location.href = 'auth.html';
                return;
            }
            
            const { data: profile } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', session.user.id)
                .single();
            
            const { data: posts } = await supabase
                .from('posts')
                .select('*')
                .eq('author_id', session.user.id);
            
            const container = document.getElementById('profileContainer');
            container.innerHTML = `
                <div class="profile-header">
                    <div class="avatar">${(profile?.full_name?.[0] || session.user.email[0]).toUpperCase()}</div>
                    <div class="stats">
                        <div class="stat"><div class="stat-number">${posts?.length || 0}</div><div class="stat-label">Posts</div></div>
                        <div class="stat"><div class="stat-number">0</div><div class="stat-label">Followers</div></div>
                        <div class="stat"><div class="stat-number">0</div><div class="stat-label">Following</div></div>
                    </div>
                </div>
                <div class="bio">
                    <div class="name">${profile?.full_name || session.user.email.split('@')[0]}</div>
                    <div class="bio-text">${profile?.bio || 'No bio yet'}</div>
                    ${profile?.leadership_tag ? `<div class="tag"><i class="fas fa-crown"></i> ${profile.leadership_tag}</div>` : ''}
                </div>
                <button onclick="editProfile()">Edit Profile</button>
                <button class="logout" onclick="logout()">Logout</button>
            `;
        }
        
        function editProfile() {
            const newName = prompt('Enter your full name:');
            if (newName) {
                supabase.auth.updateUser({ data: { full_name: newName } });
                location.reload();
            }
        }
        
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'auth.html';
        }
        
        loadProfile();
    </script>
</body>
</html>
