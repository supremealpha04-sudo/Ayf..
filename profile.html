<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Profile | AYF Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            padding-bottom: 70px;
        }

        .header {
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .profile-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .profile-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem;
        }

        .avatar-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 1rem;
        }

        .info-field {
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
        }

        .info-label {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 0.3rem;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .leadership-badge {
            background: #48bb78;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-item {
            text-align: center;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .footer-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            color: #888;
            text-decoration: none;
            font-size: 0.7rem;
            transition: all 0.3s;
        }

        .footer-nav-item i {
            font-size: 1.3rem;
        }

        .footer-nav-item.active, .footer-nav-item:hover {
            color: #667eea;
        }

        @media (max-width: 768px) {
            .profile-container { padding: 1rem; margin: 1rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">👤</div>
            <h3>My Profile</h3>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="plan.html">Plan</a>
            <a href="parish.html">Parish</a>
            <a href="profile.html">Profile</a>
        </div>
    </header>

    <div class="profile-container" id="profileContainer"></div>

    <div class="footer-nav">
        <a href="index.html" class="footer-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="plan.html" class="footer-nav-item">
            <i class="fas fa-calendar-alt"></i>
            <span>Plan</span>
        </a>
        <a href="parish.html" class="footer-nav-item">
            <i class="fas fa-church"></i>
            <span>Parish</span>
        </a>
        <a href="profile.html" class="footer-nav-item active">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </div>

    <script src="supabase/client.js"></script>
    <script>
        // Check if user is logged in
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'auth.html';
                return;
            }
            return session;
        }

        async function loadProfile() {
            const session = await checkAuth();
            if (!session) return;
            
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', session.user.id)
                .single();
            
            const container = document.getElementById('profileContainer');
            
            // If no profile exists, create one with default data
            if (!profile) {
                await supabaseClient.from('profiles').insert([{
                    id: session.user.id,
                    full_name: session.user.email.split('@')[0],
                    email: session.user.email,
                    parish: "St. Mathus Anglican Church",
                    role: "user",
                    is_a_squared: false
                }]);
                loadProfile();
                return;
            }
            
            container.innerHTML = `
                <div class="profile-card">
                    <div class="avatar-section">
                        <div class="avatar">${(profile.full_name?.[0] || session.user.email[0]).toUpperCase()}</div>
                        <button class="btn" style="width:auto; padding:0.5rem 1rem; background:rgba(255,255,255,0.1);" onclick="alert('Avatar upload coming soon!')">Change Avatar</button>
                    </div>
                    
                    <div class="info-field">
                        <div class="info-label">Full Name</div>
                        <div class="info-value">${profile.full_name || session.user.email.split('@')[0]}</div>
                    </div>
                    
                    <div class="info-field">
                        <div class="info-label">Email Address</div>
                        <div class="info-value">${session.user.email}</div>
                    </div>
                    
                    <div class="info-field">
                        <div class="info-label">Parish</div>
                        <div class="info-value">${profile.parish || "Not assigned"}</div>
                    </div>
                    
                    ${profile.leadership_tag ? `
                        <div class="info-field">
                            <div class="info-label">Leadership Status</div>
                            <div class="info-value">
                                <span class="leadership-badge"><i class="fas fa-crown"></i> ${profile.leadership_tag}</span>
                            </div>
                        </div>
                    ` : ''}
                    
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-number">${profile.likes_given || 0}</div>
                            <div class="stat-label">Likes Given</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">${profile.comments_made || 0}</div>
                            <div class="stat-label">Comments</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">${profile.is_a_squared ? '✓' : '○'}</div>
                            <div class="stat-label">A-Squared</div>
                        </div>
                    </div>
                    
                    ${!profile.is_a_squared ? `
                        <button class="btn btn-primary" onclick="requestASquared()">
                            <i class="fas fa-star"></i> Request A-Squared Membership
                        </button>
                    ` : ''}
                    
                    <button class="btn btn-danger" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            `;
        }

        async function requestASquared() {
            const session = await checkAuth();
            if (!session) return;
            
            const type = confirm("Request Parish A-Squared? Click OK for Parish, Cancel for Archdeaconry");
            const aSquaredType = type ? "Parish A-Squared" : "Archdeaconry A-Squared";
            
            await supabaseClient
                .from('profiles')
                .update({ a_squared_requested: true, a_squared_type: aSquaredType })
                .eq('id', session.user.id);
            
            alert("Request submitted to admin! You will be notified upon approval.");
            loadProfile();
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'auth.html';
        }

        loadProfile();
    </script>
</body>
</html>
