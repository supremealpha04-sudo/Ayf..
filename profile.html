<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Profile | AYF Gwarimpa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            padding-bottom: 70px;
        }
        /* Header */
        .header {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }
        .logo { display: flex; align-items: center; gap: 0.8rem; cursor: pointer; }
        .logo-icon { width: 35px; height: 35px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .nav-links a { color: white; text-decoration: none; margin-left: 1rem; font-size: 0.9rem; }
        
        /* Instagram-style Profile */
        .profile-container { max-width: 600px; margin: 0 auto; padding: 1rem; }
        .profile-header { display: flex; gap: 2rem; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .profile-avatar {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .profile-stats { display: flex; gap: 2rem; flex: 1; justify-content: center; }
        .stat { text-align: center; }
        .stat-number { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: 0.8rem; color: #888; }
        .profile-bio { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #222; }
        .profile-name { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.3rem; }
        .profile-bio-text { color: #aaa; font-size: 0.9rem; margin-top: 0.5rem; }
        .leadership-tag {
            display: inline-block;
            background: #48bb78;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 0.5rem;
        }
        .edit-profile-btn {
            background: #333;
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            font-family: inherit;
        }
        .edit-profile-btn:hover { background: #444; }
        
        /* Posts Grid */
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.2rem; margin-top: 1rem; }
        .post-item {
            aspect-ratio: 1;
            background: #1a1a2e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }
        .post-item img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            max-width: 500px;
            width: 90%;
            background: #1a1a2e;
            border-radius: 16px;
            padding: 1.5rem;
        }
        .close-modal { float: right; font-size: 1.5rem; cursor: pointer; background: none; border: none; color: white; }
        
        /* Footer Nav */
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            border-top: 1px solid #222;
            z-index: 1000;
        }
        .footer-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            color: #888;
            text-decoration: none;
            font-size: 0.7rem;
            transition: all 0.3s;
        }
        .footer-nav-item i { font-size: 1.3rem; }
        .footer-nav-item.active, .footer-nav-item:hover { color: #667eea; }
        
        .loading { text-align: center; padding: 2rem; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .profile-header { gap: 1rem; }
            .profile-avatar { width: 70px; height: 70px; font-size: 1.8rem; }
            .stat-number { font-size: 1.2rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">📱</div>
            <h3>AYF Gwarimpa</h3>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="plan.html">Plan</a>
            <a href="parish.html">Parish</a>
            <a href="profile.html">Profile</a>
        </div>
    </header>

    <div class="profile-container" id="profileContainer">
        <div class="loading"><div class="spinner"></div></div>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="footer-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="plan.html" class="footer-nav-item"><i class="fas fa-calendar-alt"></i><span>Plan</span></a>
        <a href="parish.html" class="footer-nav-item"><i class="fas fa-church"></i><span>Parish</span></a>
        <a href="profile.html" class="footer-nav-item active"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeEditModal()">&times;</button>
            <h3>Edit Profile</h3>
            <input type="text" id="editName" placeholder="Full Name" style="width:100%; padding:0.8rem; margin:1rem 0; border-radius:8px; border:none;">
            <input type="text" id="editBio" placeholder="Bio" style="width:100%; padding:0.8rem; margin:1rem 0; border-radius:8px; border:none;">
            <button class="edit-profile-btn" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jvfdcuvinlimurlttiqy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2ZmRjdXZpbmxpbXVybHR0aXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Njk0MTAsImV4cCI6MjA5MTA0NTQxMH0.ipezUsKqsEAbHvRqBLZYhagZj57rFJKG36uQL_4rFSg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let currentProfile = null;
        
        async function loadProfile() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'auth.html';
                return;
            }
            currentUser = session.user;
            
            const { data: profile } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', session.user.id)
                .single();
            currentProfile = profile;
            
            // Get user posts
            const { data: posts } = await supabase
                .from('posts')
                .select('*')
                .eq('author_id', session.user.id)
                .order('created_at', { ascending: false });
            
            const container = document.getElementById('profileContainer');
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${(profile?.full_name?.[0] || session.user.email[0]).toUpperCase()}</div>
                    <div class="profile-stats">
                        <div class="stat"><div class="stat-number">${posts?.length || 0}</div><div class="stat-label">Posts</div></div>
                        <div class="stat"><div class="stat-number">${profile?.followers_count || 0}</div><div class="stat-label">Followers</div></div>
                        <div class="stat"><div class="stat-number">${profile?.following_count || 0}</div><div class="stat-label">Following</div></div>
                    </div>
                </div>
                <div class="profile-bio">
                    <div class="profile-name">${profile?.full_name || session.user.email.split('@')[0]}</div>
                    <div class="profile-bio-text">${profile?.bio || 'No bio yet'}</div>
                    ${profile?.leadership_tag ? `<span class="leadership-tag"><i class="fas fa-crown"></i> ${profile.leadership_tag}</span>` : ''}
                    <button class="edit-profile-btn" onclick="openEditModal()"><i class="fas fa-pen"></i> Edit Profile</button>
                </div>
                <div class="posts-grid" id="postsGrid"></div>
            `;
            
            const postsGrid = document.getElementById('postsGrid');
            if (posts && posts.length > 0) {
                postsGrid.innerHTML = posts.map(post => `
                    <div class="post-item" onclick="alert('Post: ${post.title}')">
                        ${post.media_url ? `<img src="${post.media_url}" alt="post">` : `<i class="fas fa-image" style="font-size:2rem; color:#666;"></i>`}
                    </div>
                `).join('');
            } else {
                postsGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem; color:#666;">No posts yet</div>';
            }
        }
        
        function openEditModal() {
            document.getElementById('editName').value = currentProfile?.full_name || '';
            document.getElementById('editBio').value = currentProfile?.bio || '';
            document.getElementById('editModal').style.display = 'flex';
        }
        
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        async function saveProfile() {
            const fullName = document.getElementById('editName').value;
            const bio = document.getElementById('editBio').value;
            
            await supabase
                .from('profiles')
                .update({ full_name: fullName, bio: bio })
                .eq('id', currentUser.id);
            
            closeEditModal();
            loadProfile();
        }
        
        loadProfile();
    </script>
</body>
</html>
