<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Content - Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="../assets/images/logo.png" alt="AYF Logo" class="logo">
            <h1>Content Management</h1>
        </div>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="users.html">Users</a>
            <a href="posts.html" class="active">Posts</a>
            <a href="quotas.html">Quotas</a>
            <a href="approvals.html">Approvals</a>
        </nav>
    </header>

    <main class="container">
        <button id="createPostBtn" class="btn btn-primary">Create New Post</button>
        <div id="postsManagement" class="posts-list"></div>
    </main>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modalTitle">Create Post</h3>
            <input type="text" id="postTitle" placeholder="Title">
            <textarea id="postContent" placeholder="Content"></textarea>
            <select id="postType">
                <option value="event">Event</option>
                <option value="video">Video</option>
                <option value="image">Image</option>
                <option value="article">Article</option>
            </select>
            <select id="postParish">
                <option value="all">All Parishes</option>
                <option value="St. Mathus Anglican Church">St. Mathus</option>
                <option value="St. Philip Anglican Church">St. Philip</option>
                <option value="St. Barnabas Jaiyuan">St. Barnabas</option>
            </select>
            <input type="file" id="postMedia" accept="image/*,video/*">
            <button id="savePost" class="btn btn-primary">Save</button>
        </div>
    </div>

    <script src="../supabase/client.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
