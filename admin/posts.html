<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Management | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: white;
        }
        
        .admin-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 2rem 1rem;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            color: #aaa;
            text-decoration: none;
            border-radius: 12px;
            margin: 0.5rem 0;
        }
        
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: rgba(102,126,234,0.2);
            color: white;
        }
        
        .main-content {
            margin-left: 260px;
            padding: 2rem;
        }
        
        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        
        .posts-grid {
            display: grid;
            gap: 1rem;
        }
        
        .post-item {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
        }
        
        @media (max-width: 768px) {
            .admin-sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="admin-sidebar">
        <div style="margin-bottom:2rem; text-align:center;"><h3>⚡ AYF Admin</h3></div>
        <div class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="users.html"><i class="fas fa-users"></i> Users</a>
            <a href="posts.html" class="active"><i class="fas fa-newspaper"></i> Posts</a>
            <a href="quotas.html"><i class="fas fa-chart-simple"></i> Quotas</a>
            <a href="approvals.html"><i class="fas fa-check-circle"></i> Approvals</a>
            <a href="../index.html"><i class="fas fa-globe"></i> View Site</a>
        </div>
    </div>
    
    <div class="main-content">
        <h1>Content Management</h1>
        <button class="btn" onclick="showPostModal()"><i class="fas fa-plus"></i> Create New Post</button>
        <div class="posts-grid" id="postsGrid"></div>
    </div>
    
    <div class="modal" id="postModal">
        <div class="modal-content">
            <h3 id="modalTitle">Create Post</h3>
            <input type="text" id="postTitle" placeholder="Title">
            <textarea id="postContent" rows="4" placeholder="Content"></textarea>
            <select id="postType">
                <option value="event">Event</option>
                <option value="article">Article</option>
                <option value="notice">Notice</option>
                <option value="video">Video</option>
            </select>
            <select id="postParish">
                <option value="all">All Parishes</option>
                <option value="St. Mathus Anglican Church">St. Mathus</option>
                <option value="St. Philip Anglican Church">St. Philip</option>
                <option value="St. Barnabas Jaiyuan">St. Barnabas</option>
            </select>
            <input type="file" id="postMedia" accept="image/*,video/*">
            <button class="btn" onclick="savePost()">Save</button>
            <button class="btn" style="background:#444;" onclick="closeModal()">Cancel</button>
        </div>
    </div>
    
    <script src="../supabase/client.js"></script>
    <script>
        let editingPostId = null;
        
        async function loadPosts() {
            const { data: posts } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
            const grid = document.getElementById('postsGrid');
            grid.innerHTML = posts.map(post => `
                <div class="post-item">
                    <div>
                        <strong>${post.title}</strong>
                        <div style="font-size:0.8rem; opacity:0.7;">${post.type} | ${post.parish || 'General'}</div>
                    </div>
                    <div>
                        <button class="btn" style="padding:0.3rem 0.8rem; margin-right:0.5rem;" onclick="editPost(${post.id})">Edit</button>
                        <button class="btn" style="padding:0.3rem 0.8rem; background:#f56565;" onclick="deletePost(${post.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function showPostModal(editMode = false) {
            document.getElementById('postModal').style.display = 'flex';
            if (!editMode) {
                editingPostId = null;
                document.getElementById('modalTitle').innerHTML = 'Create Post';
                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
            }
        }
        
        async function editPost(postId) {
            const { data: post } = await supabaseClient.from('posts').select('*').eq('id', postId).single();
            editingPostId = postId;
            document.getElementById('modalTitle').innerHTML = 'Edit Post';
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postContent').value = post.content;
            document.getElementById('postType').value = post.type;
            document.getElementById('postParish').value = post.parish || 'all';
            document.getElementById('postModal').style.display = 'flex';
        }
        
        async function savePost() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const type = document.getElementById('postType').value;
            const parish = document.getElementById('postParish').value === 'all' ? null : document.getElementById('postParish').value;
            
            let media_url = null;
            const file = document.getElementById('postMedia').files[0];
            if (file) {
                const fileName = `${Date.now()}_${file.name}`;
                const { data } = await supabaseClient.storage.from('media').upload(fileName, file);
                if (data) media_url = supabaseClient.storage.from('media').getPublicUrl(fileName).data.publicUrl;
            }
            
            if (editingPostId) {
                await supabaseClient.from('posts').update({ title, content, type, parish, media_url }).eq('id', editingPostId);
            } else {
                await supabaseClient.from('posts').insert([{ title, content, type, parish, media_url, author_id: (await supabaseClient.auth.getUser()).data.user.id }]);
            }
            
            closeModal();
            loadPosts();
        }
        
        async function deletePost(postId) {
            if (confirm('Delete this post?')) {
                await supabaseClient.from('posts').delete().eq('id', postId);
                loadPosts();
            }
        }
        
        function closeModal() {
            document.getElementById('postModal').style.display = 'none';
            editingPostId = null;
        }
        
        loadPosts();
    </script>
</body>
</html>
