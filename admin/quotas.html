<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quota Management | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: white;
        }
        
        .admin-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 2rem 1rem;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            color: #aaa;
            text-decoration: none;
            border-radius: 12px;
            margin: 0.5rem 0;
        }
        
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: rgba(102,126,234,0.2);
            color: white;
        }
        
        .main-content {
            margin-left: 260px;
            padding: 2rem;
        }
        
        .quota-form {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #aaa;
        }
        
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
        }
        
        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
        }
        
        .notification-preview {
            background: rgba(102,126,234,0.1);
            border-left: 3px solid #667eea;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
        }
        
        .presidents-list {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 1rem;
        }
        
        .president-item {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        @media (max-width: 768px) {
            .admin-sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="admin-sidebar">
        <div style="margin-bottom:2rem; text-align:center;"><h3>⚡ AYF Admin</h3></div>
        <div class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="users.html"><i class="fas fa-users"></i> Users</a>
            <a href="posts.html"><i class="fas fa-newspaper"></i> Posts</a>
            <a href="quotas.html" class="active"><i class="fas fa-chart-simple"></i> Quotas</a>
            <a href="approvals.html"><i class="fas fa-check-circle"></i> Approvals</a>
            <a href="../index.html"><i class="fas fa-globe"></i> View Site</a>
        </div>
    </div>
    
    <div class="main-content">
        <h1>Quota Management</h1>
        <p style="margin-bottom:2rem; opacity:0.7;">Set yearly quotas - Only parish presidents receive private notifications</p>
        
        <div class="quota-form">
            <h3>Set New Quota</h3>
            <div class="form-group">
                <label>Year</label>
                <input type="number" id="quotaYear" value="2026">
            </div>
            <div class="form-group">
                <label>Total Quota Amount (₦)</label>
                <input type="number" id="totalQuota" placeholder="Enter total amount">
            </div>
            <div class="form-group">
                <label>Distribution Formula / Notes</label>
                <textarea id="quotaNotes" rows="3" placeholder="Explain how the quota will be distributed per parish..."></textarea>
            </div>
            <button class="btn" id="sendQuotaBtn">Calculate & Send to Presidents</button>
            
            <div id="preview" class="notification-preview" style="display:none;"></div>
        </div>
        
        <div class="presidents-list">
            <h3>Parish Presidents</h3>
            <div id="presidentsList"></div>
        </div>
    </div>
    
    <script src="../supabase/client.js"></script>
    <script>
        async function loadPresidents() {
            const { data: presidents } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('leadership_role', 'President')
                .or('leadership_tag.ilike.%President%');
            
            const container = document.getElementById('presidentsList');
            if (presidents && presidents.length) {
                container.innerHTML = presidents.map(p => `
                    <div class="president-item">
                        <div>
                            <strong>${p.full_name || p.email}</strong>
                            <div style="font-size:0.8rem; opacity:0.7;">${p.parish} | ${p.leadership_tag || 'President'}</div>
                        </div>
                        <i class="fas fa-check-circle" style="color:#48bb78;"></i>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p style="padding:1rem;">No parish presidents found. Approve A-Squared members with president roles first.</p>';
            }
        }
        
        async function sendQuota() {
            const year = document.getElementById('quotaYear').value;
            const total = document.getElementById('totalQuota').value;
            const notes = document.getElementById('quotaNotes').value;
            
            if (!total) {
                alert('Please enter total quota amount');
                return;
            }
            
            const perParish = Math.floor(total / 3);
            const remainder = total % 3;
            const parishes = ['St. Mathus Anglican Church', 'St. Philip Anglican Church', 'St. Barnabas Jaiyuan'];
            const distribution = parishes.map((p, i) => `${p}: ₦${perParish + (i < remainder ? 1 : 0)}`).join('\n');
            
            const preview = document.getElementById('preview');
            preview.style.display = 'block';
            preview.innerHTML = `
                <strong>📊 Quota Distribution for ${year}</strong><br>
                Total: ₦${total}<br><br>
                <strong>Per Parish:</strong><br>
                ${distribution.split('\n').join('<br>')}<br><br>
                ${notes ? `<strong>Notes:</strong><br>${notes}<br><br>` : ''}
                <strong>⚠️ This will be sent as a private notification to all parish presidents only.</strong>
            `;
            
            const { data: presidents } = await supabaseClient
                .from('profiles')
                .select('id')
                .eq('leadership_role', 'President')
                .or('leadership_tag.ilike.%President%');
            
            if (presidents && presidents.length) {
                for (const president of presidents) {
                    await supabaseClient.from('notifications').insert([{
                        user_id: president.id,
                        title: `Quota Distribution ${year}`,
                        message: `Total Quota: ₦${total}\n\nDistribution:\n${distribution}\n\n${notes ? `\nNotes: ${notes}` : ''}`,
                        type: 'quota',
                        metadata: { year, total, distribution, notes }
                    }]);
                }
                
                alert(`Quota notification sent to ${presidents.length} parish presidents privately.`);
            } else {
                alert('No parish presidents found to send notifications.');
            }
        }
        
        document.getElementById('sendQuotaBtn').addEventListener('click', sendQuota);
        loadPresidents();
    </script>
</body>
</html>
