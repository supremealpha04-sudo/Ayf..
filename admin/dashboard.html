<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | AYF Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: white;
        }
        .admin-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 2rem 1rem;
        }
        .sidebar-header { text-align: center; margin-bottom: 2rem; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            color: #aaa;
            text-decoration: none;
            border-radius: 12px;
            margin: 0.5rem 0;
            transition: all 0.3s;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(102,126,234,0.2); color: white; }
        .main-content { margin-left: 260px; padding: 2rem; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 800; color: #667eea; }
        .recent-section {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }
        .recent-item {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        @media (max-width: 768px) {
            .admin-sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .admin-sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="admin-sidebar" id="sidebar">
        <div class="sidebar-header"><div style="font-size:2rem;">⚡</div><h3>AYF Admin</h3></div>
        <div class="sidebar-nav">
            <a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="users.html"><i class="fas fa-users"></i> Users</a>
            <a href="posts.html"><i class="fas fa-newspaper"></i> Posts</a>
            <a href="plans.html"><i class="fas fa-calendar-alt"></i> Plans</a>
            <a href="approvals.html"><i class="fas fa-check-circle"></i> Approvals</a>
            <a href="../index.html"><i class="fas fa-globe"></i> View Site</a>
        </div>
    </div>

    <div class="main-content">
        <button id="menuToggle" style="display:none; background:none; border:none; color:white; font-size:1.5rem; margin-bottom:1rem; cursor:pointer;"><i class="fas fa-bars"></i></button>
        <h1>Dashboard Overview</h1>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="recent-section"><h3>Recent Posts</h3><div id="recentPosts"></div></div>
    </div>

    <script src="../supabase/client.js"></script>
    <script>
        async function loadStats() {
            const { data: users } = await supabaseClient.from('profiles').select('*');
            const { data: posts } = await supabaseClient.from('posts').select('*');
            const { data: aSquared } = await supabaseClient.from('profiles').select('*').eq('is_a_squared', true);
            const { data: pending } = await supabaseClient.from('profiles').select('*').eq('a_squared_requested', true).eq('is_a_squared', false);
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-value">${users?.length || 0}</div><div>Total Members</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-crown"></i></div><div class="stat-value">${aSquared?.length || 0}</div><div>A-Squared Leaders</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-file-alt"></i></div><div class="stat-value">${posts?.length || 0}</div><div>Total Posts</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-value">${pending?.length || 0}</div><div>Pending Approvals</div></div>
            `;
            
            const recentPosts = posts?.slice(0, 5) || [];
            document.getElementById('recentPosts').innerHTML = recentPosts.map(post => `
                <div class="recent-item"><div><strong>${post.title}</strong><div style="font-size:0.8rem; opacity:0.7;">${new Date(post.created_at).toLocaleDateString()}</div></div><span>${post.type}</span></div>
            `).join('');
        }
        
        if (window.innerWidth <= 768) {
            document.getElementById('menuToggle').style.display = 'block';
            document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
        }
        
        loadStats();
    </script>
</body>
</html>
