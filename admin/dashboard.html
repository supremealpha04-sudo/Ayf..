<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AYF</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="../assets/images/logo.png" alt="AYF Logo" class="logo">
            <h1>Admin Panel</h1>
        </div>
        <nav>
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="users.html">Users</a>
            <a href="posts.html">Posts</a>
            <a href="quotas.html">Quotas</a>
            <a href="approvals.html">Approvals</a>
            <a href="../index.html">View Site</a>
        </nav>
        <button id="themeToggle" class="theme-toggle">🌙</button>
    </header>

    <main class="container">
        <div class="admin-stats">
            <div class="stat-card">
                <h3>Total Users</h3>
                <p id="totalUsers">0</p>
            </div>
            <div class="stat-card">
                <h3>Total Parishes</h3>
                <p id="totalParishes">3</p>
            </div>
            <div class="stat-card">
                <h3>A-Squared Members</h3>
                <p id="aSquaredCount">0</p>
            </div>
        </div>
        
        <div id="parishStats" class="parish-stats"></div>
    </main>

    <script src="../supabase/client.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
