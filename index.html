<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AYF GWARIMPA - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: white;
            border: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .form-container {
            padding: 30px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .image-upload {
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            position: relative;
        }

        .image-upload:hover {
            border-color: #667eea;
        }

        .image-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 10px;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }

        .checkbox-group input {
            width: auto;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
            }
            
            .form-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AYF GWARIMPA</h1>
            <p>Anglican Youth Fellowship - Gwarimpa</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" id="loginTab">Login</button>
            <button class="tab" id="registerTab">Register</button>
        </div>
        
        <div class="form-container">
            <!-- Login Form -->
            <div id="loginForm" class="form active">
                <form id="loginFormElement">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn">Login</button>
                    <div class="loading" id="loginLoading">Logging in...</div>
                </form>
            </div>
            
            <!-- Register Form -->
            <div id="registerForm" class="form">
                <form id="registerFormElement">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="regName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="regConfirmPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Parish Name</label>
                        <select id="regParish" required>
                            <option value="">Select Parish</option>
                            <option value="St. Peter's Anglican Church">St. Peter's Anglican Church</option>
                            <option value="St. Paul's Anglican Church">St. Paul's Anglican Church</option>
                            <option value="St. John's Anglican Church">St. John's Anglican Church</option>
                            <option value="Holy Trinity Anglican Church">Holy Trinity Anglican Church</option>
                            <option value="Christ Anglican Church">Christ Anglican Church</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="regGender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Profile Image</label>
                        <div class="image-upload" id="imageUploadBtn">
                            <img id="imagePreview" class="image-preview" alt="Preview">
                            <p>Click to upload profile image</p>
                        </div>
                        <input type="file" id="profileImage" accept="image/*" style="display: none;">
                    </div>
                    <div class="form-group">
                        <label>Position (Optional)</label>
                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" id="excoParish"> Parish Exco
                            </label>
                            <label>
                                <input type="checkbox" id="excoArchediceanry"> Archediceanry Exco
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn">Register</button>
                    <div class="loading" id="registerLoading">Creating account...</div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Supabase configuration - UPDATE THESE
       const SUPABASE_URL = 'https://jvfdcuvinlimurlttiqy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2ZmRjdXZpbmxpbXVybHR0aXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Njk0MTAsImV4cCI6MjA5MTA0NTQxMH0.ipezUsKqsEAbHvRqBLZYhagZj57rFJKG36uQL_4rFSg'; // ⚠️ Replace with real key
 const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let profileImageFile = null;
        
        // Tab switching
        document.getElementById('loginTab').onclick = function() {
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('registerTab').classList.remove('active');
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
        };
        
        document.getElementById('registerTab').onclick = function() {
            document.getElementById('registerTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('registerForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
        };
        
        // Image upload
        document.getElementById('imageUploadBtn').onclick = function() {
            document.getElementById('profileImage').click();
        };
        
        document.getElementById('profileImage').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                profileImageFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.querySelector('#imageUploadBtn p').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        };
        
        // Register handler
        document.getElementById('registerFormElement').onsubmit = async (e) => {
            e.preventDefault();
            
            const loading = document.getElementById('registerLoading');
            loading.style.display = 'block';
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const parish = document.getElementById('regParish').value;
            const gender = document.getElementById('regGender').value;
            const isExcoParish = document.getElementById('excoParish').checked;
            const isExcoArchediceanry = document.getElementById('excoArchediceanry').checked;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                loading.style.display = 'none';
                return;
            }
            
            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                loading.style.display = 'none';
                return;
            }
            
            try {
                // Register user with Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });
                
                if (authError) throw authError;
                
                let profileImageUrl = null;
                if (profileImageFile) {
                    const fileExt = profileImageFile.name.split('.').pop();
                    const fileName = `${authData.user.id}/profile.${fileExt}`;
                    const { error: uploadError } = await supabase.storage
                        .from('profiles')
                        .upload(fileName, profileImageFile);
                    
                    if (!uploadError) {
                        const { data: { publicUrl } } = supabase.storage
                            .from('profiles')
                            .getPublicUrl(fileName);
                        profileImageUrl = publicUrl;
                    }
                }
                
                // Create profile
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([{
                        id: authData.user.id,
                        full_name: name,
                        email: email,
                        parish_name: parish,
                        gender: gender,
                        profile_image_url: profileImageUrl,
                        is_exco_parish: isExcoParish,
                        is_exco_archediceanry: isExcoArchediceanry,
                        exco_request_status: (isExcoParish || isExcoArchediceanry) ? 'pending' : 'approved'
                    }]);
                
                if (profileError) throw profileError;
                
                // Add to parish members
                const { error: memberError } = await supabase
                    .from('parish_members')
                    .insert([{
                        user_id: authData.user.id,
                        parish_name: parish,
                        is_president: false
                    }]);
                
                if (memberError) throw memberError;
                
                alert('Registration successful! Please login.');
                document.getElementById('loginTab').click();
                
            } catch (error) {
                console.error('Registration error:', error);
                alert('Registration failed: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        };
        
        // Login handler - FIXED: removed .single() issue
        document.getElementById('loginFormElement').onsubmit = async (e) => {
            e.preventDefault();
            
            const loading = document.getElementById('loginLoading');
            loading.style.display = 'block';
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                // Get user profile - FIXED: using maybeSingle() instead of single()
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', data.user.id)
                    .maybeSingle();
                
                if (profileError && profileError.message !== 'JSON object requested, multiple (or no) rows returned') {
                    console.error('Profile error:', profileError);
                }
                
                if (!profile) {
                    // Create profile if it doesn't exist (fallback)
                    const { error: insertError } = await supabase
                        .from('profiles')
                        .insert([{
                            id: data.user.id,
                            full_name: email.split('@')[0],
                            email: email,
                            parish_name: 'St. Peter\'s Anglican Church',
                            gender: 'other',
                            is_exco_parish: false,
                            is_exco_archediceanry: false,
                            exco_request_status: 'approved'
                        }]);
                    
                    if (insertError) throw insertError;
                    
                    // Fetch the newly created profile
                    const { data: newProfile } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('id', data.user.id)
                        .maybeSingle();
                    
                    if (newProfile) {
                        localStorage.setItem('ayf_user', JSON.stringify(data.user));
                        localStorage.setItem('ayf_profile', JSON.stringify(newProfile));
                        window.location.href = 'home.html';
                        return;
                    }
                }
                
                // Check if user is suspended
                if (profile && profile.is_suspended && profile.suspension_end_date && new Date(profile.suspension_end_date) > new Date()) {
                    alert(`Your account is suspended until ${new Date(profile.suspension_end_date).toLocaleDateString()}`);
                    loading.style.display = 'none';
                    return;
                }
                
                // Store user session
                localStorage.setItem('ayf_user', JSON.stringify(data.user));
                localStorage.setItem('ayf_profile', JSON.stringify(profile || {}));
                
                // Redirect to home page
                window.location.href = 'home.html';
                
            } catch (error) {
                console.error('Login error:', error);
                alert('Login failed: ' + error.message);
                loading.style.display = 'none';
            }
        };
    </script>
</body>
</html>
