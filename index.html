<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>AYF GWARIMPA - Login</title>
    <link rel="stylesheet" href="/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="logo-section">
                    <div class="logo">✝️</div>
                    <h1>AYF GWARIMPA</h1>
                    <p>Fellowship Hub</p>
                </div>

                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Login</button>
                    <button class="tab-btn" data-tab="register">Register</button>
                </div>

                <!-- Login Form -->
                <div id="login-form" class="auth-form active">
                    <form id="login">
                        <div class="input-group">
                            <input type="email" id="login-email" placeholder="Email" required>
                        </div>
                        <div class="input-group">
                            <input type="password" id="login-password" placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn-primary">Login</button>
                    </form>
                </div>

                <!-- Register Form -->
                <div id="register-form" class="auth-form">
                    <form id="register" enctype="multipart/form-data">
                        <div class="input-group">
                            <input type="text" id="reg-fullname" placeholder="Full Name" required>
                        </div>
                        <div class="input-group">
                            <select id="reg-parish" required>
                                <option value="">Select Parish</option>
                                <option value="St. Peter's Catholic Church">St. Peter's Catholic Church</option>
                                <option value="St. Paul's Catholic Church">St. Paul's Catholic Church</option>
                                <option value="Our Lady of Fatima">Our Lady of Fatima</option>
                                <option value="Holy Trinity Catholic Church">Holy Trinity Catholic Church</option>
                                <option value="St. Mary's Catholic Church">St. Mary's Catholic Church</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <select id="reg-gender" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <input type="email" id="reg-email" placeholder="Email" required>
                        </div>
                        <div class="input-group">
                            <input type="password" id="reg-password" placeholder="Password" required>
                        </div>
                        <div class="input-group">
                            <label class="file-label">
                                <span>Profile Image</span>
                                <input type="file" id="reg-profile-image" accept="image/*">
                            </label>
                        </div>
                        <div class="input-group">
                            <select id="reg-role">
                                <option value="user">Regular User</option>
                                <option value="parish_exco">Parish Exco</option>
                                <option value="archdiocesan_exco">Archdiocesan Exco</option>
                                <option value="both">Both</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/main.js"></script>
</body>
</html>
