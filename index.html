<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYF GWARIMPA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: #667eea;
        }

        .tabs {
            display: flex;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #f0f0f0;
            font-weight: bold;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .form-panel {
            padding: 30px;
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:disabled {
            opacity: 0.5;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c33;
            display: block;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            display: block;
        }

        .home-panel {
            display: none;
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
        }

        .home-panel.active {
            display: block;
        }

        .home-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            color: white;
            text-align: center;
        }

        .home-content {
            padding: 30px;
        }

        .info-card {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .info-card p {
            margin: 10px 0;
        }

        .logout-btn {
            background: #dc3545;
        }

        .role-option {
            display: inline-block;
            margin-right: 15px;
            margin-top: 10px;
        }

        .role-option input {
            width: auto;
            margin-right: 5px;
        }
    </style>
</head>
<body>
  <!-- Login/Register Container -->
  <div id="authContainer" class="container">
    <div class="header">
      <div class="logo"><i class="fas fa-church"></i></div>
      <h1>AYF GWARIMPA</h1>
      <p>Anglican Youth Fellowship</p>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="showTab('login')">Login</div>
      <div class="tab" onclick="showTab('register')">Register</div>
    </div>

    <!-- Login Form -->
    <div id="loginPanel" class="form-panel active">
      <div id="loginMsg" class="message"></div>
      <input type="email" id="loginEmail" placeholder="Email" autocomplete="off">
      <input type="password" id="loginPassword" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>

    <!-- Register Form -->
    <div id="registerPanel" class="form-panel">
      <div id="registerMsg" class="message"></div>
      <input type="text" id="regName" placeholder="Full Name">
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regPassword" placeholder="Password (min 6 chars)">

      <select id="regParish">
        <option value="">Select Parish</option>
        <option>St. Matthews</option>
        <option>St. Pauls</option>
        <option>St. Johns</option>
        <option>All Saints</option>
      </select>

      <select id="regGender">
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
      </select>

      <div>
        <label class="role-option">
          <input type="radio" name="role" value="member" checked> Member
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="exco"> Exco
        </label>
      </div>

      <button onclick="register()">Create Account</button>
    </div>
  </div>

  <!-- Home Container -->
  <div id="homeContainer" class="home-panel">
    <div class="home-header">
      <div class="logo"><i class="fas fa-church"></i></div>
      <h1>Welcome to AYF GWARIMPA</h1>
    </div>

    <div class="home-content">
      <div id="homeInfo" class="info-card">Loading...</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>


<script>
  const SUPABASE_URL = 'https://jvfdcuvinlimurlttiqy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // shortened for clarity
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

function showMessage(element, msg, type) {
    const el = document.getElementById(element);
    el.textContent = msg;
    el.className = `message ${type}`;
    el.style.display = 'block';
    setTimeout(() => {
        el.style.display = 'none';
        el.className = 'message';
    }, 3000);
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    
    if (tab === 'login') {
        document.querySelector('.tab:first-child').classList.add('active');
        document.getElementById('loginPanel').classList.add('active');
    } else {
        document.querySelector('.tab:last-child').classList.add('active');
        document.getElementById('registerPanel').classList.add('active');
    }
}

async function login(event) {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const btn = event.target;
    
    if (!email || !password) {
        showMessage('loginMsg', 'Please enter email and password', 'error');
        return;
    }
    
    btn.disabled = true;
    btn.textContent = 'Logging in...';
    
    try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        
        const { data: profile, error: profileError } = await supabase
            .from('users')
            .select('*')
            .eq('id', data.user.id)
            .single();
        
        if (profileError) throw new Error('Profile not found');
        
        if (profile.approval_status === 'pending') {
            await supabase.auth.signOut();
            throw new Error('Account pending approval. Please wait.');
        }
        
        currentUser = profile;
        showHome();
        
    } catch (error) {
        showMessage('loginMsg', error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Login';
    }
}

async function register(event) {
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const parish = document.getElementById('regParish').value;
    const gender = document.getElementById('regGender').value;
    const role = document.querySelector('input[name="role"]:checked').value;
    const btn = event.target;
    
    if (!name || !email || !password || !parish || !gender) {
        showMessage('registerMsg', 'Please fill all fields', 'error');
        return;
    }
    
    if (password.length < 6) {
        showMessage('registerMsg', 'Password must be at least 6 characters', 'error');
        return;
    }
    
    btn.disabled = true;
    btn.textContent = 'Creating...';
    
    try {
        const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });
        if (authError) throw authError;
        
        const { error: profileError } = await supabase
            .from('users')
            .insert([{
                id: authData.user.id,
                email,
                full_name: name,
                parish,
                gender,
                role,
                is_approved: role === 'member',
                approval_status: role === 'member' ? 'approved' : 'pending'
            }]);
        
        if (profileError) throw profileError;
        
        showMessage('registerMsg', 'Account created! Please login.', 'success');
        
        document.getElementById('regName').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('regParish').value = '';
        document.getElementById('regGender').value = '';
        
        setTimeout(() => showTab('login'), 2000);
        
    } catch (error) {
        showMessage('registerMsg', error.message, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
    }
}

async function showHome() {
    document.getElementById('authContainer').style.display = 'none';
    document.getElementById('homeContainer').classList.add('active');
    
    document.getElementById('homeInfo').innerHTML = `
        <p><strong>👤 Name:</strong> ${currentUser.full_name}</p>
        <p><strong>📧 Email:</strong> ${currentUser.email}</p>
        <p><strong>⛪ Parish:</strong> ${currentUser.parish}</p>
        <p><strong>⚥ Gender:</strong> ${currentUser.gender}</p>
        <p><strong>🎭 Role:</strong> ${currentUser.role.toUpperCase()}</p>
        <p><strong>✅ Status:</strong> ${currentUser.approval_status.toUpperCase()}</p>
    `;
}

async function logout() {
    await supabase.auth.signOut();
    currentUser = null;
    document.getElementById('authContainer').style.display = 'block';
    document.getElementById('homeContainer').classList.remove('active');
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
    showTab('login');
}

async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        const { data: profile } = await supabase
            .from('users')
            .select('*')
            .eq('id', session.user.id)
            .single();
        
        if (profile && profile.approval_status !== 'pending') {
            currentUser = profile;
            showHome();
        }
    }
}

// Attach event listeners instead of inline onclick
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('registerBtn').addEventListener('click', register);
document.getElementById('logoutBtn').addEventListener('click', logout);

// Initial session check
checkSession();

</script>
</body>
</html>
