<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AYF Gwarimpa | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
            padding-bottom: 70px;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }
        .particle {
            position: absolute;
            background: rgba(102,126,234,0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        .header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .logo-text h1 { font-size: 1.3rem; font-weight: 700; }
        .logo-text p { font-size: 0.7rem; opacity: 0.7; }
        .nav-links { display: flex; gap: 1rem; }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-links a:hover { background: rgba(102,126,234,0.2); }
        .hero {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 2rem;
        }
        .hero-content { max-width: 800px; animation: fadeInUp 1s ease; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 2rem; line-height: 1.6; }
        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.3); }
        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }
        .feed-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .section-title { font-size: 1.8rem; font-weight: 700; }
        .category-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .filter-chip {
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-chip:hover, .filter-chip.active { background: linear-gradient(135deg, #667eea, #764ba2); }
        .feed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .post-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .post-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); border-color: #667eea; }
        .post-header {
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .post-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .post-author-name { font-weight: 600; cursor: pointer; }
        .leadership-tag {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            background: #48bb78;
            border-radius: 50px;
            display: inline-block;
            margin-left: 0.5rem;
        }
        .post-content { padding: 1rem; }
        .post-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .post-text { opacity: 0.8; line-height: 1.5; }
        .post-media {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            margin-top: 0.5rem;
            border-radius: 12px;
        }
        .post-stats {
            display: flex;
            gap: 1rem;
            padding: 0.5rem 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
            color: #888;
        }
        .post-stats span { display: flex; align-items: center; gap: 0.3rem; }
        .post-actions {
            display: flex;
            gap: 1rem;
            padding: 0.5rem 1rem 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .action-btn {
            flex: 1;
            padding: 0.5rem;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .action-btn:hover { background: rgba(102,126,234,0.2); color: #667eea; }
        .action-btn.liked { color: #ff4757; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }
        .modal-content {
            max-width: 800px;
            width: 90%;
            background: #1a1a2e;
            border-radius: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: #1a1a2e;
        }
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .comments-section { padding: 1rem; }
        .comment {
            margin-bottom: 1rem;
            padding: 0.8rem;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border-left: 3px solid #667eea;
        }
        .comment.reply { margin-left: 2rem; }
        .comment-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .comment-author { font-weight: 600; cursor: pointer; }
        .comment-time { font-size: 0.7rem; color: #888; }
        .reply-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .comment-input {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .comment-input input {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        .footer-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            color: #888;
            text-decoration: none;
            font-size: 0.7rem;
            transition: all 0.3s;
        }
        .footer-nav-item i { font-size: 1.3rem; }
        .footer-nav-item.active, .footer-nav-item:hover { color: #667eea; }
        .loading { text-align: center; padding: 2rem; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .feed-grid { grid-template-columns: 1fr; }
            .nav-links { display: none; }
            .section-header { flex-direction: column; align-items: flex-start; }
            .comment.reply { margin-left: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>

    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">✝️</div>
            <div class="logo-text">
                <h1>AYF Gwarimpa</h1>
                <p>Arise & Shine</p>
            </div>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="plan.html">Plan</a>
            <a href="parish.html">Parish</a>
            <a href="profile.html">Profile</a>
            <a href="admin/dashboard.html" id="adminLink" style="display:none;">Admin</a>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to AYF Gwarimpa Archdeaconry</h1>
            <p>A vibrant community of young people dedicated to spiritual growth, leadership development, and community impact.</p>
            <button class="btn btn-primary" id="joinBtn">Join Fellowship</button>
        </div>
    </section>

    <section class="feed-section">
        <div class="section-header">
            <h2 class="section-title">Latest Updates</h2>
            <div class="category-filters" id="categoryFilters">
                <button class="filter-chip active" data-category="all">All</button>
                <button class="filter-chip" data-category="event">Events</button>
                <button class="filter-chip" data-category="article">Articles</button>
                <button class="filter-chip" data-category="notice">Notices</button>
                <button class="filter-chip" data-category="video">Videos</button>
            </div>
        </div>
        <div class="feed-grid" id="feedGrid">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </section>

    <div class="footer-nav">
        <a href="index.html" class="footer-nav-item active">
            <i class="fas fa-home"></i><span>Home</span>
        </a>
        <a href="about.html" class="footer-nav-item">
            <i class="fas fa-info-circle"></i><span>About</span>
        </a>
        <a href="plan.html" class="footer-nav-item">
            <i class="fas fa-calendar-alt"></i><span>Plan</span>
        </a>
        <a href="parish.html" class="footer-nav-item">
            <i class="fas fa-church"></i><span>Parish</span>
        </a>
        <a href="profile.html" class="footer-nav-item">
            <i class="fas fa-user"></i><span>Profile</span>
        </a>
    </div>

    <div class="modal" id="postModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Post Details</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="modal" id="profileModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>User Profile</h3>
                <button class="close-modal" onclick="closeProfileModal()">&times;</button>
            </div>
            <div id="profileModalBody"></div>
        </div>
    </div>

    <script src="supabase/client.js"></script>
    <script>
        let currentUser = null;
        let currentProfile = null;
        let currentCategory = 'all';
        let posts = [];
        let userLikes = new Set();

        // Create particles
        for(let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 5 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = Math.random() * 15 + 10 + 's';
            document.getElementById('bgAnimation').appendChild(particle);
        }

        async function init() {
            const isLoggedIn = await window.checkAuth(false);
            if (isLoggedIn) {
                currentUser = window.appState.currentUser;
                currentProfile = window.appState.currentProfile;
                if (currentProfile?.role === 'admin') {
                    document.getElementById('adminLink').style.display = 'block';
                }
            }
            await loadPosts();
            await loadUserLikes();
            setupRealtime();
        }

        async function loadPosts() {
            const { data, error } = await supabaseClient
                .from('posts')
                .select('*, profiles(full_name, leadership_tag, avatar_url)')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error('Error loading posts:', error);
                return;
            }
            posts = data || [];
            renderPosts();
        }

        async function loadUserLikes() {
            if (!currentUser) return;
            const { data } = await supabaseClient
                .from('likes')
                .select('post_id')
                .eq('user_id', currentUser.id);
            userLikes = new Set(data?.map(l => l.post_id) || []);
        }

        function renderPosts() {
            const filtered = currentCategory === 'all' 
                ? posts 
                : posts.filter(p => p.type === currentCategory);
            
            const grid = document.getElementById('feedGrid');
            
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column:1/-1; padding:2rem;">No posts found</p>';
                return;
            }
            
            grid.innerHTML = filtered.map(post => `
                <div class="post-card" onclick="showPostDetail(${post.id})">
                    <div class="post-header">
                        <div class="post-avatar" onclick="event.stopPropagation(); showUserProfile('${post.author_id}')">
                            ${post.profiles?.full_name?.[0] || 'A'}
                        </div>
                        <div>
                            <div class="post-author-name" onclick="event.stopPropagation(); showUserProfile('${post.author_id}')">
                                ${post.profiles?.full_name || 'AYF Admin'}
                                ${post.profiles?.leadership_tag ? `<span class="leadership-tag">${post.profiles.leadership_tag}</span>` : ''}
                            </div>
                            <small>${new Date(post.created_at).toLocaleDateString()}</small>
                        </div>
                    </div>
                    <div class="post-content">
                        <div class="post-title">${escapeHtml(post.title)}</div>
                        <div class="post-text">${escapeHtml(post.content?.substring(0, 150) || '')}${post.content?.length > 150 ? '...' : ''}</div>
                        ${post.media_url ? `<img src="${post.media_url}" class="post-media" onerror="this.style.display='none'">` : ''}
                    </div>
                    <div class="post-stats">
                        <span><i class="fas fa-eye"></i> ${post.view_count || 0}</span>
                        <span><i class="fas fa-heart"></i> ${post.like_count || 0}</span>
                        <span><i class="fas fa-comment"></i> ${post.comment_count || 0}</span>
                    </div>
                    <div class="post-actions">
                        <button class="action-btn like-btn ${userLikes.has(post.id) ? 'liked' : ''}" data-post-id="${post.id}" onclick="event.stopPropagation(); toggleLike(${post.id})">
                            <i class="fas fa-heart"></i> ${userLikes.has(post.id) ? 'Liked' : 'Like'}
                        </button>
                        <button class="action-btn" onclick="event.stopPropagation(); showPostDetail(${post.id})">
                            <i class="fas fa-comment"></i> Comment
                        </button>
                        <button class="action-btn" onclick="event.stopPropagation(); sharePost(${post.id})">
                            <i class="fas fa-share"></i> Share
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function toggleLike(postId) {
            if (!currentUser) {
                window.showToast('Please login to like posts', 'error');
                setTimeout(() => window.location.href = 'auth.html', 1500);
                return;
            }
            
            if (userLikes.has(postId)) {
                await supabaseClient.from('likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
                await supabaseClient.rpc('decrement_post_likes', { post_id: postId });
                userLikes.delete(postId);
            } else {
                await supabaseClient.from('likes').insert([{ post_id: postId, user_id: currentUser.id }]);
                await supabaseClient.rpc('increment_post_likes', { post_id: postId });
                userLikes.add(postId);
            }
            await loadPosts();
        }

        async function showPostDetail(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            
            await supabaseClient.rpc('increment_post_views', { post_id: postId });
            
            const { data: comments } = await supabaseClient
                .from('comments')
                .select('*, profiles(full_name, leadership_tag, avatar_url)')
                .eq('post_id', postId)
                .order('created_at', { ascending: true });
            
            const commentMap = new Map();
            const rootComments = [];
            comments?.forEach(comment => {
                comment.replies = [];
                commentMap.set(comment.id, comment);
                if (!comment.parent_id) rootComments.push(comment);
                else {
                    const parent = commentMap.get(comment.parent_id);
                    if (parent) parent.replies.push(comment);
                }
            });
            
            const modal = document.getElementById('postModal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <div style="padding:1rem;">
                    <h2>${escapeHtml(post.title)}</h2>
                    <div class="post-header" style="padding: 0.5rem 0;">
                        <div class="post-avatar" onclick="showUserProfile('${post.author_id}')">${post.profiles?.full_name?.[0] || 'A'}</div>
                        <div>
                            <div class="post-author-name" onclick="showUserProfile('${post.author_id}')">
                                ${post.profiles?.full_name || 'AYF Admin'}
                                ${post.profiles?.leadership_tag ? `<span class="leadership-tag">${post.profiles.leadership_tag}</span>` : ''}
                            </div>
                            <small>${new Date(post.created_at).toLocaleString()}</small>
                        </div>
                    </div>
                    <p style="opacity:0.8; margin:1rem 0; line-height:1.6;">${escapeHtml(post.content)}</p>
                    ${post.media_url ? `<img src="${post.media_url}" style="width:100%; border-radius:12px; margin:1rem 0;">` : ''}
                    
                    <div class="post-stats" style="margin:1rem 0;">
                        <span><i class="fas fa-eye"></i> ${post.view_count || 0} views</span>
                        <span><i class="fas fa-heart"></i> ${post.like_count || 0} likes</span>
                        <span><i class="fas fa-comment"></i> ${post.comment_count || 0} comments</span>
                    </div>
                    
                    <div class="comments-section">
                        <h4>Comments (${rootComments.length})</h4>
                        <div id="commentsList">
                            ${rootComments.map(comment => renderComment(comment)).join('') || '<p style="text-align:center; padding:1rem;">No comments yet. Be the first!</p>'}
                        </div>
                        
                        ${currentUser ? `
                            <div class="comment-input">
                                <input type="text" id="newComment" placeholder="Write a comment...">
                                <button class="btn btn-primary" onclick="addComment(${postId}, null)" style="padding:0.8rem 1.5rem;">Post</button>
                            </div>
                        ` : '<p style="margin-top:1rem; text-align:center;"><a href="auth.html" style="color:#667eea;">Login</a> to comment</p>'}
                    </div>
                </div>
            `;
            
            modal.style.display = 'flex';
        }

        function renderComment(comment, isReply = false) {
            const leadershipTag = comment.profiles?.leadership_tag ? 
                `<span class="leadership-tag">${comment.profiles.leadership_tag}</span>` : '';
            
            return `
                <div class="comment ${isReply ? 'reply' : ''}" data-comment-id="${comment.id}">
                    <div class="comment-header">
                        <span class="comment-author" onclick="showUserProfile('${comment.user_id}')">
                            <strong>${comment.profiles?.full_name || 'User'}</strong> ${leadershipTag}
                        </span>
                        <span class="comment-time">${new Date(comment.created_at).toLocaleString()}</span>
                    </div>
                    <p>${escapeHtml(comment.content)}</p>
                    ${currentUser ? `<button class="reply-btn" onclick="showReplyInput(${comment.id}, ${comment.post_id})"><i class="fas fa-reply"></i> Reply</button>` : ''}
                    <div id="reply-input-${comment.id}" style="display:none; margin-top:0.5rem;">
                        <div class="comment-input" style="margin-top:0.5rem;">
                            <input type="text" id="replyText-${comment.id}" placeholder="Write a reply...">
                            <button class="btn btn-primary" onclick="addComment(${comment.post_id}, ${comment.id})" style="padding:0.5rem 1rem;">Reply</button>
                        </div>
                    </div>
                    <div class="replies-container">
                        ${comment.replies?.map(r => renderComment(r, true)).join('') || ''}
                    </div>
                </div>
            `;
        }

        function showReplyInput(commentId, postId) {
            const inputDiv = document.getElementById(`reply-input-${commentId}`);
            if (inputDiv) inputDiv.style.display = inputDiv.style.display === 'none' ? 'block' : 'none';
        }

        async function addComment(postId, parentId = null) {
            if (!currentUser) {
                window.showToast('Please login to comment', 'error');
                setTimeout(() => window.location.href = 'auth.html', 1500);
                return;
            }
            
            const input = parentId ? document.getElementById(`replyText-${parentId}`) : document.getElementById('newComment');
            const content = input?.value;
            
            if (!content?.trim()) {
                window.showToast('Please enter a comment', 'error');
                return;
            }
            
            const { error } = await supabaseClient.from('comments').insert([{
                post_id: postId,
                user_id: currentUser.id,
                parent_id: parentId,
                content: content.trim()
            }]);
            
            if (!error) {
                if (parentId) {
                    input.value = '';
                    document.getElementById(`reply-input-${parentId}`).style.display = 'none';
                } else {
                    input.value = '';
                }
                await supabaseClient.rpc('increment_post_comments', { post_id: postId });
                await loadPosts();
                showPostDetail(postId);
                window.showToast('Comment posted!', 'success');
            }
        }

        async function showUserProfile(userId) {
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', userId)
                .single();
            
            if (!profile) return;
            
            const { count: followers } = await supabaseClient
                .from('follows')
                .select('*', { count: 'exact', head: true })
                .eq('following_id', userId);
            
            const { count: following } = await supabaseClient
                .from('follows')
                .select('*', { count: 'exact', head: true })
                .eq('follower_id', userId);
            
            const isFollowing = currentUser ? await supabaseClient
                .from('follows')
                .select('*')
                .eq('follower_id', currentUser.id)
                .eq('following_id', userId)
                .single() : null;
            
            const modal = document.getElementById('profileModal');
            const modalBody = document.getElementById('profileModalBody');
            
            modalBody.innerHTML = `
                <div style="padding:1rem; text-align:center;">
                    <div class="post-avatar" style="width:80px; height:80px; font-size:2rem; margin:0 auto 1rem;">
                        ${profile.full_name?.[0] || profile.email?.[0] || 'U'}
                    </div>
                    <h2>${profile.full_name || 'Member'}</h2>
                    ${profile.leadership_tag ? `<span class="leadership-tag" style="font-size:0.9rem;">${profile.leadership_tag}</span>` : ''}
                    <p style="margin-top:0.5rem; opacity:0.7;">${profile.parish || 'No parish'}</p>
                    ${profile.bio ? `<p style="margin:1rem 0;">${escapeHtml(profile.bio)}</p>` : ''}
                    
                    <div style="display: flex; justify-content: space-around; margin: 1.5rem 0;">
                        <div><strong>${profile.posts_count || 0}</strong><br><small>Posts</small></div>
                        <div><strong>${followers || 0}</strong><br><small>Followers</small></div>
                        <div><strong>${following || 0}</strong><br><small>Following</small></div>
                    </div>
                    
                    ${currentUser && currentUser.id !== userId ? `
                        <button class="btn ${isFollowing?.data ? 'btn-outline' : 'btn-primary'}" 
                                onclick="toggleFollow('${userId}', this)">
                            <i class="fas ${isFollowing?.data ? 'fa-user-minus' : 'fa-user-plus'}"></i>
                            ${isFollowing?.data ? 'Unfollow' : 'Follow'}
                        </button>
                    ` : ''}
                </div>
            `;
            
            modal.style.display = 'flex';
        }

        async function toggleFollow(userId, btn) {
            if (!currentUser) {
                window.showToast('Please login to follow users', 'error');
                return;
            }
            
            const { data: existing } = await supabaseClient
                .from('follows')
                .select('*')
                .eq('follower_id', currentUser.id)
                .eq('following_id', userId)
                .single();
            
            if (existing) {
                await supabaseClient.from('follows').delete().eq('id', existing.id);
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Follow';
                btn.className = 'btn btn-primary';
            } else {
                await supabaseClient.from('follows').insert([{
                    follower_id: currentUser.id,
                    following_id: userId
                }]);
                btn.innerHTML = '<i class="fas fa-user-minus"></i> Unfollow';
                btn.className = 'btn btn-outline';
            }
        }

        function sharePost(postId) {
            const url = `${window.location.origin}/post.html?id=${postId}`;
            navigator.clipboard.writeText(url);
            window.showToast('Link copied to clipboard!', 'success');
        }

        function closeModal() {
            document.getElementById('postModal').style.display = 'none';
        }

        function closeProfileModal() {
            document.getElementById('profileModal').style.display = 'none';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setupRealtime() {
            supabaseClient
                .channel('public:posts')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => loadPosts())
                .subscribe();
            
            supabaseClient
                .channel('public:comments')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments' }, () => loadPosts())
                .subscribe();
        }

        document.querySelectorAll('.filter-chip').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderPosts();
            });
        });

        document.getElementById('joinBtn').addEventListener('click', () => {
            window.location.href = 'auth.html';
        });

        window.showPostDetail = showPostDetail;
        window.toggleLike = toggleLike;
        window.addComment = addComment;
        window.sharePost = sharePost;
        window.closeModal = closeModal;
        window.showReplyInput = showReplyInput;
        window.showUserProfile = showUserProfile;
        window.closeProfileModal = closeProfileModal;
        window.toggleFollow = toggleFollow;

        init();
    </script>
</body>
</html>
