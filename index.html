<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AYF GWARIMPA - Welcome</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .auth-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .auth-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
        }

        .auth-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #f5f5f5;
            transition: all 0.3s;
            font-weight: 500;
            color: #666;
        }

        .auth-tab.active {
            background: white;
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .auth-form {
            padding: 30px;
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .image-upload {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .image-upload input {
            display: none;
        }

        .image-upload-label {
            width: 100%;
            height: 100%;
            border: 3px dashed #ccc;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9f9f9;
            overflow: hidden;
        }

        .image-upload-label:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .image-upload-label img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .image-upload-label.has-image img {
            display: block;
        }

        .image-upload-label.has-image .upload-icon {
            display: none;
        }

        .upload-icon {
            font-size: 24px;
            color: #999;
            margin-bottom: 5px;
        }

        .upload-text {
            font-size: 12px;
            color: #999;
        }

        .role-selection {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .role-option {
            flex: 1;
            min-width: 100px;
        }

        .role-option input {
            display: none;
        }

        .role-option label {
            display: block;
            padding: 12px;
            text-align: center;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .role-option input:checked + label {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.95);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            border-radius: 20px;
            flex-direction: column;
            justify-content: center;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pending-approval {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .pending-approval.active {
            display: block;
        }

        .pending-icon {
            font-size: 60px;
            color: #f0ad4e;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="auth-container" style="position: relative;">
        <div class="auth-header">
            <div class="logo">
                <i class="fas fa-church"></i>
            </div>
            <h1>AYF GWARIMPA</h1>
            <p>Anglican Youth Fellowship</p>
        </div>

        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login">Login</div>
            <div class="auth-tab" data-tab="register">Register</div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
            <div class="alert" id="loginAlert"></div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required placeholder="Enter your email" autocomplete="email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required placeholder="Enter your password" autocomplete="current-password">
            </div>

            <button type="submit" class="btn-primary">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form">
            <div class="alert" id="registerAlert"></div>

            <div class="image-upload">
                <input type="file" id="profileImage" accept="image/*">
                <label for="profileImage" class="image-upload-label" id="uploadLabel">
                    <i class="fas fa-camera upload-icon"></i>
                    <span class="upload-text">Add Photo</span>
                    <img id="previewImage" alt="Preview">
                </label>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" required placeholder="Enter your full name" autocomplete="name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required placeholder="Enter your email" autocomplete="email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" required placeholder="Create password (min 6 chars)" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label>Parish</label>
                <select id="parish" required>
                    <option value="">Select your parish</option>
                    <option value="St. Matthews">St. Matthews</option>
                    <option value="St. Pauls">St. Paul's</option>
                    <option value="St. Johns">St. John's</option>
                    <option value="All Saints">All Saints</option>
                    <option value="St. Peters">St. Peter's</option>
                    <option value="Holy Trinity">Holy Trinity</option>
                </select>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Role (Requires Admin Approval)</label>
                <div class="role-selection">
                    <div class="role-option">
                        <input type="radio" name="role" id="roleMember" value="member" checked>
                        <label for="roleMember">Member</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="role" id="roleExco" value="exco">
                        <label for="roleExco">Parish Exco</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="role" id="roleArchediceanry" value="archediceanry">
                        <label for="roleArchediceanry">Archediceanry</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="role" id="roleBoth" value="both">
                        <label for="roleBoth">Both</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="registerBtn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>

        <div class="pending-approval" id="pendingApproval">
            <i class="fas fa-clock pending-icon"></i>
            <h2>Approval Pending</h2>
            <p>Your Exco/Archediceanry role request has been sent to the admin for approval. You will be notified once approved.</p>
            <button class="btn-primary" id="pendingBackToLogin" style="margin-top: 20px;">
                Go to Login
            </button>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://jvfdcuvinlimurlttiqy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2ZmRjdXZpbmxpbXVybHR0aXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Njk0MTAsImV4cCI6MjA5MTA0NTQxMH0.ipezUsKqsEAbHvRqBLZYhagZj57rFJKG36uQL_4rFSg';

        // Initialize Supabase client
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loadingDiv = document.getElementById('loading');
        const pendingDiv = document.getElementById('pendingApproval');
        const loginAlert = document.getElementById('loginAlert');
        const registerAlert = document.getElementById('registerAlert');
        
        // Helper: Show alert message
        function showAlert(element, message, type) {
            if (!element) return;
            element.textContent = message;
            element.className = `alert ${type}`;
            element.style.display = 'block';
            // Auto hide after 5 seconds
            setTimeout(() => {
                if (element) element.style.display = 'none';
            }, 5000);
        }
        
        // Helper: Hide all alerts
        function hideAlerts() {
            if (loginAlert) loginAlert.style.display = 'none';
            if (registerAlert) registerAlert.style.display = 'none';
        }
        
        // Tab switching - fixed double quotes escaping and event binding
        function switchTab(tabName) {
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');
            
            tabs.forEach(tab => {
                const tabValue = tab.getAttribute('data-tab');
                if (tabValue === tabName) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            
            forms.forEach(form => {
                if ((tabName === 'login' && form.id === 'loginForm') ||
                    (tabName === 'register' && form.id === 'registerForm')) {
                    form.classList.add('active');
                } else {
                    form.classList.remove('active');
                }
            });
            
            // Hide pending screen and loading if visible
            if (pendingDiv) pendingDiv.classList.remove('active');
            if (loadingDiv) loadingDiv.classList.remove('active');
            hideAlerts();
        }
        
        // Attach tab click handlers
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function(e) {
                const tabName = this.getAttribute('data-tab');
                if (tabName === 'login') switchTab('login');
                else if (tabName === 'register') switchTab('register');
            });
        });
        
        // Image Preview
        const profileImageInput = document.getElementById('profileImage');
        const uploadLabel = document.getElementById('uploadLabel');
        const previewImg = document.getElementById('previewImage');
        
        if (profileImageInput) {
            profileImageInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        if (previewImg) {
                            previewImg.src = ev.target.result;
                            if (uploadLabel) uploadLabel.classList.add('has-image');
                        }
                    };
                    reader.readAsDataURL(file);
                } else if (file) {
                    showAlert(registerAlert, 'Please select a valid image file', 'error');
                    profileImageInput.value = '';
                }
            });
        }
        
        // Register submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlerts();
            
            const btn = document.getElementById('registerBtn');
            if (!btn) return;
            
            // Get form values
            const email = document.getElementById('regEmail')?.value.trim();
            const password = document.getElementById('regPassword')?.value;
            const fullName = document.getElementById('fullName')?.value.trim();
            const parish = document.getElementById('parish')?.value;
            const gender = document.getElementById('gender')?.value;
            const roleRadio = document.querySelector('input[name="role"]:checked');
            const role = roleRadio ? roleRadio.value : 'member';
            const profileImageFile = profileImageInput?.files[0] || null;
            
            // Validation
            if (!email || !password || !fullName || !parish || !gender) {
                showAlert(registerAlert, 'All fields are required', 'error');
                return;
            }
            if (password.length < 6) {
                showAlert(registerAlert, 'Password must be at least 6 characters', 'error');
                return;
            }
            
            btn.disabled = true;
            loadingDiv.classList.add('active');
            
            try {
                // Step 1: Sign up user with Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { full_name: fullName, role: role }
                    }
                });
                
                if (authError) throw authError;
                if (!authData.user) throw new Error('Signup failed, please try again');
                
                const userId = authData.user.id;
                let imageUrl = null;
                
                // Step 2: Upload profile image to storage if provided
                if (profileImageFile) {
                    const fileExt = profileImageFile.name.split('.').pop();
                    const fileName = `${userId}-${Date.now()}.${fileExt}`;
                    const { error: uploadError } = await supabase.storage
                        .from('profiles')
                        .upload(fileName, profileImageFile);
                    
                    if (!uploadError) {
                        const { data: urlData } = supabase.storage
                            .from('profiles')
                            .getPublicUrl(fileName);
                        imageUrl = urlData.publicUrl;
                    } else {
                        console.warn('Image upload skipped:', uploadError.message);
                    }
                }
                
                // Step 3: Insert user profile into 'users' table
                const isMember = role === 'member';
                const approvalStatus = isMember ? 'approved' : 'pending';
                
                const { error: profileError } = await supabase
                    .from('users')
                    .insert([{
                        id: userId,
                        email: email,
                        full_name: fullName,
                        parish: parish,
                        gender: gender,
                        role: role,
                        profile_image: imageUrl,
                        is_approved: isMember,
                        approval_status: approvalStatus,
                        created_at: new Date().toISOString()
                    }]);
                
                if (profileError) {
                    console.error('Profile insert error:', profileError);
                    // Attempt to clean up auth user if profile insert fails (optional)
                    throw new Error(`Profile creation failed: ${profileError.message}`);
                }
                
                // Step 4: If role is not member, create role request entry
                if (role !== 'member') {
                    const { error: requestError } = await supabase
                        .from('role_requests')
                        .insert([{
                            user_id: userId,
                            requested_role: role,
                            status: 'pending',
                            created_at: new Date().toISOString()
                        }]);
                    
                    if (requestError) {
                        console.warn('Role request not saved:', requestError.message);
                        // Non-critical, continue
                    }
                    
                    // Show pending approval screen instead of login form
                    registerForm.classList.remove('active');
                    pendingDiv.classList.add('active');
                } else {
                    // Member: show success and redirect to login tab
                    showAlert(registerAlert, 'Account created successfully! Please login.', 'success');
                    // Reset form fields
                    registerForm.reset();
                    if (uploadLabel) uploadLabel.classList.remove('has-image');
                    if (previewImg) previewImg.src = '';
                    // Switch to login tab after short delay
                    setTimeout(() => {
                        switchTab('login');
                        // Clear any leftover messages
                        hideAlerts();
                    }, 2000);
                }
                
            } catch (error) {
                console.error('Registration error:', error);
                let errorMsg = error.message || 'Registration failed. Please try again.';
                if (errorMsg.includes('User already registered')) {
                    errorMsg = 'This email is already registered. Please login instead.';
                }
                showAlert(registerAlert, errorMsg, 'error');
            } finally {
                btn.disabled = false;
                loadingDiv.classList.remove('active');
            }
        });
        
        // Login submission - FIXED REDIRECT
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlerts();
            
            const btn = loginForm.querySelector('.btn-primary');
            const email = document.getElementById('loginEmail')?.value.trim();
            const password = document.getElementById('loginPassword')?.value;
            
            if (!email || !password) {
                showAlert(loginAlert, 'Please enter email and password', 'error');
                return;
            }
            
            btn.disabled = true;
            loadingDiv.classList.add('active');
            
            try {
                // Sign in with password
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                if (!data.user) throw new Error('Login failed');
                
                const userId = data.user.id;
                
                // Fetch user profile from 'users' table to check approval status
                const { data: userProfile, error: fetchError } = await supabase
                    .from('users')
                    .select('approval_status, role, is_approved')
                    .eq('id', userId)
                    .maybeSingle();  // use maybeSingle to avoid 406 error if missing
                
                // If no profile found, it's inconsistent: sign out and show error
                if (fetchError || !userProfile) {
                    console.error('Profile fetch error:', fetchError);
                    await supabase.auth.signOut();
                    throw new Error('Account profile missing. Please contact support or register again.');
                }
                
                // Check approval: if role is not member and approval_status is 'pending' → block access
                const isNonMember = userProfile.role !== 'member';
                const isPending = userProfile.approval_status === 'pending';
                
                if (isNonMember && isPending) {
                    // Sign out immediately to prevent session
                    await supabase.auth.signOut();
                    showAlert(loginAlert, 'Your role is pending admin approval. Please wait for confirmation.', 'error');
                    btn.disabled = false;
                    loadingDiv.classList.remove('active');
                    return;
                }
                
                // ✅ APPROVED OR REGULAR MEMBER: Redirect to home.html
                // Use window.location.replace to avoid back button issues and ensure clean redirect
                window.location.replace('home.html');
                
            } catch (error) {
                console.error('Login error:', error);
                let friendlyMsg = error.message || 'Invalid email or password. Please try again.';
                if (friendlyMsg.includes('Invalid login credentials')) {
                    friendlyMsg = 'Incorrect email or password. Please try again.';
                }
                showAlert(loginAlert, friendlyMsg, 'error');
                btn.disabled = false;
                loadingDiv.classList.remove('active');
            }
        });
        
        // "Go to Login" button on pending screen
        const pendingBackBtn = document.getElementById('pendingBackToLogin');
        if (pendingBackBtn) {
            pendingBackBtn.addEventListener('click', () => {
                pendingDiv.classList.remove('active');
                switchTab('login');
                // Optionally clear registration form to avoid confusion
                if (registerForm) registerForm.reset();
                if (uploadLabel) uploadLabel.classList.remove('has-image');
                if (previewImg) previewImg.src = '';
                hideAlerts();
            });
        }
        
        // Check session on page load (auto-redirect if already logged in & approved)
        async function checkSessionAndRedirect() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session && session.user) {
                    const userId = session.user.id;
                    // Fetch approval status to verify if allowed
                    const { data: profile, error } = await supabase
                        .from('users')
                        .select('approval_status, role')
                        .eq('id', userId)
                        .maybeSingle();
                    
                    if (error || !profile) {
                        // No profile: sign out and stay on page
                        await supabase.auth.signOut();
                        return;
                    }
                    
                    const isBlocked = (profile.role !== 'member' && profile.approval_status === 'pending');
                    if (!isBlocked) {
                        // Already approved or regular member → redirect immediately
                        window.location.replace('home.html');
                    } else {
                        // Pending approval: sign out to avoid stuck session
                        await supabase.auth.signOut();
                        // Show message on login form
                        showAlert(loginAlert, 'Your account is pending admin approval. Please wait.', 'error');
                    }
                }
            } catch (err) {
                console.warn('Session check error:', err);
            }
        }
        
        // Initialize
        checkSessionAndRedirect();
        
        // Additional fix: ensure any leftover loading/pending states are hidden after tab switch
        window.switchTab = switchTab; // for global safety
        
        // Clear loading on any manual interaction if stuck (just in case)
        document.querySelectorAll('.auth-tab').forEach(t => {
            t.addEventListener('click', () => {
                loadingDiv.classList.remove('active');
            });
        });
    </script>
</body>
</html>
