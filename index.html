<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYF GWARIMPA - Welcome</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .auth-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .auth-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
        }

        .auth-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #f5f5f5;
            transition: all 0.3s;
            font-weight: 500;
            color: #666;
        }

        .auth-tab.active {
            background: white;
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .auth-form {
            padding: 30px;
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .image-upload {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .image-upload input {
            display: none;
        }

        .image-upload-label {
            width: 100%;
            height: 100%;
            border: 3px dashed #ccc;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9f9f9;
            overflow: hidden;
        }

        .image-upload-label:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .image-upload-label img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .image-upload-label.has-image img {
            display: block;
        }

        .image-upload-label.has-image .upload-icon {
            display: none;
        }

        .upload-icon {
            font-size: 24px;
            color: #999;
            margin-bottom: 5px;
        }

        .upload-text {
            font-size: 12px;
            color: #999;
        }

        .role-selection {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .role-option {
            flex: 1;
            min-width: 120px;
        }

        .role-option input {
            display: none;
        }

        .role-option label {
            display: block;
            padding: 12px;
            text-align: center;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .role-option input:checked + label {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pending-approval {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .pending-approval.active {
            display: block;
        }

        .pending-icon {
            font-size: 60px;
            color: #f0ad4e;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">
                <i class="fas fa-church"></i>
            </div>
            <h1>AYF GWARIMPA</h1>
            <p>Anglican Youth Fellowship</p>
        </div>

        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchTab('login')">Login</div>
            <div class="auth-tab" onclick="switchTab('register')">Register</div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
            <div class="alert" id="loginAlert"></div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn-primary">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form">
            <div class="alert" id="registerAlert"></div>

            <div class="image-upload">
                <input type="file" id="profileImage" accept="image/*">
                <label for="profileImage" class="image-upload-label" id="uploadLabel">
                    <i class="fas fa-camera upload-icon"></i>
                    <span class="upload-text">Add Photo</span>
                    <img id="previewImage" alt="Preview">
                </label>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" required placeholder="Create password (min 6 chars)">
            </div>

            <div class="form-group">
                <label>Parish</label>
                <select id="parish" required>
                    <option value="">Select your parish</option>
                    <option value="St. Matthews">St. Matthews</option>
                    <option value="St. Pauls">St. Paul's</option>
                    <option value="St. Johns">St. John's</option>
                    <option value="All Saints">All Saints</option>
                    <option value="St. Peters">St. Peter's</option>
                    <option value="Holy Trinity">Holy Trinity</option>
                </select>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Role (Requires Admin Approval)</label>
                <div class="role-selection">
                    <div class="role-option">
                        <input type="radio" name="role" id="roleMember" value="member" checked>
                        <label for="roleMember">Member</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="role" id="roleExco" value="exco">
                        <label for="roleExco">Parish Exco</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="role" id="roleArchediceanry" value="archediceanry">
                        <label for="roleArchediceanry">Archediceanry</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="role" id="roleBoth" value="both">
                        <label for="roleBoth">Both</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="registerBtn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>

        <div class="pending-approval" id="pendingApproval">
            <i class="fas fa-clock pending-icon"></i>
            <h2>Approval Pending</h2>
            <p>Your Exco/Archediceanry role request has been sent to the admin for approval. You will be notified once approved.</p>
            <button class="btn-primary" onclick="switchTab('login')" style="margin-top: 20px;">
                Go to Login
            </button>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://jvfdcuvinlimurlttiqy.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY_HERE';

// ✅ prevent double init
window.supabaseClient = window.supabaseClient ||
    window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const supabase = window.supabaseClient;

// =====================
// SIGN UP
// =====================
async function signUp(email, password, full_name, parish, gender) {
    try {
        // 1. Create Auth User
        const { data: authData, error: authError } = await supabase.auth.signUp({
            email,
            password
        });

        if (authError) {
            console.error("Auth error:", authError);
            alert(authError.message);
            return;
        }

        const user = authData.user;

        if (!user) {
            alert("Signup failed - no user returned");
            return;
        }

        // 2. Insert into public.users table (SAFE VERSION)
        const { error: insertError } = await supabase
            .from('users')
            .insert([{
                id: user.id,
                email: user.email,
                full_name,
                parish,
                gender,
                role: 'member',
                approval_status: 'pending'
            }]);

        if (insertError) {
            console.error("Profile insert error:", insertError);
            alert("Account created but profile failed to save");
            return;
        }

        alert("Account created successfully! Awaiting approval.");
        window.location.href = "index.html";

    } catch (err) {
        console.error("Signup crash:", err);
        alert("Something went wrong");
    }
}

// =====================
// LOGIN
// =====================
async function login(email, password) {
    try {
        const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password
        });

        if (error) {
            console.error(error);
            alert(error.message);
            return;
        }

        const user = data.user;

        // fetch profile
        const { data: profile, error: profileError } = await supabase
            .from('users')
            .select('*')
            .eq('id', user.id)
            .maybeSingle();

        if (profileError || !profile) {
            console.error(profileError);
            alert("Profile not found");
            return;
        }

        if (profile.approval_status === "pending") {
            await supabase.auth.signOut();
            alert("Account pending approval");
            return;
        }

        window.location.href = "home.html";

    } catch (err) {
        console.error("Login error:", err);
        alert("Login failed");
    }
}

// =====================
// CHECK SESSION (AUTO LOGIN)
// =====================
async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();

    if (session) {
        window.location.href = "home.html";
    }
}

// run on page load
checkSession();

// =====================
// EXAMPLE FORM HOOKS
// =====================

// LOGIN BUTTON
document.getElementById("loginBtn")?.addEventListener("click", () => {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    login(email, password);
});

// SIGNUP BUTTON
document.getElementById("signupBtn")?.addEventListener("click", () => {
    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;
    const full_name = document.getElementById("signupName").value;
    const parish = document.getElementById("signupParish").value;
    const gender = document.getElementById("signupGender").value;

    signUp(email, password, full_name, parish, gender);
});
</script>
     </body>
</html>
