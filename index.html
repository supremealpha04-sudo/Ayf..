<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYF GWARIMPA - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .form-container {
            padding: 30px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .avatar-upload {
            border: 2px dashed #ddd;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        .avatar-upload input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #f0f0f0;
            margin: 0 auto 10px;
            background-size: cover;
            background-position: center;
        }

        .parish-list {
            display: grid;
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .parish-option {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .parish-option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <div class="form-container">
            <!-- Login Form -->
            <div id="login-form" class="form active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit">Login</button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="register-form" class="form">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="reg-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-password" required>
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="reg-gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Parish</label>
                        <div id="parish-list" class="parish-list"></div>
                    </div>
                    <div class="form-group">
                        <label>Position</label>
                        <select id="reg-position">
                            <option value="none">Member</option>
                            <option value="exco">Parish EXCO</option>
                            <option value="archediceanry">Archediceanry EXCO</option>
                            <option value="both">Both</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Profile Picture</label>
                        <div class="avatar-upload" onclick="document.getElementById('avatar-input').click()">
                            <div class="avatar-preview" id="avatar-preview"></div>
                            <div>Click to upload profile picture</div>
                            <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="previewAvatar(this)">
                        </div>
                    </div>
                    <button type="submit">Register</button>
                </form>
            </div>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        let selectedParish = null;
        let avatarFile = null;

        // Load parishes
        async function loadParishes() {
            const { data } = await supabase.from('parishes').select('name');
            const container = document.getElementById('parish-list');
            container.innerHTML = data.map(p => `
                <div class="parish-option" onclick="selectParish('${p.name}')">
                    ${p.name}
                </div>
            `).join('');
        }

        function selectParish(name) {
            selectedParish = name;
            document.querySelectorAll('.parish-option').forEach(el => {
                el.classList.remove('selected');
                if(el.textContent === name) el.classList.add('selected');
            });
        }

        function previewAvatar(input) {
            if(input.files && input.files[0]) {
                avatarFile = input.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('avatar-preview').style.backgroundImage = `url(${e.target.result})`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const gender = document.getElementById('reg-gender').value;
            const position = document.getElementById('reg-position').value;

            if(!selectedParish) {
                alert('Please select a parish');
                return;
            }

            // Sign up
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email, password
            });

            if(authError) {
                alert(authError.message);
                return;
            }

            // Upload avatar if exists
            let avatarUrl = null;
            if(avatarFile) {
                const fileExt = avatarFile.name.split('.').pop();
                const fileName = `${authData.user.id}.${fileExt}`;
                const { error: uploadError } = await supabase.storage
                    .from('avatars')
                    .upload(fileName, avatarFile);
                
                if(!uploadError) {
                    avatarUrl = supabase.storage.from('avatars').getPublicUrl(fileName).data.publicUrl;
                }
            }

            // Create profile
            const { error: profileError } = await supabase
                .from('profiles')
                .insert([{
                    id: authData.user.id,
                    full_name: name,
                    parish_name: selectedParish,
                    gender: gender,
                    avatar_url: avatarUrl,
                    is_exco: position === 'exco' || position === 'both',
                    is_archediceanry: position === 'archediceanry' || position === 'both',
                    exco_approved: position === 'none' // Auto-approve regular members
                }]);

            if(profileError) {
                alert(profileError.message);
            } else {
                alert('Registration successful! Please check your email to confirm.');
                switchTab('login');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email, password
            });

            if(error) {
                alert(error.message);
            } else {
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'home.html';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === (tab === 'login' ? 0 : 1));
            });
            document.getElementById('login-form').classList.toggle('active', tab === 'login');
            document.getElementById('register-form').classList.toggle('active', tab === 'register');
            
            if(tab === 'register') loadParishes();
        }

        loadParishes();
    </script>
</body>
</html>
