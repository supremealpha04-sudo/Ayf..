<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AYF Gwarimpa | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            padding-bottom: 70px;
        }
        .header {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }
        .logo { display: flex; align-items: center; gap: 0.8rem; cursor: pointer; }
        .logo-icon { width: 35px; height: 35px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .nav-links a { color: white; text-decoration: none; margin-left: 1rem; font-size: 0.9rem; }
        
        .hero { text-align: center; padding: 3rem 1rem; background: linear-gradient(135deg, #667eea20, #764ba220); }
        .hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            margin: 1rem;
            border-radius: 20px;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .stat-item { text-align: center; }
        .stat-number { font-size: 1.5rem; font-weight: 700; color: #667eea; }
        
        .feed-section { max-width: 600px; margin: 0 auto; padding: 1rem; }
        .post-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .post-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.8rem; }
        .post-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .post-title { font-weight: 600; margin-bottom: 0.3rem; }
        
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem;
            border-top: 1px solid #222;
            z-index: 1000;
        }
        .footer-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            color: #888;
            text-decoration: none;
            font-size: 0.7rem;
        }
        .footer-nav-item.active, .footer-nav-item:hover { color: #667eea; }
        
        @media (max-width: 768px) { .nav-links { display: none; } .hero h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">✝️</div>
            <h3>AYF Gwarimpa</h3>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="plan.html">Plan</a>
            <a href="parish.html">Parish</a>
            <a href="profile.html">Profile</a>
        </div>
    </header>

    <div class="hero">
        <h1>Welcome to AYF Gwarimpa</h1>
        <p>Arise & Shine - Growing in Faith, Leadership & Service</p>
        <button class="btn" id="joinBtn">Join Fellowship</button>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="feed-section">
        <h3 style="margin-bottom: 1rem;">Latest Updates</h3>
        <div id="feedGrid"></div>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="footer-nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="plan.html" class="footer-nav-item"><i class="fas fa-calendar-alt"></i><span>Plan</span></a>
        <a href="parish.html" class="footer-nav-item"><i class="fas fa-church"></i><span>Parish</span></a>
        <a href="profile.html" class="footer-nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>

    <script>
        const SUPABASE_URL = 'https://jvfdcuvinlimurlttiqy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2ZmRjdXZpbmxpbXVybHR0aXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Njk0MTAsImV4cCI6MjA5MTA0NTQxMH0.ipezUsKqsEAbHvRqBLZYhagZj57rFJKG36uQL_4rFSg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function loadData() {
            const { data: profiles } = await supabase.from('profiles').select('*');
            const { data: posts } = await supabase.from('posts').select('*').order('created_at', { ascending: false }).limit(10);
            const { data: aSquared } = await supabase.from('profiles').select('*').eq('is_a_squared', true);
            
            document.getElementById('statsBar').innerHTML = `
                <div class="stat-item"><div class="stat-number">${profiles?.length || 0}</div><div>Members</div></div>
                <div class="stat-item"><div class="stat-number">3</div><div>Parishes</div></div>
                <div class="stat-item"><div class="stat-number">${aSquared?.length || 0}</div><div>A-Squared</div></div>
                <div class="stat-item"><div class="stat-number">${posts?.length || 0}</div><div>Posts</div></div>
            `;
            
            const feedGrid = document.getElementById('feedGrid');
            if (posts && posts.length > 0) {
                feedGrid.innerHTML = posts.map(post => `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="post-avatar">✝️</div>
                            <div><strong>AYF Admin</strong><br><small>${new Date(post.created_at).toLocaleDateString()}</small></div>
                        </div>
                        <div class="post-title">${post.title}</div>
                        <p style="opacity:0.7; font-size:0.9rem;">${post.content?.substring(0, 100)}...</p>
                    </div>
                `).join('');
            } else {
                feedGrid.innerHTML = '<p style="text-align:center;">No posts yet. Check back soon!</p>';
            }
        }
        
        document.getElementById('joinBtn').addEventListener('click', () => {
            window.location.href = 'auth.html';
        });
        
        loadData();
    </script>
</body>
</html>
