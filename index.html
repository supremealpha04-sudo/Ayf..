<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayf Gwarimpa - Registration & Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="loginSection" class="form-container active">
            <div class="form-header">
                <div class="logo">📱 Ayf Gwarimpa</div>
                <h1>Welcome Back</h1>
            </div>

            <form id="loginForm" class="form">
                <div class="form-group">
                    <input 
                        type="email" 
                        id="loginEmail" 
                        placeholder="Email" 
                        required
                        class="input-field"
                    >
                </div>

                <div class="form-group">
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="Password" 
                        required
                        class="input-field"
                    >
                </div>

                <button type="submit" class="btn btn-primary">Sign In</button>

                <div class="form-footer">
                    <a href="#" id="forgotPassword" class="link">Forgot password?</a>
                </div>
            </form>

            <div class="divider">OR</div>

            <button id="toggleRegister" class="btn btn-secondary">Create New Account</button>

            <div id="loginError" class="error-message"></div>
            <div id="loginSuccess" class="success-message"></div>
        </div>

        <!-- Registration Section -->
        <div id="registrationSection" class="form-container">
            <div class="form-header">
                <div class="logo">📱 Ayf Gwarimpa</div>
                <h1>Create Account</h1>
                <p class="subtitle">Join our community</p>
            </div>

            <form id="registrationForm" class="form">
                <!-- Profile Image -->
                <div class="form-group profile-image-group">
                    <div class="profile-image-upload">
                        <input 
                            type="file" 
                            id="profileImage" 
                            accept="image/*"
                            class="file-input"
                        >
                        <div class="image-placeholder">
                            <span>📷</span>
                            <p>Profile Photo</p>
                        </div>
                        <img id="imagePreview" class="image-preview" style="display: none;">
                    </div>
                </div>

                <!-- Name -->
                <div class="form-group">
                    <input 
                        type="text" 
                        id="fullName" 
                        placeholder="Full Name" 
                        required
                        class="input-field"
                    >
                </div>

                <!-- Age -->
                <div class="form-group">
                    <input 
                        type="number" 
                        id="age" 
                        placeholder="Age" 
                        min="13" 
                        max="120" 
                        required
                        class="input-field"
                    >
                </div>

                <!-- Email -->
                <div class="form-group">
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Email Address" 
                        required
                        class="input-field"
                    >
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <input 
                        type="tel" 
                        id="phone" 
                        placeholder="Phone Number" 
                        required
                        class="input-field"
                    >
                </div>

                <!-- Parish Selection -->
                <div class="form-group">
                    <select id="parish" required class="input-field">
                        <option value="">Select Your Parish</option>
                        <option value="st_barnabas_jahi_1">St. Barnabas Jahi 1</option>
                        <option value="st_barnabas_jahi_2">St. Barnabas Jahi 2</option>
                        <option value="st_matthew">St. Matthew</option>
                        <option value="st_andrew">St. Andrew</option>
                        <option value="st_john">St. John</option>
                        <option value="st_mark">St. Mark</option>
                        <option value="st_luke">St. Luke</option>
                        <option value="st_paul">St. Paul</option>
                        <option value="st_peter">St. Peter</option>
                        <option value="st_james">St. James</option>
                        <option value="st_philip">St. Philip</option>
                        <option value="st_thomas">St. Thomas</option>
                        <option value="st_simon">St. Simon</option>
                        <option value="st_jude">St. Jude</option>
                        <option value="st_michael">St. Michael</option>
                        <option value="st_raphael">St. Raphael</option>
                    </select>
                </div>

                <!-- Role Selection -->
                <div class="form-group role-selection">
                    <label class="checkbox-container">
                        <input type="checkbox" id="parishExco" class="checkbox-input">
                        <span class="checkbox-label">Parish EXCO</span>
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="archdeaconyExco" class="checkbox-input">
                        <span class="checkbox-label">Archdeaconry EXCO</span>
                    </label>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Password" 
                        required
                        class="input-field"
                    >
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        placeholder="Confirm Password" 
                        required
                        class="input-field"
                    >
                </div>

                <!-- Terms -->
                <div class="form-group terms-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="agreeTerms" required class="checkbox-input">
                        <span class="checkbox-label">I agree to the Terms & Conditions</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>

            <button id="toggleLogin" class="btn btn-secondary">Already have an account? Sign In</button>

            <div id="registrationError" class="error-message"></div>
            <div id="registrationSuccess" class="success-message"></div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner" style="display: none;">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
