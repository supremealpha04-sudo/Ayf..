<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AYF GWARIMPA - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: white;
            border: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .form-container {
            padding: 30px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .image-upload {
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            position: relative;
        }

        .image-upload:hover {
            border-color: #667eea;
        }

        .image-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 10px;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }

        .checkbox-group input {
            width: auto;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .parishes {
            max-height: 200px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
            }
            
            .form-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AYF GWARIMPA</h1>
            <p>Anglican Youth Fellowship - Gwarimpa</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>
        
        <div class="form-container">
            <!-- Login Form -->
            <div id="loginForm" class="form active">
                <form id="login">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
            </div>
            
            <!-- Register Form -->
            <div id="registerForm" class="form">
                <form id="register">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="regName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="regConfirmPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Parish Name</label>
                        <select id="regParish" required>
                            <option value="">Select Parish</option>
                            <option value="St. Peter's Anglican Church">St. Peter's Anglican Church</option>
                            <option value="St. Paul's Anglican Church">St. Paul's Anglican Church</option>
                            <option value="St. John's Anglican Church">St. John's Anglican Church</option>
                            <option value="Holy Trinity Anglican Church">Holy Trinity Anglican Church</option>
                            <option value="Christ Anglican Church">Christ Anglican Church</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="regGender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Profile Image</label>
                        <div class="image-upload" onclick="document.getElementById('profileImage').click()">
                            <img id="imagePreview" class="image-preview" alt="Preview">
                            <p>Click to upload profile image</p>
                        </div>
                        <input type="file" id="profileImage" accept="image/*" style="display: none;">
                    </div>
                    <div class="form-group">
                        <label>Position (Optional)</label>
                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" id="excoParish"> Parish Exco
                            </label>
                            <label>
                                <input type="checkbox" id="excoArchediceanry"> Archediceanry Exco
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn">Register</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let profileImageFile = null;
        
        // Tab switching
        window.switchTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        // Image upload preview
        document.getElementById('profileImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                profileImageFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });
        
        // Upload image to Supabase storage
        async function uploadImage(userId, file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${userId}/profile.${fileExt}`;
            const { data, error } = await supabase.storage
                .from('profiles')
                .upload(fileName, file);
            
            if (error) throw error;
            
            const { data: { publicUrl } } = supabase.storage
                .from('profiles')
                .getPublicUrl(fileName);
                
            return publicUrl;
        }
        
        // Register handler
        document.getElementById('register').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const parish = document.getElementById('regParish').value;
            const gender = document.getElementById('regGender').value;
            const isExcoParish = document.getElementById('excoParish').checked;
            const isExcoArchediceanry = document.getElementById('excoArchediceanry').checked;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            try {
                // Register user with Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });
                
                if (authError) throw authError;
                
                let profileImageUrl = null;
                if (profileImageFile) {
                    profileImageUrl = await uploadImage(authData.user.id, profileImageFile);
                }
                
                // Create profile
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([{
                        id: authData.user.id,
                        full_name: name,
                        email: email,
                        parish_name: parish,
                        gender: gender,
                        profile_image_url: profileImageUrl,
                        is_exco_parish: isExcoParish,
                        is_exco_archediceanry: isExcoArchediceanry,
                        exco_request_status: (isExcoParish || isExcoArchediceanry) ? 'pending' : 'approved'
                    }]);
                
                if (profileError) throw profileError;
                
                // Add to parish members
                const { error: memberError } = await supabase
                    .from('parish_members')
                    .insert([{
                        user_id: authData.user.id,
                        parish_name: parish,
                        is_president: false
                    }]);
                
                if (memberError) throw memberError;
                
                alert('Registration successful! Please login.');
                switchTab('login');
                
            } catch (error) {
                console.error('Registration error:', error);
                alert('Registration failed: ' + error.message);
            }
        });
        
        // Login handler
        document.getElementById('login').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                // Check if user is suspended
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', data.user.id)
                    .single();
                
                if (profile.is_suspended && new Date(profile.suspension_end_date) > new Date()) {
                    alert(`Your account is suspended until ${new Date(profile.suspension_end_date).toLocaleDateString()}`);
                    return;
                }
                
                // Store user session
                localStorage.setItem('user', JSON.stringify(data.user));
                localStorage.setItem('profile', JSON.stringify(profile));
                
                // Redirect to home page
                window.location.href = 'home.html';
                
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        });
    </script>
</body>
</html>
